let _toastT = null;
function toast(msg, undoFn, type) {
  const el = document.getElementById('toast');
  // v3.3.1: Toast variety with icons + colors per type
  // type can be 'success' (default check), 'warning', 'info', 'error'
  const icons = { success: '\u2713', warning: '\u26a0', info: '\u24d8', error: '\u2715' };
  const icon = icons[type] || (type === 'success' ? '\u2713' : '');
  const iconHtml = icon ? `<span class="toast-icon">${icon}</span>` : '';
  if (undoFn) {
    el.innerHTML = `${iconHtml}<span class="toast-msg">${msg}</span><button id="toast-undo" style="background:none;border:none;color:${type === 'success' ? '#fff' : 'var(--blue)'};font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;padding:2px 6px;margin-left:6px;text-decoration:underline">Undo</button>`;
  } else {
    el.innerHTML = `${iconHtml}<span class="toast-msg">${msg}</span>`;
  }
  el.className = 'toast show' + (type ? ' toast-' + type : '');
  if (_toastT) clearTimeout(_toastT);
  _toastT = setTimeout(() => { el.className = 'toast'; }, undoFn ? 5000 : 2600);
  if (undoFn) {
    const handler = () => {
      undoFn();
      el.className = 'toast';
      clearTimeout(_toastT);
    };
    // Use setTimeout to wait for DOM to update
    setTimeout(() => {
      const btn = document.getElementById('toast-undo');
      if (btn) btn.addEventListener('click', handler, { once: true });
    }, 0);
  }
}

/* ═══════════════════════════════════════════════════════════
   MILESTONE SYSTEM
   ═══════════════════════════════════════════════════════════ */
function checkMilestones() {
  const e = state.entries;
  if (!e.length) return;
  const earned = new Set(state.milestones.map(m => m.id));
  const newMs = [];
  const st = _lastStats; // populated by render() before this is called (300-500ms delay)

  // Entry count milestones
  if (e.length >= 1 && !earned.has('first_log')) newMs.push('first_log');
  if (e.length >= 30 && !earned.has('entries_30')) newMs.push('entries_30');
  if (e.length >= 60 && !earned.has('entries_60')) newMs.push('entries_60');
  if (e.length >= 100 && !earned.has('entries_100')) newMs.push('entries_100');

  // Streak milestones
  const streak = st ? st.streak : (() => {
    const today = new Date(todayStr());
    let s = 0;
    for (let i = e.length - 1; i >= 0; i--) {
      if (Math.round((today - new Date(e[i].date + 'T12:00:00')) / MS_PER_DAY) === s) s++; else break;
    }
    return s;
  })();
  if (streak >= 7 && !earned.has('streak_7')) newMs.push('streak_7');
  if (streak >= 14 && !earned.has('streak_14')) newMs.push('streak_14');
  if (streak >= 30 && !earned.has('streak_30')) newMs.push('streak_30');

  // Zero-day milestones
  const zeroDayCount = st ? st.zeroDays : e.filter(isZeroDay).length;
  if (zeroDayCount >= 1 && !earned.has('first_zero')) newMs.push('first_zero');
  if (zeroDayCount >= 7 && !earned.has('zero_7')) newMs.push('zero_7');

  // Reduction milestones — reuse cached reductionMg and avg7mg
  const avg7mg = st ? st.avg7mg : Math.round(e.slice(-7).reduce((s, x) => s + calcMg(x), 0) / Math.min(7, e.length));
  if (st && st.reductionMg > 0 && avg7mg > 0) {
    const reduction = st.reductionMg;
    if (reduction >= 25 && !earned.has('reduced_25')) newMs.push('reduced_25');
    if (reduction >= 50 && !earned.has('reduced_50')) newMs.push('reduced_50');
    if (reduction >= 75 && !earned.has('reduced_75')) newMs.push('reduced_75');
  }

  // New personal best (lowest 7-day avg mg)
  if (e.length >= 14 && !earned.has('new_low') && st && st.bestWeekMg !== null) {
    if (avg7mg > 0 && avg7mg <= st.bestWeekMg) newMs.push('new_low');
  }

  // Clean day streak milestones (consecutive zero days backward)
  const cleanStreak = st ? st.cleanDayStreak : (() => {
    let s = 0;
    for (let i = e.length - 1; i >= 0; i--) {
      if (isZeroDay(e[i])) s++; else break;
    }
    return s;
  })();
  if (cleanStreak >= 7 && !earned.has('clean_7d')) newMs.push('clean_7d');
  if (cleanStreak >= 14 && !earned.has('clean_14d')) newMs.push('clean_14d');
  if (cleanStreak >= 30 && !earned.has('clean_30d')) newMs.push('clean_30d');

  // Mood logging milestones
  if (e.some(x => x.mood != null) && !earned.has('first_mood')) newMs.push('first_mood');
  if (!earned.has('mood_week')) {
    let moodStreak = 0;
    for (let i = e.length - 1; i >= 0; i--) {
      if (e[i].mood != null) moodStreak++; else break;
    }
    if (moodStreak >= 7) newMs.push('mood_week');
  }

  // Budget milestone — uses calendar-week spend from getStats()
  const goal = state.settings.goal;
  if (goal && goal.type === 'budget' && goal.weeklyBudget > 0 && !earned.has('budget_met')) {
    const weekSpend = st && st.weeklySpend != null ? st.weeklySpend : Infinity;
    if (weekSpend <= goal.weeklyBudget) newMs.push('budget_met');
  }

  // v3.4: Extended streak milestones
  if (streak >= 50 && !earned.has('streak_50')) newMs.push('streak_50');
  if (streak >= 100 && !earned.has('streak_100')) newMs.push('streak_100');

  // v3.4: 200 entries
  if (e.length >= 200 && !earned.has('entries_200')) newMs.push('entries_200');

  // v3.4: Trigger milestones
  if (!earned.has('first_trigger') && e.some(x => Array.isArray(x.triggers) && x.triggers.length > 0)) {
    newMs.push('first_trigger');
  }
  if (!earned.has('triggers_10')) {
    if (e.filter(x => Array.isArray(x.triggers) && x.triggers.length > 0).length >= 10) newMs.push('triggers_10');
  }

  // v3.4: Mood 30 — rated mood on 30 days total
  if (!earned.has('mood_30') && e.filter(x => x.mood != null).length >= 30) {
    newMs.push('mood_30');
  }

  // v3.4: Oil-free week — 7 consecutive days without oil after previously using it
  if (!earned.has('oil_free_week') && e.some(x => (x.oilMl || 0) > 0)) {
    let oilFreeRun = 0;
    for (let i = e.length - 1; i >= 0; i--) {
      if ((e[i].oilMl || 0) === 0) oilFreeRun++; else break;
    }
    if (oilFreeRun >= 7) newMs.push('oil_free_week');
  }

  // v3.4: 90% reduction
  if (st && st.reductionMg >= 90 && avg7mg > 0 && !earned.has('reduced_90')) newMs.push('reduced_90');

  // v3.4: Budget month — 4 consecutive weeks under budget
  if (goal && goal.type === 'budget' && goal.weeklyBudget > 0 && !earned.has('budget_month') && e.length >= 28) {
    const ppgBm = state.settings.pricePerGram || 0;
    let allUnder = true;
    for (let w = 0; w < 4; w++) {
      const start = e.length - 7 * (w + 1);
      const end = e.length - 7 * w;
      if (start < 0) { allUnder = false; break; }
      const weekSlice = e.slice(start, end);
      let spend = weekSlice.reduce((a, x) => a + (x.purchase || 0), 0);
      if (spend <= 0 && ppgBm > 0) spend = weekSlice.reduce((a, x) => a + ((x.grams || 0) + (x.grams2 || 0)) * ppgBm, 0);
      if (spend > goal.weeklyBudget) { allUnder = false; break; }
    }
    if (allUnder) newMs.push('budget_month');
  }

  // v3.4: Weekend warrior — logged every Sat & Sun for 4 consecutive weeks
  if (!earned.has('weekend_warrior')) {
    const _dateSet = new Set(e.map(x => x.date));
    const _today = new Date(todayStr());
    let allWkends = true;
    for (let w = 0; w < 4 && allWkends; w++) {
      for (let dayOff of [6, 0]) { // Saturday=6, Sunday=0
        const d = new Date(_today);
        d.setDate(d.getDate() - ((d.getDay() - dayOff + 7) % 7) - 7 * w);
        if (!_dateSet.has(localDateStr(d))) { allWkends = false; break; }
      }
    }
    if (allWkends) newMs.push('weekend_warrior');
  }

  // v3.4: Early bird — average session time before 18:00 for last 7 entries with time
  if (!earned.has('early_bird')) {
    const l7t = e.slice(-7).filter(x => x.time);
    if (l7t.length >= 7) {
      const avgT = l7t.reduce((s, x) => s + timeDec(x.time), 0) / l7t.length;
      if (avgT < 18) newMs.push('early_bird');
    }
  }

  // v3.4: Note streak — 7 consecutive entries with a note
  if (!earned.has('note_streak')) {
    let noteRun = 0;
    for (let i = e.length - 1; i >= 0; i--) {
      if (e[i].notes && e[i].notes.trim()) noteRun++; else break;
    }
    if (noteRun >= 7) newMs.push('note_streak');
  }

  // Goal milestone — supports reduce, budget, break
  if (goal && !earned.has('goal_reached')) {
    if (goal.type === 'reduce') {
      if (goal.unit === 'mg' && goal.targetMg > 0 && avg7mg <= goal.targetMg) newMs.push('goal_reached');
      else if (goal.targetGrams > 0) {
        // v6.0.6: include zero-days so 7 clean days qualifies (was: 999 fallback swallowed this)
        const l7 = e.slice(-7);
        if (l7.length >= 7) {
          const avg7g = l7.reduce((s, x) => s + (x.grams || 0), 0) / l7.length;
          if (avg7g <= goal.targetGrams) newMs.push('goal_reached');
        }
      }
      // v6.0.6: maintain mode — celebrate holding within ±15% of target for 4 weeks
      else if (goal.reduceMode === 'maintain' && goal.maintainAt > 0) {
        const l28 = e.slice(-28).filter(x => (x.grams || 0) > 0);
        if (l28.length >= 20) {
          const avg28 = l28.reduce((s, x) => s + x.grams, 0) / l28.length;
          if (Math.abs(avg28 - goal.maintainAt) / goal.maintainAt <= 0.15) newMs.push('goal_reached');
        }
      }
    } else if (goal.type === 'break' && goal.breakEnd) {
      const now = new Date(todayStr() + 'T12:00:00');
      const end = new Date(goal.breakEnd + 'T12:00:00');
      // v6: Celebrate reaching the end date regardless of slips — one slip shouldn't erase the commitment
      if (now >= end) {
        newMs.push('goal_reached');
      }
    }
  }

  // Award new milestones
  if (newMs.length) {
    newMs.forEach(id => {
      state.milestones.push({ id, achievedAt: todayStr() });
    });
    saveData();
    const best = newMs[newMs.length - 1];
    showMilestone(best);
  }
}

    setTimeout(() => el.remove(), fullscreen ? 2200 : 1400);
  }
}

/* ═══════════════════════════════════════════════════════════
   GOAL SYSTEM
   ═══════════════════════════════════════════════════════════ */
function goalProgress() {
  const goal = state.settings.goal;
  if (!goal) return null;
  const goalType = goal.type || 'reduce';
  const e = state.entries;
  const st = _lastStats;

  // --- Reduce goal ---
  if (goalType === 'reduce') {
    if (e.length < 7) return null;
    const rm = goal.reduceMode || 'target';

    // v5.1: Maintain mode — user wants to stay at a steady level, not reduce further.
    if (rm === 'maintain') {
      if (!goal.maintainAt || goal.maintainAt <= 0) return null;
      const l7 = e.slice(-7).filter(x => x.grams != null && x.grams > 0);
      const currentAvg = l7.length ? l7.reduce((a, x) => a + x.grams, 0) / l7.length : 0;
      const diff = (currentAvg - goal.maintainAt) / goal.maintainAt;
      let status;
      if (diff > 0.2) status = 'drifting_up';
      else if (diff < -0.2) status = 'below';
      else status = 'holding';
      return { type: 'reduce', reduceMode: 'maintain', currentAvg, maintainAt: goal.maintainAt, status, unit: 'g' };
    }

    // v5.1: Flow mode — no target, just show current pace + trend vs last week.
    if (rm === 'flow') {
      const l7 = e.slice(-7).filter(x => x.grams != null && x.grams > 0);
      if (l7.length === 0) return null;
      const p7 = e.slice(-14, -7).filter(x => x.grams != null && x.grams > 0);
      const currentAvg = l7.reduce((a, x) => a + x.grams, 0) / l7.length;
      const prevAvg = p7.length ? p7.reduce((a, x) => a + x.grams, 0) / p7.length : currentAvg;
      const trendPct = prevAvg > 0 ? Math.round((currentAvg - prevAvg) / prevAvg * 100) : 0;
      return { type: 'reduce', reduceMode: 'flow', currentAvg, trendPct, unit: 'g' };
    }

    // Target mode (default)
    const useMg = goal.unit === 'mg';
    const target = useMg ? goal.targetMg : goal.targetGrams;
    if (!target || target <= 0) return null;
    let startAvg, currentAvg;
    if (useMg) {
      const fw = e.slice(0, 7);
      startAvg = fw.length ? Math.round(fw.reduce((a, x) => a + calcMg(x), 0) / fw.length) : 0;
      const l7 = e.slice(-7);
      currentAvg = l7.length ? Math.round(l7.reduce((a, x) => a + calcMg(x), 0) / l7.length) : 0;
    } else {
      const fw = e.slice(0, 7).filter(x => x.grams != null && x.grams > 0);
      startAvg = fw.length ? fw.reduce((a, x) => a + x.grams, 0) / fw.length : 0;
      const l7 = e.slice(-7).filter(x => x.grams != null && x.grams > 0);
      currentAvg = l7.length ? l7.reduce((a, x) => a + x.grams, 0) / l7.length : 0;
    }
    if (startAvg <= target) return { type: 'reduce', reduceMode: 'target', progress: 1, currentAvg, startAvg, target, targetDate: goal.targetDate, unit: useMg ? 'mg' : 'g' };
    const totalReduction = startAvg - target;
    const currentReduction = startAvg - currentAvg;
    const progress = Math.max(0, Math.min(1, currentReduction / totalReduction));
    return { type: 'reduce', reduceMode: 'target', progress, currentAvg, startAvg, target, targetDate: goal.targetDate, unit: useMg ? 'mg' : 'g' };
  }

  // --- Budget goal ---
  if (goalType === 'budget' && st) {
    const budget = goal.weeklyBudget;
    if (!budget || budget <= 0) return null;
    const spent = st.weeklySpend || 0;
    const prog = Math.max(0, Math.min(1, 1 - (spent / budget)));
    return { type: 'budget', progress: prog, spent, budget, remaining: budget - spent, currency: state.settings.currency || '\u00a3' };
  }

  // --- Break goal ---
  if (goalType === 'break') {
    const start = goal.breakStart;
    if (!start) return null;
    const now = new Date(todayStr() + 'T12:00:00');
    const startD = new Date(String(start).slice(0, 10) + 'T12:00:00');
    // v6.0.6: +1 so day 0 (start day) counts as "day 1" — matches user intuition
    // and keeps "N days tracked" in the header aligned with the hero daysIn number.
    const elapsed = Math.max(0, Math.floor((now - startD) / MS_PER_DAY));
    const daysIn = elapsed + 1;
    const cs = st ? st.cleanDayStreak : 0;
    if (goal.breakEnd) {
      const endD = new Date(String(goal.breakEnd).slice(0, 10) + 'T12:00:00');
      const total = Math.max(1, Math.round((endD - startD) / MS_PER_DAY));
      const p = Math.min(1, elapsed / total);
      return { type: 'break', progress: p, daysIn, totalDays: total, breakEnd: goal.breakEnd, openEnded: false, cleanStreak: cs };
    }
    return { type: 'break', progress: null, daysIn, totalDays: null, breakEnd: null, openEnded: true, cleanStreak: cs };
  }

  return null;
}

/* ═══════════════════════════════════════════════════════════
   STATISTICS
   ═══════════════════════════════════════════════════════════ */
function getStats() {
  // v5.1: Return cached stats if available (cleared on every data mutation).
  if (_statsCache) return _statsCache;
  const e = state.entries;
  if (!e.length) return (_statsCache = {
    ar:'0.0',trendG:0,days:0,daysSinceBackup:null,
    avg7mg:0,avg7mgPrev:0,trendMg:0,totMg:0,
    cs:null,peakStr:0,reductionG:null,reductionMg:null,
    fwAvg:null,bestWeek:null,bestWeekMg:null,oilShare:0,streak:0,ratedDays:0,
    avgCartPuffs7:0,trendCart:null,hasCartData:false,
    mood7:null,sleep7:null,moodAll:null,sleepAll:null,
    atStr:'—',atRecentStr:'—',atDiffMin:null,trendOil:null,trendStr:null,
    zeroDays:0,zeroDaysL30:0,underTargetDays:null,moneySaved:null,l7symptoms:{},p7symptoms:{},
  });

  const wg = e.filter(x => x.grams != null && x.grams > 0);
  const l7g = e.slice(-7).filter(x => x.grams != null && x.grams > 0);
  const p7g = e.slice(-14, -7).filter(x => x.grams != null && x.grams > 0);
  const ar = l7g.length ? l7g.reduce((s, x) => s + x.grams, 0) / l7g.length : 0;
  const ap = p7g.length ? p7g.reduce((s, x) => s + x.grams, 0) / p7g.length : 0;
  const trendG = ap > 0 ? Math.round((ar - ap) / ap * 100) : 0;

  const totMg = e.reduce((s, x) => s + calcMg(x), 0);
  const l7all = e.slice(-7);
  const p7all = e.slice(-14, -7);
  const avg7mg = l7all.length ? Math.round(l7all.reduce((s, x) => s + calcMg(x), 0) / l7all.length) : 0;
  const avg7mgPrev = p7all.length ? Math.round(p7all.reduce((s, x) => s + calcMg(x), 0) / p7all.length) : 0;
  const trendMg = avg7mgPrev > 0 ? Math.round((avg7mg - avg7mgPrev) / avg7mgPrev * 100) : 0;

  const fw = e.slice(0, 7).filter(x => x.grams != null && x.grams > 0);
  const fwAvg = fw.length ? fw.reduce((s, x) => s + x.grams, 0) / fw.length : null;
  const reductionG = fwAvg > 0 && ar > 0 ? Math.round((1 - ar / fwAvg) * 100) : null;
  const fwMg = e.slice(0, 7);
  const fwAvgMg = fwMg.length ? Math.round(fwMg.reduce((s, x) => s + calcMg(x), 0) / fwMg.length) : null;
  const reductionMg = fwAvgMg > 0 && avg7mg > 0 ? Math.round((1 - avg7mg / fwAvgMg) * 100) : null;

  let bestWeek = null, bestWeekMg = null;
  for (let i = 6; i < e.length; i++) {
    const wSlice = e.slice(i - 6, i + 1).filter(x => x.grams != null && x.grams > 0);
    if (wSlice.length) { const avg = wSlice.reduce((s, x) => s + x.grams, 0) / wSlice.length; if (bestWeek === null || avg < bestWeek) bestWeek = avg; }
    const avgMg = Math.round(e.slice(i - 6, i + 1).reduce((s, x) => s + calcMg(x), 0) / 7);
    if (bestWeekMg === null || avgMg < bestWeekMg) bestWeekMg = avgMg;
  }

  const te = e.filter(x => x.time);
  const at = te.length ? te.reduce((s, x) => s + timeDec(x.time), 0) / te.length : null;
  const l7te = e.slice(-7).filter(x => x.time);
  const atRecent = l7te.length ? l7te.reduce((s, x) => s + timeDec(x.time), 0) / l7te.length : null;
  const p7te = e.slice(-14, -7).filter(x => x.time);
  const atPrev = p7te.length ? p7te.reduce((s, x) => s + timeDec(x.time), 0) / p7te.length : null;
  const atDiffMin = atPrev != null && atRecent != null ? Math.round((atRecent - atPrev) * 60) : null;
  function decToTime24(dec) { if (dec == null) return '—'; const h = Math.floor(dec), m = Math.round((dec % 1) * 60); return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`; }

  const l7totMg = l7all.reduce((s, x) => s + calcMg(x), 0);
  const l7oilMg = l7all.reduce((s, x) => s + (x.oilMl || 0) * (x.oilStrength ?? state.settings.oilDefaultStrength), 0);
  const oilShare = l7totMg > 0 ? Math.round(l7oilMg / l7totMg * 100) : 0;
  const p7totMg = p7all.reduce((s, x) => s + calcMg(x), 0);
  const p7oilMg = p7all.reduce((s, x) => s + (x.oilMl || 0) * (x.oilStrength ?? state.settings.oilDefaultStrength), 0);
  const oilSharePrev = p7totMg > 0 ? Math.round(p7oilMg / p7totMg * 100) : null;
  const trendOil = oilSharePrev != null && oilSharePrev > 0 ? Math.round((oilShare - oilSharePrev) / oilSharePrev * 100) : null;

  const cartPuffs7 = l7all.reduce((s, x) => s + (x.cartPuffs || 0), 0);
  const avgCartPuffs7 = l7all.length ? Math.round(cartPuffs7 / l7all.length * 10) / 10 : 0;
  const cartPuffsP7 = p7all.reduce((s, x) => s + (x.cartPuffs || 0), 0);
  const avgCartPuffsP7 = p7all.length ? Math.round(cartPuffsP7 / p7all.length * 10) / 10 : 0;
  const trendCart = avgCartPuffsP7 > 0 ? Math.round((avgCartPuffs7 - avgCartPuffsP7) / avgCartPuffsP7 * 100) : null;
  const hasCartData = e.some(x => (x.cartPuffs || 0) > 0);

  function avgStr(x) {
    if (x.strength == null) return null;
    if (x.grams2 > 0 && x.strength2 != null) {
      const totalG = (x.grams || 0) + x.grams2;
      if (totalG <= 0) return x.strength;
      return ((x.grams || 0) * x.strength + x.grams2 * x.strength2) / totalG;
    }
    return x.strength;
  }
  const strEntries = e.filter(x => x.strength != null);
  const csEntry = strEntries.slice(-1)[0];
  const cs = csEntry ? Math.round(avgStr(csEntry) * 10) / 10 : null;
  const peakStr = strEntries.reduce((m, x) => Math.max(m, avgStr(x) || 0), 0);
  const p7strEntries = e.slice(-14, -7).filter(x => x.strength != null);
  const prevStr = p7strEntries.length ? avgStr(p7strEntries.slice(-1)[0]) : null;
  const trendStr = prevStr != null && cs != null && prevStr > 0 ? Math.round((cs - prevStr) / prevStr * 100) : null;

  function ratingAvg(arr, key) {
    const vals = arr.filter(x => x[key] != null).map(x => x[key]);
    return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
  }
  const mood7 = ratingAvg(l7all, 'mood');
  const sleep7 = ratingAvg(l7all, 'sleep');
  const moodAll = ratingAvg(e, 'mood');
  const sleepAll = ratingAvg(e, 'sleep');
  const ratedDays = e.filter(x => x.mood || x.sleep).length;

  // v3.3.1: Streak with freeze — allow ONE missed day per rolling 7-day window
  // This is more forgiving than "one freeze per streak" — gives a steady safety net
  // FIX: never apply a freeze to dates BEFORE the user's first entry — those aren't
  // missed days, the user simply hadn't started tracking yet.
  const today = new Date(todayStr());
  let streak = 0;
  const freezeDates = []; // dates where we used a freeze
  const dateSet = new Set(e.map(x => x.date));
  const firstEntryDate = e.length ? e[0].date : null;
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const ds = localDateStr(d);
    // Don't count any dates before the user's first entry
    if (firstEntryDate && ds < firstEntryDate) break;
    if (dateSet.has(ds)) {
      streak++;
    } else if (i > 0) {
      // Check if any freeze was used in the last 7 days BEFORE this point
      const recentFreezes = freezeDates.filter(f => {
        const fd = new Date(f);
        const diff = (d - fd) / MS_PER_DAY;
        return diff >= 0 && diff < 7;
      });
      if (recentFreezes.length === 0) {
        // No freeze used in the rolling 7-day window — apply one
        freezeDates.push(ds);
      } else {
        break; // Already used a freeze recently — streak breaks
      }
    } else {
      break;
    }
  }
  const frozenUsed = freezeDates.length;
  const streakHasFreeze = frozenUsed > 0;
  // Available freezes: 0 if any used in last 7 days, else 1
  const lastFreezeAge = freezeDates.length > 0 ? Math.round((today - new Date(freezeDates[0])) / MS_PER_DAY) : 999;
  const freezesAvailable = lastFreezeAge >= 7 ? 1 : 0;

  let daysSinceBackup = null;
  if (state.lastBackup) {
    daysSinceBackup = Math.round((new Date(todayStr()) - new Date(state.lastBackup + 'T12:00:00')) / MS_PER_DAY);
  }

  // Zero days and under-target days
  const zeroDays = e.filter(isZeroDay).length;
  const zeroDaysL30 = e.slice(-30).filter(isZeroDay).length;
  const goal = state.settings.goal;
  let underTargetDays = null;
  if (goal) {
    const useMg = goal.unit === 'mg';
    const target = useMg ? goal.targetMg : goal.targetGrams;
    if (target > 0) {
      underTargetDays = l7all.filter(x => {
        if (useMg) return calcMg(x) <= target;
        return (x.grams || 0) <= target;
      }).length;
    }
  }

  // Money saved (if price configured)
  let moneySaved = null;
  const ppg = state.settings.pricePerGram;
  if (ppg && ppg > 0 && fwAvg > 0) {
    const totalGrams = e.reduce((s, x) => s + (x.grams || 0) + (x.grams2 || 0), 0);
    const baselineGrams = fwAvg * e.length; // what you would have used at week-1 rate
    const savedGrams = Math.max(0, baselineGrams - totalGrams);
    moneySaved = Math.round(savedGrams * ppg);
  }

  // v5.1: Weekly spend uses calendar week (Mon-Sun), not "last 7 entries".
  // Sporadic loggers were seeing wrong numbers because 7 entries could span 2+ weeks.
  const dow = today.getDay(); // 0=Sun, 1=Mon ... 6=Sat
  const daysSinceMonday = (dow + 6) % 7; // 0 if Mon, 6 if Sun
  const weekStartD = new Date(today);
  weekStartD.setDate(today.getDate() - daysSinceMonday);
  const weekStartStr = localDateStr(weekStartD);
  const todayS = localDateStr(today);
  const thisWeekEntries = e.filter(x => x.date >= weekStartStr && x.date <= todayS);

  // Weekly/monthly spend — use purchases if logged, else compute from grams × ppg
  let weeklySpend = null, monthlySpend = null, prevMonthSpend = null;
  const weekPurchases = Math.round(thisWeekEntries.reduce((a, x) => a + (x.purchase || 0), 0));
  const monthPurchases = Math.round(e.slice(-30).reduce((a, x) => a + (x.purchase || 0), 0));
  const prevMonthEntries = e.slice(-60, -30);
  const prevMonthPurchases = Math.round(prevMonthEntries.reduce((a, x) => a + (x.purchase || 0), 0));
  if (weekPurchases > 0) {
    weeklySpend = weekPurchases;
    monthlySpend = monthPurchases;
    prevMonthSpend = prevMonthPurchases > 0 ? prevMonthPurchases : null;
  } else if (ppg && ppg > 0) {
    weeklySpend = Math.round(thisWeekEntries.reduce((a, x) => a + ((x.grams || 0) + (x.grams2 || 0)) * ppg, 0));
    monthlySpend = Math.round(e.slice(-30).reduce((a, x) => a + ((x.grams || 0) + (x.grams2 || 0)) * ppg, 0));
    prevMonthSpend = prevMonthEntries.length >= 20 ? Math.round(prevMonthEntries.reduce((a, x) => a + ((x.grams || 0) + (x.grams2 || 0)) * ppg, 0)) : null;
  }

  // Clean day streak
  let cleanDayStreak = 0;
  for (let i = e.length - 1; i >= 0; i--) {
    if (isZeroDay(e[i])) cleanDayStreak++; else break;
  }

  // Break/budget stats

   CHART DATA HELPERS
   ═══════════════════════════════════════════════════════════ */
function filteredEntries() {
  const e = state.entries;
  if (!state.range || state.range === 'all') return e;
  const days = { '7': 7, '30': 30, '60': 60, '90': 90 }[state.range] || e.length;
  if (isNaN(days)) return e;
  // v6.0.6: Use local date, not UTC, or the cutoff shifts a day in evening local time
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
  const cutStr = localDateStr(cutoff);
  return e.filter(x => x.date >= cutStr);
}

function cd() {
  return filteredEntries().map(e => ({
    lbl: fmtDate(e.date), date: e.date,
    grams: e.grams != null && e.grams > 0 ? e.grams : null,
    oil: e.oilMl > 0 ? e.oilMl : null,
    str: e.strength,
    t: timeDec(e.time), ts: fmtTime(e.time), ot: timeDec(e.oilTime), ots: fmtTime(e.oilTime),
    mg: calcMg(e) || null,
    mood: e.mood, sleep: e.sleep, notes: e.notes,
  }));
}

// v5.2: Sober window chart data derivation
// IMPORTANT: this chart only shows days where the user logged BOTH first AND last session.
// Days with only a first-session belong on the existing "First session time" chart.
// Days with neither render as gaps (spanGaps:false leaves them blank in the line).
function soberWindowData() {
  return filteredEntries().map(e => {
    const first = timeDec(e.time);
    const lastRaw = timeDec(e.lastSessionTime);
    // Only include a day if BOTH ends are logged. No fallback.
    if (first == null || lastRaw == null) {
      return { date: e.date, lbl: fmtDate(e.date), first: null, last: null, bedtime: null, isZero: isZeroDay(e) };
    }
    // Midnight wrap: if last < first, treat as crossing midnight (+24 hours)
    let last = lastRaw < first ? lastRaw + 24 : lastRaw;
    let bedtime = timeDec(e.bedtime);
    if (bedtime != null && bedtime < first) bedtime += 24;
    return { date: e.date, lbl: fmtDate(e.date), first, last, bedtime, isZero: isZeroDay(e) };
  });
}

// v5.2: 7-day rolling average for sober window lines — null-safe
function rollingAvg7(arr) {
  return arr.map((_, i) => {
    const window = arr.slice(Math.max(0, i - 6), i + 1).filter(v => v != null);
    return window.length >= 2 ? window.reduce((a, b) => a + b, 0) / window.length : null;
  });
}

function weeklyData() {
  const weeks = {};
  filteredEntries().forEach(e => {
    const d = new Date(e.date + 'T12:00:00');
    const day = d.getDay() || 7;
    const mon = new Date(d); mon.setDate(d.getDate() - (day - 1));
    const key = localDateStr(mon);
    if (!weeks[key]) weeks[key] = { lbl: fmtDate(key), mg: [], grams: [], mood: [], sleep: [] };
    weeks[key].mg.push(calcMg(e));
    if (e.grams != null && e.grams > 0) weeks[key].grams.push(e.grams);
    if (e.mood) weeks[key].mood.push(e.mood);
    if (e.sleep) weeks[key].sleep.push(e.sleep);
  });
  return Object.entries(weeks).sort(([a], [b]) => a.localeCompare(b)).map(([, v]) => ({
    lbl: v.lbl,
    mg: v.mg.length ? Math.round(v.mg.reduce((a, b) => a + b, 0) / v.mg.length) : null,
    grams: v.grams.length ? +(v.grams.reduce((a, b) => a + b, 0) / v.grams.length).toFixed(2) : null,
    mood: v.mood.length ? +(v.mood.reduce((a, b) => a + b, 0) / v.mood.length).toFixed(1) : null,
    sleep: v.sleep.length ? +(v.sleep.reduce((a, b) => a + b, 0) / v.sleep.length).toFixed(1) : null,
  }));
}

  // --- Streak dots (7-day visual) ---

      </div>`;

  }

  // v3.4: Weekly digest — redesigned with sparkline, trend arrows, highlight

    weeklyDigestHtml = `<div class="card cp" id="weekly-digest" style="background:var(--card);border:1px solid rgba(143,136,232,.2);box-shadow:0 4px 24px rgba(143,136,232,.1), 0 1px 3px rgba(0,0,0,.04);position:relative;animation:fadeUp .55s cubic-bezier(.22,1,.36,1);overflow:hidden">
      <button id="digest-dismiss" aria-label="Dismiss weekly digest" style="position:absolute;top:4px;right:4px;background:none;border:none;color:var(--t3);font-size:14px;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;line-height:1;z-index:1">\u2715</button>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-right:36px">
        <span style="font-size:11px;font-weight:700;letter-spacing:1.2px;color:#8f88e8;text-transform:uppercase">\ud83d\udcc5 Your week</span>
        <span style="font-size:11px;color:var(--t3);font-weight:500">${_dateRange}</span>
      </div>
      ${ks && sparklineSvg ? `<div style="display:flex;align-items:flex-end;gap:14px;margin-bottom:14px">
        <div style="flex:1">
          <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:6px">
            <span style="font-size:24px;font-weight:800;color:var(--t1);line-height:1">${last7avgMg}</span>
            <span style="font-size:11px;font-weight:500;color:var(--t3)">mg/day avg</span>
          </div>
          <div style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;background:${trendCol === 'var(--teal)' ? 'rgba(26,147,111,.1)' : trendCol === 'var(--coral)' ? 'rgba(208,80,50,.1)' : 'rgba(193,127,36,.1)'}">
            <span style="font-size:13px;font-weight:700;color:${trendCol}">${trendArrow}</span>
            <span style="font-size:11px;font-weight:600;color:${trendCol}">${trendText}</span>
          </div>
        </div>
        <div style="flex-shrink:0">${sparklineSvg}${dayLabelHtml}</div>
      </div>` : `<div style="margin-bottom:14px">
        <div style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:${trendCol === 'var(--teal)' ? 'rgba(26,147,111,.1)' : trendCol === 'var(--coral)' ? 'rgba(208,80,50,.1)' : 'rgba(193,127,36,.1)'}">
          <span style="font-size:14px;font-weight:700;color:${trendCol}">${trendArrow}</span>
          <span style="font-size:12px;font-weight:600;color:${trendCol}">${trendText} vs last week</span>
        </div>
      </div>`}
      ${_statTiles > 0 ? `<div style="display:grid;grid-template-columns:repeat(${_gridCols},1fr);gap:6px;margin-bottom:${highlightText ? '12' : '0'}px">
        ${avgMood != null ? `<div style="padding:8px 10px;border-radius:10px;background:var(--glass2);border:1px solid var(--glass-border)"><div style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:600">Mood</div><div style="font-size:17px;font-weight:800;color:var(--teal);margin-top:3px;line-height:1">${avgMood}<span style="font-size:10px;font-weight:500;color:var(--t3)">/5</span></div></div>` : ''}
        ${avgSleep != null ? `<div style="padding:8px 10px;border-radius:10px;background:var(--glass2);border:1px solid var(--glass-border)"><div style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:600">Sleep</div><div style="font-size:17px;font-weight:800;color:var(--blue);margin-top:3px;line-height:1">${avgSleep}<span style="font-size:10px;font-weight:500;color:var(--t3)">/5</span></div></div>` : ''}
        ${cleanThisWeek > 0 ? `<div style="padding:8px 10px;border-radius:10px;background:var(--glass2);border:1px solid var(--glass-border)"><div style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:600">Clean</div><div style="font-size:17px;font-weight:800;color:var(--accent);margin-top:3px;line-height:1">${cleanThisWeek}<span style="font-size:10px;font-weight:500;color:var(--t3)">/7</span></div></div>` : ''}
        ${weekSpend > 0 ? `<div style="padding:8px 10px;border-radius:10px;background:var(--glass2);border:1px solid var(--glass-border)"><div style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:600">Spent</div><div style="font-size:17px;font-weight:800;color:var(--amber);margin-top:3px;line-height:1">${cur}${weekSpend}</div></div>` : ''}
      </div>` : ''}
      ${highlightText ? `<div style="display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:10px;background:linear-gradient(135deg, rgba(143,136,232,.06) 0%, rgba(74,158,114,.04) 100%);border:1px solid rgba(143,136,232,.1)"><span style="font-size:12px;flex-shrink:0">\u2728</span><span style="font-size:12px;font-weight:500;color:var(--t2);line-height:1.3">${highlightText}</span></div>` : ''}
    </div>`;

    // Mark digest as seen so it doesn't re-show this week
    state.settings.lastDigestWeek = thisWeek;
    saveData();
  })();

  // --- Intent-specific card ---
  const goal = state.settings.goal;
  const goalType = goal?.type || null;
  let intentCardHtml = '';

  // Withdrawal card for quit/break users (first 56 days only)
  if (goalType === 'break' && goal.breakStart) {
    const startD = new Date(goal.breakStart + 'T12:00:00');
    const daysIn = Math.max(0, Math.round((new Date(todayStr() + 'T12:00:00') - startD) / MS_PER_DAY));
    if (daysIn <= 56) {
      const phases = [
        { max: 3, label: 'Acute phase', tip: WITHDRAWAL_INFO.coldTurkey.phases[0].tip, col: 'var(--coral)' },
        { max: 14, label: 'Peak withdrawal', tip: WITHDRAWAL_INFO.coldTurkey.phases[1].tip, col: 'var(--amber)' },
        { max: 28, label: 'Clearing', tip: WITHDRAWAL_INFO.coldTurkey.phases[2].tip, col: 'var(--blue)' },
        { max: 56, label: 'Rebalancing', tip: WITHDRAWAL_INFO.coldTurkey.phases[3].tip, col: 'var(--teal)' },
      ];
      const phase = phases.find(p => daysIn <= p.max) || phases[phases.length - 1];
      const phasePct = daysIn <= 3 ? (daysIn / 3 * 25) : daysIn <= 14 ? (25 + (daysIn - 3) / 11 * 25) : daysIn <= 28 ? (50 + (daysIn - 14) / 14 * 25) : (75 + (daysIn - 28) / 28 * 25);
      intentCardHtml = `<div class="card cp" style="border-left:3px solid ${phase.col}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:12px;font-weight:600;color:${phase.col}">${phase.label}</span>
          <span style="font-size:11px;color:var(--t3)">Day ${daysIn}</span>
        </div>
        <div style="position:relative;height:6px;border-radius:3px;background:var(--card2);overflow:hidden;margin-bottom:8px">
          <div style="position:absolute;left:0;top:0;height:100%;width:${Math.min(100, phasePct)}%;background:${phase.col};border-radius:3px;transition:width .5s"></div>
        </div>
        <div style="font-size:12px;color:var(--t2);line-height:1.5">${phase.tip}</div>
      </div>`;
    }
  }

  // Spending card for budget users
  if (goalType === 'budget' && goal.weeklyBudget > 0 && s.weeklySpend != null) {
    const cur = state.settings.currency || '\u00a3';
    const spent = s.weeklySpend;
    const budget = goal.weeklyBudget;
    const pct = Math.min(100, Math.round(spent / budget * 100));
    const over = spent > budget;
    const barCol = over ? 'var(--coral)' : pct > 75 ? 'var(--amber)' : 'var(--teal)';
    intentCardHtml = `<div class="card cp">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
        <span style="font-size:12px;font-weight:600;color:var(--t1)">Budget tracker</span>
        <span style="font-size:11px;color:var(--t3)">${cur}${budget}/week</span>
      </div>
      <div style="position:relative;height:8px;border-radius:4px;background:var(--card2);overflow:hidden;margin-bottom:8px">
        <div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:${barCol};border-radius:4px;transition:width .5s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px">
        <span style="color:var(--t2)">${cur}${spent} spent</span>
        <span style="font-weight:600;color:${over ? 'var(--coral)' : 'var(--teal)'}">${over ? cur + Math.abs(budget - spent) + ' over' : cur + (budget - spent) + ' left'}</span>
      </div>
      ${s.monthlySpend != null ? (() => {
        if (s.prevMonthSpend != null && s.prevMonthSpend > 0) {
          const diff = s.monthlySpend - s.prevMonthSpend;
          const pct = Math.round(Math.abs(diff) / s.prevMonthSpend * 100);
          const arrow = diff < 0 ? '\u2193' : diff > 0 ? '\u2191' : '\u2192';
          const col = diff < 0 ? 'var(--teal)' : diff > 0 ? 'var(--coral)' : 'var(--t3)';
          const sign = diff < 0 ? '' : '+';
          return `<div style="font-size:11px;color:var(--t3);margin-top:6px;display:flex;justify-content:space-between"><span>This month: ${cur}${s.monthlySpend}</span><span style="color:${col};font-weight:600">${arrow} ${sign}${cur}${Math.abs(diff)} (${pct}%)</span></div>`;
        }
        return `<div style="font-size:11px;color:var(--t3);margin-top:6px">This month: ${cur}${s.monthlySpend}</div>`;
      })() : ''}
    </div>`;
  }

  // Pace card for reduce users
  // v6.0.5: robust against both date-only and ISO-timestamp setAt formats,
  // and against weeklyReductionPct stored as decimal (0.10) or percentage (10)
  if (goalType === 'reduce' && goal.weeklyReductionPct && goal.setAt) {
    // Normalise setAt: strip any 'T...' suffix so string concat works uniformly
    const setAtDate = String(goal.setAt).slice(0, 10);
    const setAtMs = new Date(setAtDate + 'T12:00:00').getTime();
    const todayMs = new Date(todayStr() + 'T12:00:00').getTime();
    // v6.0.6: floor so Week 2 target starts at day 8, not day 4
    const weeksElapsed = Number.isFinite(setAtMs) ? Math.max(0, Math.floor((todayMs - setAtMs) / 604800000)) : 0;
    const useMg = goal.unit === 'mg';
    // Normalise weeklyReductionPct: if > 1, assume someone stored it as a
    // whole percentage (e.g. 10 meaning 10%) and convert to decimal
    const pct = goal.weeklyReductionPct > 1 ? goal.weeklyReductionPct / 100 : goal.weeklyReductionPct;
    const baseline = useMg
      ? (goal.baselineMg || goal.startAvgMg || (goal.targetMg ? goal.targetMg * 2 : 0))
      : (goal.baselineGrams || goal.startAvg || (goal.targetGrams ? goal.targetGrams * 2 : 0));
    if (baseline > 0 && Number.isFinite(baseline)) {
      const expectedNow = baseline * Math.pow(1 - pct, weeksElapsed);
      const actual = useMg ? s.avg7mg : parseFloat(s.ar);
      const unit = useMg ? 'mg' : 'g';
      const actualNum = Number.isFinite(actual) ? actual : 0;
      const onPace = actualNum <= expectedNow * 1.05;
      const ahead = actualNum < expectedNow * 0.9;
      const rounded = useMg ? Math.round(expectedNow) : Math.round(expectedNow * 10) / 10;
      const pctDisplay = Math.round(pct * 100);
      intentCardHtml = `<div class="card cp">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
          <span style="font-size:12px;font-weight:600;color:var(--t1)">Week ${weeksElapsed + 1} target</span>
          <span style="font-size:11px;color:var(--t3)">~${pctDisplay}% per week</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
          <span style="font-size:28px;font-weight:800;color:var(--t1)">${rounded}${unit}</span>
          <span style="font-size:13px;color:var(--t3)">/day this week</span>
        </div>
        <div style="font-size:13px;font-weight:500;color:${ahead ? 'var(--teal)' : onPace ? 'var(--accent)' : 'var(--amber)'}">${ahead ? 'Ahead of pace \u2014 great work' : onPace ? 'On track' : 'A little behind \u2014 every day counts'}</div>
        <div style="font-size:11px;color:var(--t3);margin-top:4px">Currently averaging ${actualNum}${unit}/day</div>
      </div>`;
    }
  }

  // --- Weekly summary (7+ days) — adapted by intent ---
  let weeklyHtml = '';
  if (s.days >= 7) {
    const useMg = state.settings.knowsStrength;
    const primaryTrend = useMg ? s.trendMg : s.trendG;
    const cur = state.settings.currency || '\u00a3';

    // First column adapts by intent
    let col1;
    if (goalType === 'budget' && s.weeklySpend != null) {
      col1 = `<div style="flex:1;text-align:center;padding:10px 0">
        <div style="font-size:22px;font-weight:700;color:var(--t1)">${cur}${s.weeklySpend}</div>
        <div style="font-size:10px;color:var(--t3);margin-top:4px">spent</div>
      </div>`;
    } else if (goalType === 'break') {
      const cleanL7 = state.entries.slice(-7).filter(isZeroDay).length;
      col1 = `<div style="flex:1;text-align:center;padding:10px 0">
        <div style="font-size:22px;font-weight:700;color:var(--teal)">${cleanL7}<span style="font-size:12px;font-weight:400">/7</span></div>
        <div style="font-size:10px;color:var(--t3);margin-top:4px">clean days</div>
      </div>`;
    } else {
      col1 = `<div style="flex:1;text-align:center;padding:10px 0">
        <div style="font-size:22px;font-weight:700;color:${tCol(primaryTrend)}">${Math.abs(primaryTrend) > 3 ? (primaryTrend < 0 ? '\u2193' : '\u2191') + ' ' + Math.abs(primaryTrend) + '%' : '\u2192 steady'}</div>
        <div style="font-size:10px;color:var(--t3);margin-top:4px">usage vs last week</div>
      </div>`;
    }

    weeklyHtml = `<div class="card cp">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
        <span class="card-title" style="margin-bottom:0">This week</span>
        <button data-tab="stats" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;min-height:44px;padding:8px">See stats \u2192</button>
      </div>
      <div style="display:flex;gap:0">
        ${col1}
        ${s.mood7 ? `<div style="flex:1;text-align:center;padding:10px 0;border-left:.5px solid var(--sep)">
          <div style="font-size:22px;font-weight:700;color:var(--t1)">${s.mood7}<span style="font-size:12px;font-weight:400">/5</span></div>
          <div style="font-size:10px;color:var(--t3);margin-top:4px">mood</div>
        </div>` : ''}
        <div style="flex:1;text-align:center;padding:10px 0;border-left:.5px solid var(--sep)">
          <div style="font-size:22px;font-weight:700;color:var(--teal)">${s.streak}${s.streakHasFreeze ? '<span style="font-size:11px;color:var(--blue);margin-left:2px" title="Grace day active">\u2744</span>' : ''}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:4px">logging streak</div>
        </div>
      </div>
    </div>`;
  }

  // --- Milestone card ---
  let milestoneHtml = '';
  if (s.days >= 3) {
    const latest = state.milestones.length ? state.milestones[state.milestones.length - 1] : null;
    const latestDef = latest ? MILESTONE_DEFS.find(m => m.id === latest.id) : null;
    milestoneHtml = `<div class="card cp" style="cursor:pointer;min-height:44px" data-tab="milestones">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="card-title" style="margin-bottom:0">Milestones</span>
        <span style="font-size:11px;color:var(--accent)">${state.milestones.length} / ${MILESTONE_DEFS.length} \u2192</span>
      </div>
      ${latestDef ? `<div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:24px">${latestDef.icon}</span>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600;color:var(--t1)">${latestDef.name}</div>
          <div style="font-size:11px;color:var(--t3)">Latest achievement</div>
        </div>
      </div>` : `<div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:24px;opacity:.5">\ud83c\udfc6</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--t2)">Your first milestone is close</div>
          <div style="font-size:11px;color:var(--t3)">Keep logging \u2014 badges are earned by streaks, clean days, and more</div>
        </div>
      </div>`}
    </div>`;
  }

  const ct = document.getElementById('content');
  // Build expanded hero detail (shown when state.heroExpanded is true)
  let heroExpandedHtml = '';
  if (state.heroExpanded && s.days >= 1) {
    const cur = state.settings.currency || '\u00a3';
    const goalT = state.settings.goal?.type || null;
    const stats = [];
    // Build intent-specific stats — show 4 most relevant
    if (goalT === 'break') {
      // Quit/break: emphasise streak, days clean, money saved
      stats.push({ label: 'Days tracked', value: s.days, col: 'var(--blue)' });
      if (s.zeroDays > 0) stats.push({ label: 'Clean days', value: s.zeroDays, col: 'var(--teal)' });
      if (s.moneySaved != null && s.moneySaved > 0) stats.push({ label: 'Money saved', value: cur + s.moneySaved, col: 'var(--teal)' });
      if (s.streak >= 1) stats.push({ label: 'Streak', value: s.streak + 'd', col: 'var(--accent)' });
    } else if (goalT === 'budget') {
      // Budget: emphasise spending, savings, monthly trend
      if (s.weeklySpend != null) stats.push({ label: 'This week', value: cur + s.weeklySpend, col: 'var(--amber)' });
      if (s.monthlySpend != null) stats.push({ label: 'This month', value: cur + s.monthlySpend, col: 'var(--amber)' });
      if (s.moneySaved != null && s.moneySaved > 0) stats.push({ label: 'Saved', value: cur + s.moneySaved, col: 'var(--teal)' });
      stats.push({ label: 'Days tracked', value: s.days, col: 'var(--blue)' });
    } else if (goalT === 'reduce') {
      const rMode = state.settings.goal?.reduceMode || 'target';
      if (rMode === 'maintain') {
        const maintainAt = state.settings.goal?.maintainAt;
        if (maintainAt) stats.push({ label: 'Your level', value: maintainAt + 'g', col: 'var(--accent)' });
        stats.push({ label: '7-day avg', value: s.ar + 'g', col: 'var(--blue)' });
        if (s.moneySaved != null && s.moneySaved > 0) stats.push({ label: 'Saved', value: cur + s.moneySaved, col: 'var(--teal)' });
        stats.push({ label: 'Days tracked', value: s.days, col: 'var(--blue)' });
      } else if (rMode === 'flow') {
        stats.push({ label: 'Days tracked', value: s.days, col: 'var(--blue)' });
        if (s.bestWeek) stats.push({ label: 'Lightest week', value: s.bestWeek + 'g', col: 'var(--purple)' });
        if (s.zeroDays > 0) stats.push({ label: 'Rest days', value: s.zeroDays, col: 'var(--teal)' });
        if (s.streak >= 1) stats.push({ label: 'Streak', value: s.streak + 'd', col: 'var(--accent)' });
      } else {
        if (s.reductionMg > 0) stats.push({ label: (goal && goal.reduceMode === 'maintain') ? 'vs start' : 'Change', value: s.reductionMg + '%', col: 'var(--teal)' });
        if (s.bestWeek) stats.push({ label: 'Best week', value: s.bestWeek + 'g', col: 'var(--purple)' });
        if (s.moneySaved != null && s.moneySaved > 0) stats.push({ label: 'Money saved', value: cur + s.moneySaved, col: 'var(--teal)' });
        if (s.streak >= 1) stats.push({ label: 'Streak', value: s.streak + 'd', col: 'var(--accent)' });
      }
    } else {
      // No goal/track: neutral mix
      stats.push({ label: 'Days tracked', value: s.days, col: 'var(--blue)' });
      if (s.bestWeek) stats.push({ label: 'Best week', value: s.bestWeek + 'g', col: 'var(--purple)' });
      if (s.zeroDays > 0) stats.push({ label: 'Rest days', value: s.zeroDays, col: 'var(--teal)' });
      if (s.streak >= 1) stats.push({ label: 'Streak', value: s.streak + 'd', col: 'var(--accent)' });
    }
    heroExpandedHtml = `<div class="card cp" id="hero-details" style="animation:fadeUp .3s ease">
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px">
        ${stats.slice(0, 4).map(st => `<div style="padding:10px 12px;border-radius:10px;background:var(--glass2);border:1px solid var(--glass-border)"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">${st.label}</div><div style="font-size:18px;font-weight:700;color:${st.col};margin-top:2px">${st.value}</div></div>`).join('')}
      </div>
      <div style="display:flex;gap:8px">
        <button id="change-plan-btn" style="flex:1;padding:10px;border-radius:10px;border:1px solid var(--glass-border);background:var(--glass);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .15s">\u270e Edit my plan</button>
      </div>
    </div>`;
  }

  // Wrap hero with an expandable tap target (unless it's already a goal-card-tap for reduce/break)
  // v3.3: "Tap for details" pill is a floating chip overlapping the bottom edge of the hero card
  const hasGoalTap = heroHtml.includes('id="goal-card-tap"');
  const heroExpandHint = (s.days >= 1) ? `<div data-hero-expand="1" style="display:flex;align-items:center;justify-content:center;gap:6px;margin:-8px auto 14px;padding:4px 12px;width:fit-content;cursor:pointer;font-size:10px;font-weight:500;color:var(--t3);-webkit-tap-highlight-color:transparent;transition:all .2s"><span style="font-size:9px;display:inline-block;transition:transform .25s;${state.heroExpanded ? 'transform:rotate(180deg)' : ''}">${state.heroExpanded ? '\u25b4' : '\u25be'}</span></div>` : '';
  const heroWrapped = hasGoalTap ? heroHtml + heroExpandHint : `<div data-hero-expand="1" style="cursor:pointer">${heroHtml}</div>${heroExpandHint}`;

  const insightHtml = buildInsightCard(s);

  // v3.3.1: Auto-backup nudge — show when backup is >21 days old and user has 14+ entries
  let backupNudgeHtml = '';
  if (state.entries.length >= 14 && s.daysSinceBackup != null && s.daysSinceBackup > 21 && state.settings.dismissedBackupNudgeAt !== todayStr()) {
    backupNudgeHtml = `<div class="card cp" id="backup-nudge-card" style="background:var(--card);border:1px solid rgba(224,160,48,.28)">
      <div style="display:flex;align-items:center;gap:10px">

function rRow(label, key, val, col) {
  // v3.3.1: emoji-first rating buttons with descriptive mini-label
  const moodEmojis = ['😫','😕','😐','🙂','😊'];
  const sleepEmojis = ['😫','😪','😐','😌','💤'];
  const moodLabels = ['Bad', 'Low', 'OK', 'Good', 'Great'];
  const sleepLabels = ['Bad', 'Poor', 'OK', 'Good', 'Great'];
  const emojis = key === 'sleep' ? sleepEmojis : moodEmojis;
  const labels = key === 'sleep' ? sleepLabels : moodLabels;
  const gradientBg = (n) => `background:linear-gradient(135deg, ${col}, ${col}dd);border-color:${col}`;
  return `<div class="rating-row"><div class="rating-lbl">${label}</div><div class="rating-btns">${[1,2,3,4,5].map(n =>
    `<button class="rdot${val === n ? ' active' : ''}" data-rk="${key}" data-rv="${n}" style="${val === n ? gradientBg(n) : ''}" aria-label="${label}: ${n} - ${labels[n-1]}"><span>${emojis[n-1]}</span><span>${labels[n-1]}</span></button>`
  ).join('')}</div></div>`;
}

// v5.1: Cache for getStats() — avoids 35+ array iterations on every render.
// Invalidated in saveData() and any time state.entries/settings mutate directly.
let _statsCache = null;
let _cachedAvg7mg = null;
let _lastStats = null;
function updateLiveEstimate() {
  const el = document.getElementById('live-thc-estimate');
  if (!el) return;
  const f = state.form;
  const g = parseFloat(f.grams) || 0;
  const str = parseFloat(f.strength) || 0;
  const g2 = parseFloat(f.grams2) || 0;
  const str2 = parseFloat(f.strength2) || (str || 0);
  const oil = parseFloat(f.oilMl) || 0;
  const oilStr = parseFloat(f.oilStrength) || state.settings.oilDefaultStrength;
  const puffs = parseInt(f.cartPuffs, 10) || 0;
  let mg = 0;
  if (g > 0 && str > 0) mg += g * str * 10;
  if (g2 > 0) mg += g2 * str2 * 10;
  if (oil > 0) mg += oil * oilStr;
  if (puffs > 0) mg += puffs * state.settings.cartPuffMg;
  mg = Math.round(mg);
  if (mg > 0) {
    if (_cachedAvg7mg === null) {
      const l7 = state.entries.slice(-7);
      _cachedAvg7mg = l7.length ? Math.round(l7.reduce((s, x) => s + calcMg(x), 0) / l7.length) : 0;
    }
    const avg7 = _cachedAvg7mg;
    const belowAvg = avg7 > 0 && mg <= avg7;
    const aboveAvg = avg7 > 0 && mg > avg7;
    let costLine = '';
    const ppg = state.settings.pricePerGram;
    if (ppg > 0) {
      const g = parseFloat(state.form.grams) || 0;
      const g2 = parseFloat(state.form.grams2) || 0;
      const cost = Math.round((g + g2) * ppg * 100) / 100;
      if (cost > 0) costLine = `<br><span style="font-size:12px;color:var(--t3)">Est. cost: ${state.settings.currency || '\u00a3'}${cost.toFixed(2)}</span>`;
    }
    const isBudgetGoal = state.settings.goal?.type === 'budget';
    if (isBudgetGoal && costLine) {
      // Budget users: cost is primary, THC is secondary
      el.innerHTML = costLine.replace('<br>', '') + (state.settings.knowsStrength ? `<br><span style="font-size:11px;color:var(--t3)">~${mg}mg THC</span>` : '');
    } else {
      el.innerHTML = `~<strong>${mg}mg</strong> THC today${belowAvg ? `<br><span style="font-size:12px;color:var(--teal)">That's below your weekly average</span>` : aboveAvg ? `<br><span style="font-size:12px;color:var(--coral)">That's above your weekly average</span>` : ''}${costLine}`;
    }
  } else {
    // Even with no THC, show cost for budget users
    const ppg = state.settings.pricePerGram;
    if (ppg > 0) {
      const g = parseFloat(state.form.grams) || 0;
      const g2 = parseFloat(state.form.grams2) || 0;
      const cost = Math.round((g + g2) * ppg * 100) / 100;
      if (cost > 0) el.innerHTML = `<span style="font-size:13px;font-weight:500;color:var(--t2)">Est. cost: ${state.settings.currency || '\u00a3'}${cost.toFixed(2)}</span>`;
      else el.innerHTML = '';
    } else {
      el.innerHTML = '';
    }
  }
}

function ratingDots(e) {
  function dot(val, col) {
    if (!val) return `<span style="width:7px;height:7px;border-radius:50%;background:var(--sep);display:inline-block"></span>`;
    const op = [0,.2,.4,.65,.85,1][val];
    return `<span style="width:7px;height:7px;border-radius:50%;background:${col};opacity:${op};display:inline-block" title="${val}/5"></span>`;
  }
  return `<span style="display:inline-flex;gap:3px;align-items:center;margin-left:4px">${dot(e.mood,'var(--teal)')}${dot(e.sleep,'var(--blue)')}</span>`;
}

function renderHistory() {
  const tab = state.histTab || 'entries';
  const sort = state.histSort || 'newest';
  const search = (state.histSearch || '').toLowerCase().trim();
  const allMg = state.entries.map(x => calcMg(x)).filter(x => x > 0);
  const histAvgMg = allMg.length ? allMg.reduce((a, b) => a + b, 0) / allMg.length : 0;

  // v3.4: date range + method filter state
  const dateFrom = state.histDateFrom || '';
  const dateTo = state.histDateTo || '';
  const methodFilters = state.histMethodFilters || [];
  const filterOpen = state.histFilterOpen || false;

  function mgBadgeCol(mg) { if (!mg || !histAvgMg) return 'var(--coral)'; if (mg <= histAvgMg * 0.85) return 'var(--teal)'; if (mg <= histAvgMg * 1.1) return 'var(--amber)'; return 'var(--coral)'; }
  function mgArrow(mg) { if (!mg || !histAvgMg) return ''; if (mg <= histAvgMg * 0.85) return '↓'; if (mg <= histAvgMg * 1.1) return '→'; return '↑'; }
  // v3.4: mood color helper (1-2=green, 3=amber, 4-5=red)
  function moodColor(val) { if (!val) return ''; if (val <= 2) return 'var(--teal)'; if (val <= 3) return 'var(--amber)'; return 'var(--coral)'; }

  let all = [...state.entries].reverse();
  const notesEntries = all.filter(e => e.notes && e.notes.trim());
  const purchaseEntries = all.filter(e => e.purchase > 0);

  // Apply search filter
  let filtered = tab === 'notes' ? notesEntries : tab === 'purchases' ? purchaseEntries : all;
  if (search) {
    filtered = filtered.filter(e => {
      const sympLabels = (e.symptoms || []).map(k => { const s = SYMPTOM_LIST.find(x => x.key === k); return s ? s.label.toLowerCase() : ''; }).join(' ');
      const trigLabels = (e.triggers || []).map(k => { const t = TRIGGER_TAGS.find(x => x.key === k); return t ? t.label.toLowerCase() : ''; }).join(' ');
      const text = `${e.date} ${e.notes || ''} ${e.grams || ''} ${e.strength || ''} ${sympLabels} ${trigLabels}`.toLowerCase();
      return text.includes(search);
    });
  }

  // v3.3.1: Apply sort
  if (sort === 'oldest') {
    filtered = [...filtered].reverse();
  } else if (sort === 'highest') {
    filtered = [...filtered].sort((a, b) => calcMg(b) - calcMg(a));
  } else if (sort === 'lowest') {
    filtered = [...filtered].sort((a, b) => calcMg(a) - calcMg(b));
  } else if (sort === 'zero') {
    filtered = filtered.filter(e => isZeroDay(e));
  }
  // else 'newest' — keep default order (already reversed)

  // v3.4: Compute summary stats for filtered results
  const filteredMgsPositive = filtered.map(x => calcMg(x)).filter(x => x > 0);
  const filteredAvgMg = filteredMgsPositive.length ? Math.round(filteredMgsPositive.reduce((a, b) => a + b, 0) / filteredMgsPositive.length) : 0;
  const filteredRestDays = filtered.filter(e => isZeroDay(e)).length;

  // Pagination
  const page = state.histPage || 0;
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const pageEntries = filtered.slice(0, (page + 1) * PAGE_SIZE);
  const hasMore = pageEntries.length < filtered.length;

  // v3.4: week headers for easier scanning
  let lastWeekKey = '';
  function weekKey(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    const day = d.getDay() || 7;
    const mon = new Date(d); mon.setDate(d.getDate() - (day - 1));
    return localDateStr(mon);
  }
  // v3.4: Precompute per-week average mg for week headers
  const weekAvgMap = {};
  if (tab === 'entries') {
    for (const e of all) {
      const wk = weekKey(e.date);
      if (!weekAvgMap[wk]) weekAvgMap[wk] = [];
      const mg = calcMg(e);
      if (mg > 0) weekAvgMap[wk].push(mg);
    }
  }
  const showWeekHeaders = (sort === 'newest' || sort === 'oldest') && !search && tab === 'entries' && !dateFrom && !dateTo && methodFilters.length === 0;

  const rows = pageEntries.map(e => {
    let weekHeader = '';
    if (showWeekHeaders) {
      const wk = weekKey(e.date);
      if (wk !== lastWeekKey) {
        lastWeekKey = wk;
        const wkDate = new Date(wk + 'T12:00:00');
        const wkEnd = new Date(wkDate); wkEnd.setDate(wkEnd.getDate() + 6);
        const lbl = fmtDate(wk) + ' \u2013 ' + fmtDate(localDateStr(wkEnd));
        const wkMgs = weekAvgMap[wk] || [];
        const wkAvg = wkMgs.length ? Math.round(wkMgs.reduce((a, b) => a + b, 0) / wkMgs.length) : 0;
        weekHeader = `<div class="hist-week-header">
          <span class="hist-week-label">${lbl}</span>
          <span class="hist-week-line"></span>
          ${wkAvg > 0 ? `<span class="hist-week-avg">avg ${wkAvg}mg</span>` : ''}
        </div>`;
      }
    }
    const mg = calcMg(e);
    const isZero = isZeroDay(e);
    const sympChips = (e.symptoms && e.symptoms.length && tab !== 'notes')
      ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${e.symptoms.slice(0,4).map(sym => { const k = typeof sym === 'object' ? sym.key : sym; const s = SYMPTOM_LIST.find(x => x.key === k); return s ? `<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(200,78,40,.1);color:var(--coral)">${s.icon} ${s.label}</span>` : ''; }).join('')}${e.symptoms.length > 4 ? `<span style="font-size:10px;color:var(--t3);padding:1px 4px">+${e.symptoms.length - 4}</span>` : ''}</div>`
      : '';
    const trigChips = (e.triggers && e.triggers.length && tab !== 'notes')
      ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${e.triggers.slice(0,4).map(k => { const tg = TRIGGER_TAGS.find(x => x.key === k); return tg ? `<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(48,176,122,.12);color:var(--accent)">${tg.icon} ${tg.label}</span>` : ''; }).join('')}${e.triggers.length > 4 ? `<span style="font-size:10px;color:var(--t3);padding:1px 4px">+${e.triggers.length - 4}</span>` : ''}</div>`
      : '';
    // v3.4: mini mg badge + mood dot for at-a-glance row preview
    const mgBadge = (!isZero && mg > 0) ? `<span class="hist-mg-badge" style="background:${mgBadgeCol(mg)}20;color:${mgBadgeCol(mg)}">${mg}mg</span>` : '';
    const moodDot = e.mood ? `<span class="hist-mood-dot" style="background:${moodColor(e.mood)}" title="Mood ${e.mood}/5"></span>` : '';
    return weekHeader + `<div class="hist-row" data-detail="${e.id}" style="cursor:pointer">
      <div class="hist-date">${fmtDate(e.date)}</div>
      <div class="hist-meta">
        ${tab === 'notes' ? `<span style="color:var(--t1)">${e.notes}</span><br><span style="color:var(--t3)">${e.grams != null ? e.grams + 'g' : ''}${e.strength != null ? ' @ ' + e.strength + '%' : ''} · ${mg}mg</span>` :
          isZero ? `<span style="color:var(--teal);font-weight:500">${(state.settings.goal?.type === 'break' && !state.settings.goal?.breakEnd) ? 'Stayed clean' : 'Rest day'}</span>${e.notes && e.notes !== 'Zero day' ? '<br><span style="color:var(--t3);font-style:italic">' + e.notes + '</span>' : ''}${sympChips}` :
          `${e.grams != null ? e.grams + 'g' : ''}${state.settings.knowsStrength && e.strength != null ? ' @ ' + e.strength + '%' : ''}${e.grams2 > 0 ? ' + ' + e.grams2 + 'g' + (e.strength2 ? ' @ ' + e.strength2 + '%' : '') : ''}${e.time ? ' · ' + fmtTime(e.time) : ''}
          ${e.oilMl > 0 ? '<br>Oil ' + e.oilMl + 'ml @ ' + (e.oilStrength ?? state.settings.oilDefaultStrength) + 'mg/ml' + (e.oilTime ? ' · ' + fmtTime(e.oilTime) : '') : ''}${e.cartPuffs > 0 ? '<br>' + e.cartPuffs + ' puffs' : ''}
          ${e.purchase > 0 ? '<br><span style="color:var(--accent);font-weight:500">Picked up ' + (state.settings.currency || '\u00a3') + e.purchase + '</span>' : ''}
          ${e.notes ? '<br><span style="color:var(--t3);font-style:italic">' + e.notes + '</span>' : ''}${trigChips}${sympChips}`}
      </div>
      ${tab !== 'notes' ? `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        ${isZero ? '<div class="hist-mg" style="color:var(--teal)">○</div>' : (mgBadge || '<div class="hist-mg" style="color:var(--t3)">—</div>')}
        <div style="display:flex;align-items:center;gap:4px">${moodDot}${ratingDots(e)}</div>
      </div>` : ''}
      <div style="display:flex">
        <button class="icon-btn" data-edit="${e.id}" style="color:var(--blue)" aria-label="Edit">✎</button>
        ${tab !== 'notes' ? `<button class="icon-btn" data-del="${e.id}" style="color:var(--danger)" aria-label="Delete">✕</button>` : ''}
      </div>
    </div>`;
  }).join('');

  // v3.4: Build method filter pills
  const mfPills = [
    { k: 'flower', l: 'Flower only', icon: '🌿' },
    { k: 'oil', l: 'Oil only', icon: '💧' },
    { k: 'triggers', l: 'With triggers', icon: '🎯' },
    { k: 'notes', l: 'With notes', icon: '📝' }
  ];
  const activeFilterCount = (dateFrom ? 1 : 0) + (dateTo ? 1 : 0) + methodFilters.length;

  document.getElementById('content').innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
      <div class="search-bar" style="flex:1;margin-bottom:0">
        <span style="color:var(--t3);font-size:14px">🔍</span>
        <input class="search-input" id="hist-search" type="text" placeholder="Search entries…" value="${state.histSearch || ''}">
        ${search ? '<button class="search-clear" id="hist-search-clear" aria-label="Clear search">✕</button>' : ''}
      </div>
      <button id="hist-filter-toggle" aria-label="Toggle history filters" style="width:40px;height:40px;border-radius:12px;border:1px solid ${activeFilterCount > 0 ? 'var(--accent)' : 'var(--glass-border)'};background:${activeFilterCount > 0 ? 'var(--accent-soft)' : 'var(--glass)'};color:${activeFilterCount > 0 ? 'var(--accent)' : 'var(--t3)'};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;flex-shrink:0;-webkit-tap-highlight-color:transparent">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M3 4h18M6 8h12M9 12h6M11 16h2"/></svg>
        ${activeFilterCount > 0 ? `<span style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center">${activeFilterCount}</span>` : ''}
      </button>
    </div>
    <div class="hist-filter-panel${filterOpen ? ' open' : ''}" id="hist-filter-panel">
      <div class="hist-filter-row">
        <div style="flex:1"><label for="hist-date-from">From</label><input type="date" id="hist-date-from" value="${dateFrom}"></div>
        <div style="flex:1"><label for="hist-date-to">To</label><input type="date" id="hist-date-to" value="${dateTo}"></div>
        ${(dateFrom || dateTo) ? `<button id="hist-date-clear" aria-label="Clear date filter" style="align-self:flex-end;padding:8px 10px;border-radius:10px;border:1px solid var(--glass-border);background:var(--glass);color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:0">✕</button>` : ''}
      </div>
    </div>
    ${tab === 'entries' ? `<div class="hist-method-pills">
      ${mfPills.map(p => `<button class="hist-method-pill${methodFilters.includes(p.k) ? ' active' : ''}" data-method-filter="${p.k}">${p.icon} ${p.l}</button>`).join('')}
    </div>` : ''}
    <div style="display:flex;gap:0;margin-bottom:10px;background:var(--glass2);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:var(--r);padding:3px">
      <button data-histtab="entries" style="flex:1;padding:12px 6px;border:none;border-radius:12px;font-size:12px;font-weight:500;cursor:pointer;background:${tab === 'entries' ? 'rgba(45,106,79,.25)' : 'transparent'};color:${tab === 'entries' ? '#fff' : 'var(--t2)'}${tab === 'entries' ? ';box-shadow:inset 0 1px 0 rgba(255,255,255,.15)' : ''}">All (${all.length})</button>
      <button data-histtab="notes" style="flex:1;padding:12px 6px;border:none;border-radius:12px;font-size:12px;font-weight:500;cursor:pointer;background:${tab === 'notes' ? 'rgba(45,106,79,.25)' : 'transparent'};color:${tab === 'notes' ? '#fff' : 'var(--t2)'}${tab === 'notes' ? ';box-shadow:inset 0 1px 0 rgba(255,255,255,.15)' : ''}">Notes (${notesEntries.length})</button>
      ${purchaseEntries.length > 0 ? `<button data-histtab="purchases" style="flex:1;padding:12px 6px;border:none;border-radius:12px;font-size:12px;font-weight:500;cursor:pointer;background:${tab === 'purchases' ? 'rgba(193,127,36,.25)' : 'transparent'};color:${tab === 'purchases' ? '#fff' : 'var(--t2)'}${tab === 'purchases' ? ';box-shadow:inset 0 1px 0 rgba(255,255,255,.15)' : ''}">💰 ${purchaseEntries.length}</button>` : ''}
    </div>
    ${tab === 'entries' ? (() => {
      const sortOpts = [
        { k: 'newest', l: 'Newest' },
        { k: 'oldest', l: 'Oldest' },
        { k: 'highest', l: '↑ Highest' },
        { k: 'lowest', l: '↓ Lowest' },
        { k: 'zero', l: state.settings.goal?.type === 'break' ? '✨ Clean days' : '✨ Rest days' }
      ];
      return `<div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px;-webkit-overflow-scrolling:touch">
        ${sortOpts.map(o => `<button data-hist-sort="${o.k}" style="flex-shrink:0;padding:6px 12px;border-radius:14px;border:1px solid ${sort === o.k ? 'var(--accent)' : 'var(--glass-border)'};background:${sort === o.k ? 'var(--accent-soft)' : 'var(--glass)'};color:${sort === o.k ? 'var(--accent)' : 'var(--t3)'};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .2s">${o.l}</button>`).join('')}
      </div>`;
    })() : ''}
    ${filtered.length > 0 ? `<div class="hist-summary-bar">
      <span>Showing ${filtered.length} ${filtered.length === 1 ? 'entry' : 'entries'}</span>
      ${filteredAvgMg > 0 ? `<span class="hist-summary-dot"></span><span>avg ${filteredAvgMg}mg</span>` : ''}
      ${filteredRestDays > 0 ? `<span class="hist-summary-dot"></span><span>${filteredRestDays} rest ${filteredRestDays === 1 ? 'day' : 'days'}</span>` : ''}
    </div>` : ''}
    ${search && !filtered.length ? '<div class="card cp" style="color:var(--t3);font-size:13px;text-align:center">No matches for "' + state.histSearch + '"</div>' : ''}
    <div class="card">${rows || '<div class="cp" style="color:var(--t3);font-size:13px">No ' + (tab === 'notes' ? 'notes' : 'entries') + ' yet.</div>'}</div>
    ${hasMore ? `<button class="load-more-btn" id="load-more-btn">Load more (${filtered.length - pageEntries.length} remaining)</button>` : ''}
    <p class="note">Showing ${pageEntries.length} of ${filtered.length}. ${tab === 'entries' ? 'Coloured dots = mood · sleep.' : ''}</p>
  `;
}

/* ═══════════════════════════════════════════════════════════
   RENDER: SETTINGS
   ═══════════════════════════════════════════════════════════ */
function renderSettings(s) {
  // History sub-view
  if (state.settingsView === 'history') {
    renderHistory();
    // v3.3.1: Prepend a richer header with back button + summary card
    const ct = document.getElementById('content');
    const cur = state.settings.currency || '\u00a3';
    const total = state.entries.length;
    const firstDate = total ? fmtDate(state.entries[0].date) : '\u2014';
    const lastDate = total ? fmtDate(state.entries[total - 1].date) : '\u2014';
    const totalSpent = state.entries.reduce((a, x) => a + (x.purchase || 0), 0);
    ct.insertAdjacentHTML('afterbegin', `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button type="button" id="back-to-settings" aria-label="Back to settings" class="icon-btn" style="color:var(--accent);width:44px;height:44px;flex-shrink:0">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div>
        <div style="font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.3px">Your history</div>
        <div style="font-size:11px;color:var(--t3);margin-top:1px">${total} ${total === 1 ? 'entry' : 'entries'} \u00b7 ${firstDate} \u2192 ${lastDate}${totalSpent > 0 ? ' \u00b7 ' + cur + totalSpent + ' total spent' : ''}</div>
      </div>
    </div>`);
    return;
  }

  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent || '');
  const canShare = typeof navigator !== 'undefined' && navigator.share;
  const curTheme = state.settings.theme || 'auto';
  const goal = state.settings.goal;

  // v3.3: derive current "plan" identity (intent + tags)
  const currentIntent = goal ? goal.type : (state.entries.length > 0 ? 'track' : null);
  // v5: reduce sub-mode aware labels
  const reduceLabel = goal && goal.reduceMode === 'maintain' ? 'Maintaining' : goal && goal.reduceMode === 'flow' ? 'Reducing' : 'Reducing';
  const intentLabels = {
    reduce: { icon: '\ud83d\udcc9', label: reduceLabel },
    budget: { icon: '\ud83d\udcb0', label: 'Budget tracking' },
    break: { icon: goal && goal.breakEnd ? '\u23f8' : '\ud83d\udeab', label: goal && goal.breakEnd ? 'On a break' : 'Stopping for good' },
    track: { icon: '\ud83d\udcca', label: 'Just tracking' }
  };
  const currentLabel = currentIntent ? intentLabels[currentIntent] : null;
  const userMotivations = state.settings.motivations || [];

  // v5: Build current goal target line (reduce sub-mode aware)
  let goalTargetLine = '';
  if (goal) {
    if (goal.type === 'reduce') {
      const rMode = goal.reduceMode || 'target';
      if (rMode === 'flow') {
        goalTargetLine = 'Going with the flow';
      } else if (rMode === 'maintain') {
        const mVal = goal.unit === 'mg' ? goal.targetMg : goal.targetGrams;
        goalTargetLine = mVal ? 'Maintaining around ' + mVal + (goal.unit === 'mg' ? 'mg' : 'g') : 'Finding my level';
      } else {
        goalTargetLine = goal.unit === 'mg' ? (goal.targetMg + ' mg/day') : (goal.targetGrams + ' g/day');
        if (goal.targetDate) goalTargetLine += ' \u00b7 by ' + fmtDate(goal.targetDate);
      }
    } else if (goal.type === 'budget') {
      goalTargetLine = (state.settings.currency || '\u00a3') + goal.weeklyBudget + '/week budget';
    } else if (goal.type === 'break') {
      goalTargetLine = goal.breakEnd ? 'Break until ' + fmtDate(goal.breakEnd) : 'Open-ended break';
    }
  }
  // v3.3.1: Mini sparkline for the plan card showing recent trend
  let planSparkHtml = '';
  if (state.entries.length >= 3) {
    const last7 = state.entries.slice(-7);
    const useMg = state.settings.knowsStrength;
    const vals = last7.map(e => useMg ? calcMg(e) : (e.grams || 0));
    if (vals.some(v => v > 0)) {
      const minV = Math.min(...vals);
      const maxV = Math.max(...vals);
      const range = maxV - minV || 1;
      const w = 60, h = 22;
      const points = vals.map((v, i) => {
        const x = (i / (vals.length - 1)) * w;
        const y = h - 3 - ((v - minV) / range) * (h - 6);
        return [x, y];
      });
      const pathD = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
      planSparkHtml = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;flex-shrink:0;opacity:.85"><path d="${pathD}" stroke="var(--accent)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${points[points.length-1][0]}" cy="${points[points.length-1][1]}" r="2" fill="var(--accent)"/></svg>`;
    }
  }

  // v3.4: Collapsible section helpers for settings
  const sCol = state.settings.collapsed;
  function setSecHdr(key, label, icon) {
    const open = !sCol[key];
    return '<div class="section-hdr" data-setting-collapse="' + key + '" style="margin-top:8px;margin-bottom:0;padding:12px 4px">' +
      '<div style="display:flex;align-items:center;gap:8px">' +
        '<span style="font-size:15px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--accent-soft);flex-shrink:0">' + icon + '</span>' +
        '<span style="font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.8px">' + label + '</span>' +

/* ═══════════════════════════════════════════════════════════
   RENDER: ACHIEVEMENTS
   ═══════════════════════════════════════════════════════════ */
function milestoneProgress(id, s) {
  switch (id) {
    case 'streak_7':    return { current: Math.min(s.streak, 7),   total: 7,   label: `${Math.min(s.streak, 7)} of 7 days` };
    case 'streak_14':   return { current: Math.min(s.streak, 14),  total: 14,  label: `${Math.min(s.streak, 14)} of 14 days` };
    case 'streak_30':   return { current: Math.min(s.streak, 30),  total: 30,  label: `${Math.min(s.streak, 30)} of 30 days` };
    case 'entries_30':  return { current: Math.min(s.days, 30),    total: 30,  label: `${Math.min(s.days, 30)} of 30 entries` };
    case 'entries_60':  return { current: Math.min(s.days, 60),    total: 60,  label: `${Math.min(s.days, 60)} of 60 entries` };
    case 'entries_100': return { current: Math.min(s.days, 100),   total: 100, label: `${Math.min(s.days, 100)} of 100 entries` };
    case 'zero_7':      return { current: Math.min(s.zeroDays, 7), total: 7,   label: `${Math.min(s.zeroDays, 7)} of 7 clean days` };
    case 'reduced_25': {
      const r = Math.max(0, s.reductionMg || 0);
      return { current: Math.min(r, 25), total: 25, label: r > 0 ? `${r}% reduced so far` : 'Start reducing' };
    }
    case 'reduced_50': {
      const r = Math.max(0, s.reductionMg || 0);
      return { current: Math.min(r, 50), total: 50, label: r > 0 ? `${r}% reduced so far` : 'Start reducing' };
    }
    case 'reduced_75': {
      const r = Math.max(0, s.reductionMg || 0);
      return { current: Math.min(r, 75), total: 75, label: r > 0 ? `${r}% reduced so far` : 'Start reducing' };
    }
    case 'goal_reached': {
      const gp = goalProgress();
      if (gp) return { current: Math.round(gp.progress * 100), total: 100, label: `${Math.round(gp.progress * 100)}% to goal` };
      return null; // no goal set
    }
    // v3.4: Extended milestone progress
    case 'streak_50':   return { current: Math.min(s.streak, 50),  total: 50,  label: `${Math.min(s.streak, 50)} of 50 days` };
    case 'streak_100':  return { current: Math.min(s.streak, 100), total: 100, label: `${Math.min(s.streak, 100)} of 100 days` };
    case 'entries_200': return { current: Math.min(s.days, 200),   total: 200, label: `${Math.min(s.days, 200)} of 200 entries` };
    case 'triggers_10': {
      const tc = state.entries.filter(x => Array.isArray(x.triggers) && x.triggers.length > 0).length;
      return { current: Math.min(tc, 10), total: 10, label: `${Math.min(tc, 10)} of 10 tagged entries` };
    }
    case 'mood_30': {
      const mc = state.entries.filter(x => x.mood != null).length;
      return { current: Math.min(mc, 30), total: 30, label: `${Math.min(mc, 30)} of 30 mood ratings` };
    }
    case 'oil_free_week': {
      let ofr = 0;
      for (let i = state.entries.length - 1; i >= 0; i--) {
        if ((state.entries[i].oilMl || 0) === 0) ofr++; else break;
      }
      return { current: Math.min(ofr, 7), total: 7, label: `${Math.min(ofr, 7)} of 7 oil-free days` };
    }
    case 'reduced_90': {
      const r90 = Math.max(0, s.reductionMg || 0);
      return { current: Math.min(r90, 90), total: 90, label: r90 > 0 ? `${r90}% reduced so far` : 'Start reducing' };
    }
    case 'budget_month': {
      const g = state.settings.goal;
      const _e = state.entries;
      if (!g || g.type !== 'budget' || !g.weeklyBudget || _e.length < 7) return { current: 0, total: 4, label: '0 of 4 weeks' };
      const ppg = state.settings.pricePerGram || 0;
      let weeksUnder = 0;
      for (let w = 0; w < 4; w++) {
        const start = _e.length - 7 * (w + 1), end = _e.length - 7 * w;
        if (start < 0) break;
        const ws = _e.slice(start, end);
        let sp = ws.reduce((a, x) => a + (x.purchase || 0), 0);
        if (sp <= 0 && ppg > 0) sp = ws.reduce((a, x) => a + ((x.grams || 0) + (x.grams2 || 0)) * ppg, 0);
        if (sp <= g.weeklyBudget) weeksUnder++; else break;
      }
      return { current: Math.min(weeksUnder, 4), total: 4, label: `${Math.min(weeksUnder, 4)} of 4 consecutive weeks` };
    }
    case 'weekend_warrior': {
      const ds = new Set(state.entries.map(x => x.date));
      const td = new Date(todayStr());
      let wkCount = 0;
      for (let w = 0; w < 4; w++) {
        let ok = true;
        for (let dayOff of [6, 0]) {
          const d = new Date(td);
          d.setDate(d.getDate() - ((d.getDay() - dayOff + 7) % 7) - 7 * w);
          if (!ds.has(localDateStr(d))) { ok = false; break; }
        }
        if (ok) wkCount++; else break;
      }
      return { current: Math.min(wkCount, 4), total: 4, label: `${Math.min(wkCount, 4)} of 4 weekends logged` };
    }
    case 'note_streak': {
      let nr = 0;
      for (let i = state.entries.length - 1; i >= 0; i--) {
        if (state.entries[i].notes && state.entries[i].notes.trim()) nr++; else break;
      }
      return { current: Math.min(nr, 7), total: 7, label: `${Math.min(nr, 7)} of 7 consecutive notes` };
    }
    default: return null; // first_log, first_zero, first_trigger, first_mood, new_low, early_bird — descriptive only
  }
}

    // v3.4: Extended milestone benefits

  // Milestones that are irrelevant/unreachable per goal type — hide them entirely
  const intentHide = {
