    reduce: ['clean_14d','clean_30d','budget_met','budget_month'],
    break: ['reduced_25','reduced_50','reduced_75','reduced_90','new_low','budget_met','budget_month'],
    // v6: Track-only users can't reach reduction/budget/clean milestones — hide them

  // v6: use 'track' as fallback key for no-goal users so intentHide filter applies

  const boosted = new Set(intentBoost[goalType] || []);
  // v3.3: add tag boosts

  const hidden = new Set(intentHide[goalType] || []);
  const locked = MILESTONE_DEFS.filter(d => !earned.has(d.id) && !hidden.has(d.id)).map(def => {
    const prog = milestoneProgress(def.id, s);
    const pct = prog ? Math.round((prog.current / prog.total) * 100) : 0;
    const boost = boosted.has(def.id) ? 50 : 0;
    return { def, prog, pct, sortScore: pct + boost };
  }).sort((a, b) => b.sortScore - a.sortScore);

  const comingUp = locked.filter(m => m.pct > 0).slice(0, 4);

  // Recovery timeline — only for quit/break users

// v3.3.1: Month calendar with color intensity per day
function buildCalendarMonth() {
  // Default to current month, allow scrubbing with _calMonthOffset
  const offset = state._calMonthOffset || 0;
  const now = new Date();
  const viewDate = new Date(now.getFullYear(), now.getMonth() + offset, 1);
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const monthName = viewDate.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDayOfWeek = (new Date(year, month, 1).getDay() + 6) % 7; // 0 = Monday
  const todayStrVal = todayStr();
  const goalT = state.settings.goal?.type || null;
  const isQuitLike = goalT === 'break';

  // Build color scale based on user's intent
  // For reduce/track: color intensity = usage (lower = greener, higher = redder)
  // For quit/break: color = clean (green) / used (red) / missed (dim)
  const monthEntries = state.entries.filter(e => {
    const [y, m] = e.date.split('-').map(Number);
    return y === year && (m - 1) === month;
  });
  const entryMap = {};
  monthEntries.forEach(e => { entryMap[e.date] = e; });

  // For reduce/track: compute avg and stddev for intensity scaling
  const allMg = state.entries.filter(e => !isZeroDay(e)).map(e => calcMg(e)).filter(v => v > 0);
  const avgMg = allMg.length ? allMg.reduce((a, b) => a + b, 0) / allMg.length : 0;

  // v3.3.1: 5-tier color scale — shared between cellColor and the legend below
  const scaleTiers = [
    { bg: 'rgba(48,176,122,.75)', border: 'var(--teal)', label: 'Much less' },
    { bg: 'rgba(74,158,114,.55)', border: 'rgba(74,158,114,.8)', label: 'Below avg' },
    { bg: 'rgba(224,160,48,.5)', border: 'var(--amber)', label: 'Around avg' },
    { bg: 'rgba(224,160,48,.75)', border: 'var(--amber)', label: 'Above avg' },
    { bg: 'rgba(208,80,50,.7)', border: 'var(--coral)', label: 'Much more' }
  ];
  const zeroColor = { bg: 'rgba(48,176,122,.85)', border: 'var(--teal)' };

  function cellColor(entry) {
    if (!entry) return { bg: 'var(--card2)', border: 'var(--sep)', tier: -1 };
    if (isZeroDay(entry)) return { ...zeroColor, tier: 'zero' };
    const mg = calcMg(entry);
    if (isQuitLike) {
      return { bg: 'rgba(208,80,50,.7)', border: 'var(--coral)', tier: 'slip' };
    }
    // Reduce/track: gradient scaled against user's own average
    if (avgMg === 0) return { ...scaleTiers[2], tier: 2 };
    const ratio = mg / avgMg;
    if (ratio <= 0.5) return { ...scaleTiers[0], tier: 0 };
    if (ratio <= 0.85) return { ...scaleTiers[1], tier: 1 };
    if (ratio <= 1.15) return { ...scaleTiers[2], tier: 2 };
    if (ratio <= 1.5) return { ...scaleTiers[3], tier: 3 };
    return { ...scaleTiers[4], tier: 4 };
  }

  const weekLabels = ['M','T','W','T','F','S','S'];
  const weekHdr = weekLabels.map(l => `<div style="font-size:10px;color:var(--t3);text-align:center;font-weight:700;letter-spacing:.3px;min-width:0">${l}</div>`).join('');

  // Build cells: empty cells for leading space, then days
  // v3.3.1: use aspect-ratio + min-width:0 on cells, and wrap in min-width:0 container to prevent overflow on narrow viewports
  const cells = [];
  for (let i = 0; i < firstDayOfWeek; i++) {
    cells.push('<div style="aspect-ratio:1;min-width:0"></div>');
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const entry = entryMap[dateStr];
    const { bg, border } = cellColor(entry);
    const isToday = dateStr === todayStrVal;
    const isFuture = dateStr > todayStrVal;
    const title = entry
      ? (isZeroDay(entry) ? fmtDate(dateStr) + ': rest day' : fmtDate(dateStr) + ': ' + (entry.grams != null ? entry.grams + 'g' : '') + (calcMg(entry) > 0 ? ' · ' + calcMg(entry) + 'mg' : ''))
      : (isFuture ? fmtDate(dateStr) + ': future' : fmtDate(dateStr) + ': not logged');
    const opacity = isFuture ? '.25' : '1';
    cells.push(`<div style="aspect-ratio:1;min-width:0;border-radius:7px;background:${bg};border:1px solid ${border};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${entry && !isZeroDay(entry) ? 'rgba(255,255,255,.95)' : entry ? 'rgba(255,255,255,.95)' : 'var(--t3)'};opacity:${opacity};${isToday ? 'box-shadow:0 0 0 2px var(--accent), 0 0 0 4px var(--accent-glow);z-index:2;position:relative' : ''};transition:transform .15s;box-sizing:border-box" title="${title}">${d}</div>`);
  }

  // Count for this month
  const logged = monthEntries.length;
  const zeroDays = monthEntries.filter(isZeroDay).length;
  const cur = state.settings.currency || '\u00a3';
  const monthSpend = monthEntries.reduce((a, e) => a + (e.purchase || 0), 0);

  // v3.3.1: Intent-aware legend showing what the colors mean
  let legendHtml = '';
  if (isQuitLike) {
    legendHtml = `<div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--sep);font-size:10px;color:var(--t3);flex-wrap:wrap">
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:${zeroColor.bg};border:1px solid ${zeroColor.border}"></span>Clean</span>
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:rgba(208,80,50,.7);border:1px solid var(--coral)"></span>Used</span>
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:var(--card2);border:1px solid var(--sep)"></span>Not logged</span>
    </div>`;
  } else {
    legendHtml = `<div style="display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--sep);font-size:10px;color:var(--t3);flex-wrap:wrap;justify-content:center">
      <span style="flex-shrink:0">Lower</span>
      ${scaleTiers.map(t => `<span style="width:12px;height:12px;border-radius:3px;background:${t.bg};border:1px solid ${t.border}" title="${t.label}"></span>`).join('')}
      <span style="flex-shrink:0">Higher</span>
      <span style="display:inline-flex;align-items:center;gap:4px;margin-left:8px"><span style="width:12px;height:12px;border-radius:3px;background:${zeroColor.bg};border:1px solid ${zeroColor.border}"></span>Rest</span>
    </div>`;
  }

  return `
    <div style="display:flex;align-items:center;gap:8px;margin:18px 0 8px;padding:0 2px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--t3)">\ud83d\udcc5 Calendar</div>
      <div style="flex:1;height:1px;background:var(--sep)"></div>
    </div>
    <div class="card cp" style="overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;min-width:0">
        <button type="button" data-cal-nav="-1" style="width:44px;height:44px;border-radius:8px;border:1px solid var(--glass-border);background:var(--glass);color:var(--t2);cursor:pointer;font-size:14px;font-family:inherit;-webkit-tap-highlight-color:transparent;flex-shrink:0" aria-label="Previous month">\u2039</button>
        <div style="font-size:14px;font-weight:700;color:var(--t1);text-align:center;min-width:0;flex:1">${monthName}</div>
        <button type="button" data-cal-nav="1" style="width:44px;height:44px;border-radius:8px;border:1px solid var(--glass-border);background:var(--glass);color:var(--t2);cursor:pointer;font-size:14px;font-family:inherit;-webkit-tap-highlight-color:transparent;flex-shrink:0;${offset >= 0 ? 'opacity:.35;pointer-events:none' : ''}" aria-label="Next month">\u203a</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;margin-bottom:6px;width:100%">${weekHdr}</div>
      <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;width:100%">${cells.join('')}</div>
      ${legendHtml}
      <div style="display:flex;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--sep);font-size:11px;color:var(--t3)">
        <span><strong style="color:var(--t1)">${logged}</strong> logged</span>
        ${zeroDays > 0 ? `<span><strong style="color:var(--teal)">${zeroDays}</strong> rest</span>` : ''}
        ${monthSpend > 0 ? `<span style="margin-left:auto"><strong style="color:var(--amber)">${cur}${monthSpend}</strong> spent</span>` : ''}
      </div>
    </div>
  `;
}

// v3.3: Recovery section — per-symptom timeline cards for quit/break users
function buildRecoverySection(goal) {
  const startD = new Date(goal.breakStart + 'T12:00:00');
  const today = new Date(todayStr() + 'T12:00:00');
  const daysIn = Math.max(0, Math.round((today - startD) / MS_PER_DAY));

  const isExpanded = state._recoveryExpanded !== false; // default expanded
  // v3.3.1: filter mode — 'all' (default) or 'active' (hide resolved)
  const filterMode = state._recoveryFilter || 'all';

  // Per-symptom card builder
  function symptomCard(s, idx) {
    const onset = s.onset || 1;
    const peak = s.peak || onset + 2;
    const resolved = s.resolved || peak + 14;
    // Status: 'pre' (before onset), 'onset', 'peak', 'easing', 'resolved'
    let status, statusLabel, statusColor, progress;
    if (daysIn < onset) {
      status = 'pre'; statusLabel = `Starts ~day ${onset}`; statusColor = 'var(--t3)'; progress = 0;
    } else if (daysIn < peak) {
      status = 'onset'; statusLabel = `Building (peak day ${peak})`; statusColor = '#e0a030'; progress = ((daysIn - onset) / (peak - onset)) * 33;
    } else if (daysIn === peak) {
      status = 'peak'; statusLabel = `Peak today`; statusColor = '#c84e28'; progress = 50;
    } else if (daysIn < resolved) {
      status = 'easing'; statusLabel = `Easing \u2014 most clear by day ${resolved}`; statusColor = '#3478c8'; progress = 50 + ((daysIn - peak) / (resolved - peak)) * 50;
    } else {
      status = 'resolved'; statusLabel = `Behind you \ud83c\udf89`; statusColor = '#1eb07a'; progress = 100;
    }
    const daysToResolve = Math.max(0, resolved - daysIn);
    // v3.3.1: celebratory style for resolved symptoms
    if (status === 'resolved') {
      return `<div class="card cp" style="background:linear-gradient(135deg, rgba(48,176,122,.12) 0%, rgba(48,176,122,.04) 60%, transparent 100%);border:1px solid rgba(48,176,122,.2);box-shadow:0 2px 8px rgba(48,176,122,.06)">
        <div style="display:flex;align-items:center;gap:11px">
          <div style="font-size:18px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:9px;background:rgba(48,176,122,.18);flex-shrink:0;position:relative;animation-delay:${(idx||0) * 50}ms">${s.icon}<span style="position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:#1eb07a;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--card)">\u2713</span></div>
          <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--t1)">${s.label}</div><div style="font-size:11px;color:#1eb07a;font-weight:600;margin-top:1px">Behind you \ud83c\udf89</div></div>
        </div>
      </div>`;
    }
    return `<div class="card cp" style="border-left:3px solid ${statusColor}">
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:8px">
        <div style="font-size:22px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:${s.color}22;flex-shrink:0">${s.icon}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:var(--t1)">${s.label}</div>
          <div style="font-size:11px;color:${statusColor};font-weight:600;margin-top:1px">${statusLabel}</div>
        </div>
        ${status !== 'pre' ? `<div style="text-align:right;flex-shrink:0"><div style="font-size:18px;font-weight:800;color:var(--t1);line-height:1">${daysToResolve}</div><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">days left</div></div>` : ''}
      </div>
      <div style="position:relative;height:5px;border-radius:3px;background:var(--card2);overflow:hidden;margin-bottom:9px">
        <div style="position:absolute;left:0;top:0;height:100%;width:${Math.min(100, progress)}%;background:${statusColor};border-radius:3px;transition:width .5s"></div>
      </div>
      <div style="font-size:11px;color:var(--t2);line-height:1.45;margin-bottom:6px">${s.desc}</div>
      <div style="font-size:11px;color:var(--t2);line-height:1.5;padding:8px 10px;background:var(--glass2);border-radius:8px;border:1px solid var(--glass-border)"><span style="color:var(--accent);font-weight:700">\u2728 Tip:</span> ${s.tip}</div>
    </div>`;
  }

  // Active vs resolved counts for header
  const activeCount = RECOVERY_SYMPTOMS.filter(s => daysIn >= s.onset && daysIn < (s.resolved || 999)).length;
  const resolvedCount = RECOVERY_SYMPTOMS.filter(s => daysIn >= (s.resolved || 999)).length;
  const totalDuration = Math.max(...RECOVERY_SYMPTOMS.map(s => s.resolved || 0));
  const recoveryProgress = Math.min(100, Math.round((daysIn / totalDuration) * 100));

  // v3.3.1: filter symptoms based on mode
  const symptomsToShow = filterMode === 'active'
    ? RECOVERY_SYMPTOMS.filter(s => daysIn < (s.resolved || 999))
    : RECOVERY_SYMPTOMS;

  return `
    <div style="display:flex;align-items:center;gap:8px;margin:18px 0 8px;padding:0 2px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent)">\ud83c\udf31 Recovery</div>
      <div style="flex:1;height:1px;background:var(--sep)"></div>
      <button id="recovery-toggle" style="font-size:11px;color:var(--t3);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 6px;-webkit-tap-highlight-color:transparent">${isExpanded ? 'Hide' : 'Show'} \u25be</button>
    </div>
    <div class="card cp" style="background:var(--card);border:1px solid rgba(45,106,79,.22);margin-bottom:10px">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:14px;font-weight:700;color:var(--t1)">Day ${daysIn} of recovery</div>
        <div style="font-size:11px;color:var(--t3)">${activeCount} active \u00b7 ${resolvedCount} resolved</div>
      </div>
      <div style="position:relative;height:6px;border-radius:3px;background:var(--card2);overflow:hidden;margin-bottom:8px">
        <div style="position:absolute;left:0;top:0;height:100%;width:${recoveryProgress}%;background:linear-gradient(90deg, var(--accent), #4a9e72);border-radius:3px;transition:width .5s;box-shadow:0 0 8px rgba(45,106,79,.3)"></div>
      </div>
      <div style="font-size:11px;color:var(--t3);text-align:center;margin-top:2px">${recoveryProgress}% through the typical 8-week journey</div>
    </div>
    ${isExpanded ? `
      <div style="display:flex;justify-content:center;gap:6px;margin-bottom:10px">
        <button data-recovery-filter="all" style="padding:5px 12px;border-radius:14px;border:1px solid ${filterMode === 'all' ? 'var(--accent)' : 'var(--glass-border)'};background:${filterMode === 'all' ? 'var(--accent-soft)' : 'var(--glass)'};color:${filterMode === 'all' ? 'var(--accent)' : 'var(--t3)'};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .2s">All (${RECOVERY_SYMPTOMS.length})</button>
        <button data-recovery-filter="active" style="padding:5px 12px;border-radius:14px;border:1px solid ${filterMode === 'active' ? 'var(--accent)' : 'var(--glass-border)'};background:${filterMode === 'active' ? 'var(--accent-soft)' : 'var(--glass)'};color:${filterMode === 'active' ? 'var(--accent)' : 'var(--t3)'};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .2s">Active only (${activeCount})</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px">${symptomsToShow.length > 0 ? symptomsToShow.map(symptomCard).join('') : '<div class="card cp" style="text-align:center;padding:24px"><div style="font-size:32px;margin-bottom:8px">\ud83c\udf89</div><div style="font-size:14px;font-weight:700;color:var(--t1);margin-bottom:4px">All symptoms behind you</div><div style="font-size:12px;color:var(--t3);line-height:1.5">You\'ve come through the typical recovery window. The hardest stuff is done.</div></div>'}</div>
    ` : ''}
  `;
}

/* ═══════════════════════════════════════════════════════════
   RENDER: STATS (all charts + detailed metrics)
   ═══════════════════════════════════════════════════════════ */
function renderStats(s) {
  killCharts();
  // v5.1: Graceful fallback if Chart.js CDN failed to load
  if (typeof Chart === 'undefined') {
    document.getElementById('content').innerHTML = `
      <div class="card" style="padding:32px 20px;text-align:center">
        <div style="font-size:36px;margin-bottom:12px">\ud83d\udcca</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">Charts unavailable</div>
        <div style="font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:16px">The chart library couldn\u2019t load. Check your connection, then reload.</div>
        <button class="btn-primary" onclick="location.reload()" style="display:inline-block;width:auto;padding:12px 24px">Reload</button>
      </div>`;
    return;
  }
  const ks = state.settings.knowsStrength;
  const fe = filteredEntries();

  if (state.entries.length < 3) {
    const needed = 3 - state.entries.length;
    const progress = (state.entries.length / 3) * 100;
    document.getElementById('content').innerHTML = `
      <div class="hero-card" style="padding:40px 24px 32px">
        <svg width="180" height="80" viewBox="0 0 180 80" style="margin-bottom:16px">
          <defs>
            <linearGradient id="bG" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--blue)" stop-opacity=".8"/>
              <stop offset="100%" stop-color="var(--blue)" stop-opacity=".2"/>
            </linearGradient>
            <linearGradient id="bGdim" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--t3)" stop-opacity=".25"/>
              <stop offset="100%" stop-color="var(--t3)" stop-opacity=".05"/>
            </linearGradient>
          </defs>
          ${[16, 26, 36, 31, 21, 41, 46].map((h, i) => { const x = 10 + i * 24; const filled = i < state.entries.length; return `<rect x="${x}" y="${66 - h}" width="16" height="${h}" rx="3" fill="url(#${filled ? 'bG' : 'bGdim'})"/>`; }).join('')}
        </svg>
        <div style="font-size:22px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px">${state.entries.length === 0 ? 'Your stats start here' : 'Almost there!'}</div>
        <div style="font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:6px;max-width:280px;margin-left:auto;margin-right:auto">${state.entries.length === 0 ? 'Charts unlock after 3 logs. The more you track, the more you see.' : needed === 1 ? 'One more log and your charts light up.' : needed + ' more logs unlock your first charts.'}</div>
        <div style="display:flex;gap:6px;justify-content:center;margin:16px 0 8px">
          ${[1,2,3].map(i => `<div style="width:32px;height:6px;border-radius:3px;background:${i <= state.entries.length ? 'var(--blue)' : 'var(--sep)'};transition:background .3s"></div>`).join('')}
        </div>
        <button class="btn-primary" style="margin:12px 0 0;width:auto;display:inline-block;padding:12px 32px" data-tab="add">Log ${needed === 1 ? 'today' : 'a day'}</button>
        <div style="font-size:11px;color:var(--accent);font-weight:600;margin-top:8px">${needed === 1 ? 'Just 1 more day to go!' : needed + ' days away from your first chart'}</div>
      </div>
      <div style="opacity:.4;pointer-events:none;margin-top:8px">
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:8px;padding:0 2px">What you'll unlock</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div class="card cp" style="text-align:center;padding:12px"><div style="font-size:18px;margin-bottom:4px">\ud83d\udcca</div><div style="font-size:11px;color:var(--t3)">Daily trends</div></div>
          <div class="card cp" style="text-align:center;padding:12px"><div style="font-size:18px;margin-bottom:4px">\ud83d\udcc8</div><div style="font-size:11px;color:var(--t3)">Weekly avg</div></div>
          <div class="card cp" style="text-align:center;padding:12px"><div style="font-size:18px;margin-bottom:4px">\ud83c\udf19</div><div style="font-size:11px;color:var(--t3)">Time patterns</div></div>
          <div class="card cp" style="text-align:center;padding:12px"><div style="font-size:18px;margin-bottom:4px">\ud83d\ude0a</div><div style="font-size:11px;color:var(--t3)">Mood trends</div></div>
        </div>
      </div>`;
    return;
  }

  const hasTimeData = fe.filter(e => e.time).length >= 3;
  const hasWbData = fe.filter(e => e.mood || e.sleep).length >= 3;
  const isBudgetUser = state.settings.goal?.type === 'budget';

  // Build spending chart HTML once (used in different positions based on user type)
  // v6.0.6: Only show when user has a budget goal OR has actually logged a purchase.
  // Previously the ppg-truthy check also unlocked the chart, which caused an empty
  // chart to render for quit users whose seeded pricePerGram was non-zero.
  const spendingChartHtml = (() => {
    const ppg = state.settings.pricePerGram;
    const hasAnyPurchase = state.entries.some(e => e.purchase > 0);
    const isBudgetGoal = state.settings.goal && state.settings.goal.type === 'budget';
    if (!isBudgetGoal && !hasAnyPurchase) return '';
    const cur = state.settings.currency || '\u00a3';
    const goal = state.settings.goal;
    const budget = goal && goal.type === 'budget' && goal.weeklyBudget > 0 ? goal.weeklyBudget : null;
    return `<div style="display:flex;align-items:center;gap:12px;margin:20px 0 12px"><div style="flex:1;height:1px;background:var(--sep)"></div><span style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px">SPENDING</span><div style="flex:1;height:1px;background:var(--sep)"></div></div>
    <div class="card"><div class="cp" style="padding-bottom:10px">
      <div class="card-title">Weekly spending</div>
      <div class="chart-wrap" style="height:200px"><div class="chart-inner"><canvas id="spending-canvas"></canvas></div></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px" id="spending-leg"></div>
    </div></div>`;
  })();

  // v3.3.1: Build intent-aware top summary card showing the most relevant 3-4 stats
  const cur = state.settings.currency || '\u00a3';
  const goalT = state.settings.goal?.type || null;
  const summaryStats = [];
  if (goalT === 'break') {
    summaryStats.push({ label: 'Days clean', value: s.zeroDays || 0, col: 'var(--teal)' });
    if (s.streak >= 1) summaryStats.push({ label: 'Streak', value: s.streak + 'd', col: 'var(--accent)' });
    if (s.moneySaved > 0) summaryStats.push({ label: 'Saved', value: cur + s.moneySaved, col: 'var(--teal)' });
    summaryStats.push({ label: 'Days tracked', value: s.days, col: 'var(--blue)' });
  } else if (goalT === 'budget') {
    if (s.weeklySpend != null) summaryStats.push({ label: 'This week', value: cur + s.weeklySpend, col: 'var(--amber)' });
    if (s.monthlySpend != null) summaryStats.push({ label: 'This month', value: cur + s.monthlySpend, col: 'var(--amber)' });
    if (s.moneySaved > 0) summaryStats.push({ label: 'Saved', value: cur + s.moneySaved, col: 'var(--teal)' });
    summaryStats.push({ label: 'Days tracked', value: s.days, col: 'var(--blue)' });
  } else if (goalT === 'reduce') {
    const rMode = state.settings.goal?.reduceMode || 'target';
    if (rMode === 'maintain') {
      const maintainAt = state.settings.goal?.maintainAt;
      if (maintainAt) summaryStats.push({ label: 'Your level', value: maintainAt + 'g', col: 'var(--accent)' });
      summaryStats.push({ label: '7-day avg', value: s.ar + 'g', col: 'var(--blue)' });
      if (s.moneySaved > 0) summaryStats.push({ label: 'Saved', value: cur + s.moneySaved, col: 'var(--teal)' });
      summaryStats.push({ label: 'Days tracked', value: s.days, col: 'var(--blue)' });
    } else if (rMode === 'flow') {
      summaryStats.push({ label: 'Days tracked', value: s.days, col: 'var(--blue)' });
      if (s.bestWeek) summaryStats.push({ label: 'Lightest week', value: s.bestWeek + 'g', col: 'var(--purple)' });
      if (s.zeroDays > 0) summaryStats.push({ label: 'Rest days', value: s.zeroDays, col: 'var(--teal)' });
      if (s.streak >= 1) summaryStats.push({ label: 'Streak', value: s.streak + 'd', col: 'var(--accent)' });
    } else {
      if (s.reductionMg > 0 || s.reductionG > 0) summaryStats.push({ label: 'Progress', value: (s.reductionMg || s.reductionG) + '%', col: 'var(--teal)' });
      if (s.bestWeek) summaryStats.push({ label: 'Best week', value: s.bestWeek + 'g', col: 'var(--purple)' });
      if (s.moneySaved > 0) summaryStats.push({ label: 'Saved', value: cur + s.moneySaved, col: 'var(--teal)' });
      if (s.streak >= 1) summaryStats.push({ label: 'Streak', value: s.streak + 'd', col: 'var(--accent)' });
    }
  } else {
    summaryStats.push({ label: 'Days tracked', value: s.days, col: 'var(--blue)' });
    if (s.bestWeek) summaryStats.push({ label: 'Best week', value: s.bestWeek + 'g', col: 'var(--purple)' });
    if (s.zeroDays > 0) summaryStats.push({ label: 'Rest days', value: s.zeroDays, col: 'var(--teal)' });
    if (s.streak >= 1) summaryStats.push({ label: 'Streak', value: s.streak + 'd', col: 'var(--accent)' });
  }
  // Trim to 4 stats max
  const topStats = summaryStats.slice(0, 4);
  // Period label from current range
  const r = Number(state.range);
  const rangeLabel = r === 7 ? 'Last 7 days' : r === 30 ? 'Last 30 days' : r === 60 ? 'Last 60 days' : r === 90 ? 'Last 90 days' : 'All time';
  const summaryCardHtml = `<div class="card cp" style="background:var(--card);border:1px solid var(--glass-border);margin-bottom:10px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent)">Snapshot</div>
      <div style="font-size:10px;color:var(--t3)">${rangeLabel}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(${topStats.length === 4 ? '2' : topStats.length},1fr);gap:8px">
      ${topStats.map(st => `<div style="padding:9px 11px;border-radius:9px;background:var(--glass2);border:1px solid var(--glass-border)"><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">${st.label}</div><div style="font-size:18px;font-weight:800;color:${st.col};margin-top:2px;line-height:1.1">${st.value}</div></div>`).join('')}
    </div>
  </div>`;

  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;margin-bottom:12px">
      <div class="range-segment">
        ${RANGES.map(([v, l]) => '<button class="range-btn' + (state.range === v ? ' active' : '') + '" data-range="' + v + '">' + l + '</button>').join('')}
      </div>
    </div>

    ${summaryCardHtml}

    <div id="stats-sections" style="display:flex;flex-direction:column">
    <div data-section="spending">${spendingChartHtml}</div>

    <div data-section="daily"><div class="card"><div class="cp" style="padding-bottom:10px">
      <div class="card-title" style="margin-bottom:10px">Daily overview</div>
      <div class="toggles" id="toggles" style="margin-bottom:10px"></div>
      <div id="mc-wrap" style="display:none"><div class="chart-wrap" style="height:260px"><div class="chart-inner"><canvas id="main-canvas"></canvas></div></div>
        <div class="legend" id="main-leg" style="margin-top:8px"></div>
      </div>
      <div id="mc-empty" style="display:none;padding:20px 0;text-align:center;font-size:13px;color:var(--t3)">Select a series above</div>
    </div></div></div>

    <div data-section="time">${hasTimeData ? (() => {
      // v3.3.1: compute average time of first session for the badge
      const timed = fe.filter(e => e.time);
      let avgTimeStr = '';
      if (timed.length > 0) {
        const mins = timed.map(e => { const [h, m] = e.time.split(':').map(Number); return h * 60 + m; });
        const avgMins = Math.round(mins.reduce((a, b) => a + b, 0) / mins.length);
        const ah = Math.floor(avgMins / 60);
        const am = avgMins % 60;
        avgTimeStr = String(ah).padStart(2, '0') + ':' + String(am).padStart(2, '0');
      }
      return `<div class="card"><div class="cp" style="padding-bottom:10px">

    })() : `<div class="card cp" style="text-align:center;padding:20px 20px 16px">

        }

          <div style="font-size:32px;margin-bottom:8px;filter:drop-shadow(0 2px 8px rgba(143,136,232,.3))">\ud83c\udf1b</div>
          <div class="card-title" style="margin-bottom:4px">Sober window</div>
          <p style="font-size:12px;color:var(--t2);line-height:1.5;margin:0 auto 14px;max-width:260px">Log your last session time for ${needed} more ${needed === 1 ? 'day' : 'days'} to unlock the chart \u2014 watch your daily window start to narrow as you taper.</p>
          <div style="display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:14px">${progressDots}<span style="font-size:11px;color:var(--t3);margin-left:6px">${have} / 3</span></div>

      return `<div class="card"><div class="cp" style="padding-bottom:10px">

          <div class="card-title" style="margin-bottom:0">Sober window</div>

          ${swd.some(d => d.bedtime != null) ? `<span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)"><span style="display:inline-block;width:10px;height:10px;color:${isDark() ? '#8f88e8' : '#6c65cc'};text-align:center;line-height:10px">\u00d7</span>Bedtime</span>` : ''}

    })()}</div>

    <div data-section="wellbeing">${(() => {
      if (!hasWbData) return state.entries.some(e => e.mood || e.sleep) ? `<div class="card cp" style="text-align:center;padding:20px 20px 16px">
        <div style="font-size:24px;margin-bottom:6px">\ud83d\ude0a</div>
        <div class="card-title">Wellbeing trends</div>
        <p style="font-size:12px;color:var(--t2);line-height:1.5;margin:0 0 10px">Rate ${3 - fe.filter(e => e.mood || e.sleep).length} more ${3 - fe.filter(e => e.mood || e.sleep).length === 1 ? 'day' : 'days'} to unlock mood and sleep insights.</p>
        <button class="btn-primary" style="margin:0;width:auto;display:inline-block;padding:10px 24px;font-size:12px" data-tab="add">Rate today</button>
      </div>` : '';
      // v3.3.2: dedicated wellbeing chart card — averages + chart + insight
      const wd = weeklyData().filter(w => w.mood != null || w.sleep != null).slice(-6);
      const weeksWithBoth = wd.filter(w => w.mood != null && w.mg != null);
      // v3.3.2: wellbeing insight — only show when we have enough data and something useful to say
      let insight = '';
      if (weeksWithBoth.length >= 4) {
        const sorted = [...weeksWithBoth].sort((a,b) => a.mg - b.mg);
        const half = Math.ceil(sorted.length / 2);
        const lo = sorted.slice(0, half), hi = sorted.slice(half);
        const avgLo = lo.reduce((s,w) => s + w.mood, 0) / lo.length;
        const avgHi = hi.reduce((s,w) => s + w.mood, 0) / hi.length;
        // Only show an insight if there's a clear pattern — avoid confident claims on weak data
        if (avgLo > avgHi + 0.4) insight = 'Mood tends to be higher in lighter weeks';
        else if (avgHi > avgLo + 0.4) insight = 'Mood hasn\u2019t shifted with changes yet \u2014 early days';
        // If no clear pattern, don't say anything — "no insight" is better than a misleading one
      }
      // v6.0.3: Average over all wellbeing entries (was last-30, which hid historical data)
      const moodVals = state.entries.filter(e => e.mood != null).map(e => e.mood);
      const sleepVals = state.entries.filter(e => e.sleep != null).map(e => e.sleep);
      const avgMood = moodVals.length ? (moodVals.reduce((a, b) => a + b, 0) / moodVals.length).toFixed(1) : null;
      const avgSleep = sleepVals.length ? (sleepVals.reduce((a, b) => a + b, 0) / sleepVals.length).toFixed(1) : null;
      // v6.0.4: Trend arrows — compare last 14 days vs prior 14 days
      const moodTrend = (() => {
        if (moodVals.length < 14) return null;
        const recent = moodVals.slice(-14);
        const prior = moodVals.slice(-28, -14);
        if (prior.length < 7) return null;
        const r = recent.reduce((a, b) => a + b, 0) / recent.length;
        const p = prior.reduce((a, b) => a + b, 0) / prior.length;
        const diff = +(r - p).toFixed(1);
        return { r, p, diff };
      })();
      const sleepTrend = (() => {
        if (sleepVals.length < 14) return null;
        const recent = sleepVals.slice(-14);
        const prior = sleepVals.slice(-28, -14);
        if (prior.length < 7) return null;
        const r = recent.reduce((a, b) => a + b, 0) / recent.length;
        const p = prior.reduce((a, b) => a + b, 0) / prior.length;
        const diff = +(r - p).toFixed(1);
        return { r, p, diff };
      })();
      function trendHtml(t, goodUp) {
        if (!t) return '';
        if (Math.abs(t.diff) < 0.15) return `<span style="font-size:10px;color:var(--t3);margin-top:2px;display:block">\u2192 steady vs prior weeks</span>`;
        const up = t.diff > 0;
        const good = (up && goodUp) || (!up && !goodUp);
        const col = good ? 'var(--teal)' : 'var(--coral)';
        const arrow = up ? '\u2191' : '\u2193';
        const sign = up ? '+' : '';
        return `<span style="font-size:10px;color:${col};margin-top:2px;display:block;font-weight:600">${arrow} ${sign}${t.diff} vs prior 2 wk</span>`;

      return `<div class="card cp" id="wb-card">
        <div class="card-title">Wellbeing</div>
        <div style="display:flex;gap:10px;margin-bottom:12px">
          ${avgMood ? `<div style="flex:1;padding:12px 10px 10px;border-radius:var(--rs);background:var(--glass2);border:1px solid var(--glass-border);text-align:center">
            <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">Mood</div>
            <div style="font-size:24px;font-weight:800;color:var(--teal);margin-top:2px;line-height:1.1">${avgMood}<span style="font-size:11px;font-weight:400;color:var(--t3);margin-left:1px">/5</span></div>
            ${trendHtml(moodTrend, true)}
          </div>` : ''}
          ${avgSleep ? `<div style="flex:1;padding:12px 10px 10px;border-radius:var(--rs);background:var(--glass2);border:1px solid var(--glass-border);text-align:center">
            <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">Sleep</div>
            <div style="font-size:24px;font-weight:800;color:var(--blue);margin-top:2px;line-height:1.1">${avgSleep}<span style="font-size:11px;font-weight:400;color:var(--t3);margin-left:1px">/5</span></div>
            ${trendHtml(sleepTrend, true)}
          </div>` : ''}
        </div>
        <div class="chart-wrap" style="height:180px"><div class="chart-inner"><canvas id="wb-canvas"></canvas></div></div>
        <div class="legend" id="wb-leg" style="margin-top:6px"></div>
        ${insight ? `<div style="font-size:12px;color:var(--accent);font-weight:500;margin-top:8px;padding-top:8px;border-top:1px solid var(--sep)">\u2728 ${insight}</div>` : ''}
      </div>`;
    })()}</div>

    <div data-section="triggers" id="trigger-card-slot"></div>

    <div data-section="weekly">${(() => {
      // v6.0.6: Don't render an empty Weekly averages card for users with no consumption
      // (e.g. quit users, or break users mid-break). They have nothing to average.
      const hasConsumption = state.entries.some(e => (e.grams || 0) > 0 || (e.oilMl || 0) > 0 || (e.cartPuffs || 0) > 0);
      if (!hasConsumption) return '';
      return `<div class="card"><div class="cp" style="padding-bottom:10px">
        <div class="card-title">Weekly averages</div>
        <div class="chart-wrap" style="height:220px"><div class="chart-inner"><canvas id="weekly-canvas"></canvas></div></div>
        <div class="legend" id="weekly-leg" style="margin-top:8px"></div>
      </div></div>`;
    })()}</div>

    </div><!-- end stats-sections -->

    ${s.days >= 7 ? (() => {
      const cur = state.settings.currency || '\u00a3';
      const gt = state.settings.goal?.type;
      const isBreak = gt === 'break';
      const isReduce = gt === 'reduce';
      const isBudget = gt === 'budget';

      // Build metric cards — order depends on intent
      // v3.3.1: trimmed labels and subtitles for scannability
      const mFlower = `<div class="metric"><div class="m-lbl">Flower</div><div class="m-val">${s.ar}g</div><div class="m-sub" style="color:${tCol(s.trendG)};font-weight:600">${tTxt(s.trendG)}</div></div>`;
      const mThc = ks ? `<div class="metric"><div class="m-lbl">THC</div><div class="m-val">${s.avg7mg}<span style="font-size:13px">mg</span></div><div class="m-sub" style="color:${tCol(s.trendMg)};font-weight:600">${tTxt(s.trendMg)}</div></div>` : '';
      const mReductionG = s.reductionG > 0 ? `<div class="metric"><div class="m-lbl">vs week 1</div><div class="m-val" style="color:var(--teal)">\u2212${s.reductionG}%</div><div class="m-sub">flower${s.fwAvg ? ' \u00b7 from ' + s.fwAvg + 'g' : ''}</div></div>` : '';
      const mReductionMg = ks && s.reductionMg > 0 ? `<div class="metric"><div class="m-lbl">vs week 1</div><div class="m-val" style="color:var(--teal)">\u2212${s.reductionMg}%</div><div class="m-sub">THC</div></div>` : '';
      const mSpend = s.weeklySpend != null ? `<div class="metric"><div class="m-lbl">This week</div><div class="m-val">${cur}${s.weeklySpend}</div><div class="m-sub">${s.monthlySpend != null ? 'month \u00b7 ' + cur + s.monthlySpend : ''}</div></div>` : '';
      const mBestG = `<div class="metric"><div class="m-lbl">Best week</div><div class="m-val" style="color:var(--blue)">${s.bestWeek || '\u2014'}${s.bestWeek ? 'g' : ''}</div><div class="m-sub">lowest avg</div></div>`;
      const mBestMg = ks ? `<div class="metric"><div class="m-lbl">Best week</div><div class="m-val" style="color:var(--blue)">${s.bestWeekMg != null ? s.bestWeekMg + 'mg' : '\u2014'}</div><div class="m-sub">lowest THC avg</div></div>` : '';
      // v6.0.6: suppress "was X" when prior value equals current (avoids "was 19:15" / "19:15")
      const mTime = `<div class="metric"><div class="m-lbl">First session</div><div class="m-val">${s.atRecentStr}</div><div class="m-sub">${(s.atRecentStr && s.atStr && s.atRecentStr !== s.atStr) ? 'was ' + s.atStr : 'no change'}</div></div>`;
      const mCart = s.hasCartData ? `<div class="metric"><div class="m-lbl">Vape puffs</div><div class="m-val">${s.avgCartPuffs7}</div><div class="m-sub">per day</div></div>` : '';
      const mZero = s.zeroDays > 0 ? `<div class="metric"><div class="m-lbl">${isBreak ? 'Clean days' : 'Rest days'}</div><div class="m-val" style="color:var(--teal)">${s.zeroDays}</div><div class="m-sub">${s.zeroDaysL30 > 0 ? s.zeroDaysL30 + ' this month' : 'total'}${s.cleanDayStreak > 0 ? ' \u00b7 ' + s.cleanDayStreak + 'd streak' : ''}</div></div>` : '';
      // v6.0.6: suppress "Saved vs week 1" for track users (no goal, no baseline to save against)
      const mSaved = (s.moneySaved != null && state.settings.goal) ? `<div class="metric"><div class="m-lbl">Saved</div><div class="m-val" style="color:var(--teal)">${cur}${s.moneySaved}</div><div class="m-sub">vs week 1</div></div>` : '';

      // Intent-based ordering
      let metrics;
      if (isBreak) {
        metrics = [mZero, mSaved, mSpend, mFlower, mThc, mTime, mBestG, mBestMg, mCart, mReductionG, mReductionMg];
      } else if (isBudget) {
        metrics = [mSpend, mSaved, mFlower, mThc, mReductionG, mReductionMg, mBestG, mBestMg, mTime, mCart, mZero];
      } else if (isReduce) {
        metrics = [mFlower, mThc, mReductionG, mReductionMg, mBestG, mBestMg, mSpend, mSaved, mTime, mCart, mZero];
      } else {
        metrics = [mFlower, mThc, mBestG, mBestMg, mSpend, mSaved, mReductionG, mReductionMg, mTime, mCart, mZero];
      }

      return `<div style="display:flex;align-items:center;gap:12px;margin:20px 0 12px"><div style="flex:1;height:1px;background:var(--sep)"></div><span style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px">DETAILS</span><div style="flex:1;height:1px;background:var(--sep)"></div></div><div class="card cp">
      <div class="metrics">${metrics.filter(Boolean).join('')}</div>
      ${s.ratedDays > 0 ? `<div style="margin-top:8px;padding-top:12px;border-top:.5px solid var(--sep)"><div class="metrics">
        <div class="metric"><div class="m-lbl">Mood</div><div class="m-val" style="color:var(--teal)">${s.mood7 || '\u2014'}<span style="font-size:13px">/5</span></div><div class="m-sub">${(s.mood7 && s.moodAll && s.mood7 !== s.moodAll) ? 'was ' + s.moodAll : 'overall ' + (s.moodAll || '\u2014')}</div></div>
        <div class="metric"><div class="m-lbl">Sleep</div><div class="m-val" style="color:var(--blue)">${s.sleep7 || '\u2014'}<span style="font-size:13px">/5</span></div><div class="m-sub">${(s.sleep7 && s.sleepAll && s.sleep7 !== s.sleepAll) ? 'was ' + s.sleepAll : 'overall ' + (s.sleepAll || '\u2014')}</div></div>
      </div></div>` : ''}
    </div>`;
    })() : ''}
  `;

  // v3.3.2: Reorder stats sections based on user intent
  // v6.0.2: Sober window hidden for quit/break/budget (not meaningful for those paths)
  const sectionContainer = document.getElementById('stats-sections');
  if (sectionContainer) {
    const goalType = state.settings.goal?.type || 'track';
    const isOpenEndedBreak = goalType === 'break' && !state.settings.goal?.breakEnd;
    const orders = {
      // Quit/open-ended-break: no sober window (goal is zero sessions)
      // Timed break: no sober window during the break (they're logging rest days)
      break:  ['wellbeing','triggers','daily','time','weekly','spending'],
      // Reduce: sober window is THE narrative ("watch the band narrow")
      reduce: ['daily','weekly','wellbeing','triggers','time','sober','spending'],
      // Budget: orthogonal to timing, hide it
      budget: ['spending','daily','weekly','wellbeing','triggers','time'],
    };
    // Track-only (no goal): keep sober window — pattern observers want all trends
    const defaultOrder = ['daily','time','sober','wellbeing','triggers','weekly','spending'];
    const order = orders[goalType] || defaultOrder;
    const orderSet = new Set(order);
    // Reorder visible sections
    order.forEach((key, i) => {
      const el = sectionContainer.querySelector(`[data-section="${key}"]`);
      if (el) { el.style.order = i; el.style.display = ''; }
    });
    // Hide sections not in this goal's order list
    sectionContainer.querySelectorAll('[data-section]').forEach(el => {
      const key = el.getAttribute('data-section');
      if (!orderSet.has(key)) el.style.display = 'none';
    });
  }

  buildToggles();
  buildTriggerCard(fe);
  buildCharts();
  _buildProgressCharts();
}

// v3.4: Render trigger patterns card into its slot (avoids deep template nesting)
function buildTriggerCard(fe) {
  const slot = document.getElementById('trigger-card-slot');
  if (!slot) return;
  const trigEntries = fe.filter(e => Array.isArray(e.triggers) && e.triggers.length > 0);
  if (trigEntries.length < 7) { slot.innerHTML = ''; return; }
  const freqs = triggerFrequency(fe);
  if (freqs.length === 0) { slot.innerHTML = ''; return; }
  const maxCount = freqs[0].count;
  const corrs = triggerCorrelation(fe);
  const heatmap = triggerDayHeatmap(fe);

  let freqHtml = '';
  freqs.slice(0, 6).forEach(function(f) {
    const tg = TRIGGER_TAGS.find(function(x) { return x.key === f.key; });
    if (!tg) return;
    const pct = Math.round((f.count / maxCount) * 100);
    freqHtml += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
      + '<div style="min-width:72px;font-size:11px;color:var(--t2);white-space:nowrap">' + tg.icon + ' ' + tg.label + '</div>'
      + '<div style="flex:1;height:14px;border-radius:7px;background:var(--glass2);overflow:hidden">'
      + '<div style="width:' + pct + '%;height:100%;border-radius:7px;background:linear-gradient(90deg,var(--accent),var(--teal));transition:width .4s"></div>'
      + '</div>'
      + '<div style="min-width:32px;text-align:right;font-size:11px;font-weight:700;color:var(--t1)">' + f.count + '</div>'
      + '</div>';
  });

  let corrHtml = '';
  if (corrs.length > 0) {
    let badges = '';
    corrs.forEach(function(c) {
      const tg = TRIGGER_TAGS.find(function(x) { return x.key === c.key; });
      if (!tg) return;
      const isUp = c.pctDiff > 0;
      const col = isUp ? 'var(--coral)' : 'var(--teal)';
      const arrow = isUp ? '\u2191' : '\u2193';
      badges += '<div style="flex:1;min-width:90px;padding:8px 10px;border-radius:var(--rs);background:var(--glass2);border:1px solid var(--glass-border)">'
        + '<div style="font-size:10px;color:var(--t3);margin-bottom:2px">' + tg.icon + ' ' + tg.label + '</div>'
        + '<div style="font-size:15px;font-weight:800;color:' + col + '">' + arrow + Math.abs(c.pctDiff) + '%</div>'
        + '<div style="font-size:9px;color:var(--t3)">' + c.avg + 'mg avg</div>'
        + '</div>';
    });
    corrHtml = '<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--sep)">'
      + '<div style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px">vs your average</div>'
      + '<div style="display:flex;flex-wrap:wrap;gap:6px">' + badges + '</div>'
      + '</div>';
  }

  let heatHtml = '';
  if (heatmap && heatmap.length > 0) {
    const dayLabels = ['M','T','W','T','F','S','S'];
    let rows = '';
    heatmap.slice(0, 3).forEach(function(h) {
      const tg = TRIGGER_TAGS.find(function(x) { return x.key === h.key; });
      if (!tg) return;
      const mx = Math.max.apply(null, h.counts);
      let cells = '';
      h.counts.forEach(function(c, i) {
        const opacity = mx > 0 ? Math.max(0.08, c / mx) : 0.08;
        cells += '<div style="text-align:center">'
          + '<div style="height:20px;border-radius:4px;background:rgba(48,176,122,' + opacity.toFixed(2) + ');display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:' + (c > 0 ? 'var(--t1)' : 'transparent') + '">' + c + '</div>'
          + '<div style="font-size:8px;color:var(--t3);margin-top:1px">' + dayLabels[i] + '</div>'
          + '</div>';
      });
      rows += '<div style="margin-bottom:8px">'
        + '<div style="font-size:11px;color:var(--t2);margin-bottom:4px">' + tg.icon + ' ' + tg.label + '</div>'
        + '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">' + cells + '</div>'
        + '<div style="font-size:10px;color:var(--accent);margin-top:3px">peaks ' + h.peakDays.join(', ') + '</div>'
        + '</div>';
    });
    heatHtml = '<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--sep)">'
      + '<div style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px">Day patterns</div>'
      + rows + '</div>';
  }

  slot.innerHTML = '<div class="card cp">'
    + '<div class="card-title">\ud83d\udd0d Trigger patterns</div>'
    + freqHtml + corrHtml + heatHtml
    + '</div>';
}

function _buildProgressCharts() {
  const data = cd();
  const dark = isDark();
  const dense = data.length > 21;
  const n = data.length;
  const labels = data.map(d => d.lbl);

  // Time chart
  const tcEl = document.getElementById('time-canvas');
  if (tcEl) {
    const pts = data.map((d, i) => d.t != null ? { x: i, y: d.t, lbl: d.lbl, ts: d.ts, notes: d.notes, date: d.date } : null).filter(Boolean);
    function seasonalLight(month) {
      const table = [
        { rise: 8.1, set: 16.0 }, { rise: 7.3, set: 17.0 }, { rise: 6.3, set: 18.2 }, { rise: 5.8, set: 19.5 },
        { rise: 5.1, set: 20.6 }, { rise: 4.7, set: 21.4 }, { rise: 5.0, set: 21.3 }, { rise: 5.6, set: 20.4 },
        { rise: 6.5, set: 19.1 }, { rise: 7.3, set: 17.7 }, { rise: 7.4, set: 16.1 }, { rise: 8.1, set: 15.6 },
      ];
      return table[month];
    }
    const sunPlugin = {
      id: 'sunBands',
      beforeDatasetsDraw(chart) {
        const { ctx, chartArea: { top, bottom, left, right }, scales: { x, y } } = chart;
        const dk = isDark();
        const dayA = dk ? 0.06 : 0.12, duskA = dk ? 0.09 : 0.14, nightA = dk ? 0.16 : 0.10;
        const nPts = data.length;
        const colW = (right - left) / Math.max(nPts - 1, 1);
        for (let i = 0; i < nPts; i++) {
          const d = data[i]; if (!d.date) continue;
          const month = new Date(d.date + 'T12:00:00').getMonth();
          const sl = seasonalLight(month);
          const cx = left + i * colW;
          const w = Math.max(colW + 1, 2);
          function band(yMin, yMax, color) {
            const clampMin = Math.max(yMin, 6), clampMax = Math.min(yMax, 24);
            if (clampMin >= clampMax) return;
            const py1 = y.getPixelForValue(clampMax), py2 = y.getPixelForValue(clampMin);
            ctx.save(); ctx.fillStyle = color;
            ctx.fillRect(cx - w / 2, Math.min(py1, py2), w, Math.abs(py2 - py1));
            ctx.restore();
          }
          band(sl.rise, sl.set, `rgba(255,210,60,${dayA})`);
          band(sl.set, sl.set + 1.5, `rgba(240,130,50,${duskA})`);
          band(sl.set + 1.5, 24, `rgba(60,80,160,${nightA})`);
          band(6, sl.rise, `rgba(60,80,160,${nightA})`);
        }
      }
    };
    const oilPts = data.map((d, i) => d.ot != null ? { x: i, y: d.ot, lbl: d.lbl, ts: d.ots, notes: 'Oil dose' } : null).filter(Boolean);
    const avg7time = data.map((_, i) => {
      const win = data.slice(Math.max(0, i - 6), i + 1);
      const valid = win.filter(d => d.t != null);
      if (!valid.length) return null;
      return { x: i, y: +(valid.reduce((s, d) => s + d.t, 0) / valid.length).toFixed(3) };
    }).filter(Boolean);
    const tickCol = dark ? 'rgba(235,235,245,.35)' : '#aaa';
    sizeCanvas(tcEl);
    if (timeChart) { timeChart.destroy(); timeChart = null; }
    timeChart = new Chart(tcEl, {
      type: 'scatter',
      data: { datasets: [
        { data: pts, backgroundColor: dark ? 'rgba(143,136,232,.85)' : 'rgba(108,101,204,.85)', pointRadius: dense ? 3 : 5, pointHoverRadius: 8, label: 'First smoke' },
        { data: oilPts, backgroundColor: dark ? 'rgba(129,140,248,.8)' : 'rgba(99,102,241,.8)', pointRadius: dense ? 2.5 : 4, pointHoverRadius: 8, pointStyle: 'triangle', label: 'Oil dose' },
        { type: 'line', data: avg7time, borderColor: dark ? 'rgba(143,136,232,.6)' : 'rgba(108,101,204,.6)', backgroundColor: 'transparent', pointRadius: 0, tension: 0.4, borderWidth: 2, borderDash: [6,3], label: '7-day avg' },
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: _chartTooltipOpts(true, function(pt, ds) {
          if (!pt || !pt.raw) return '';
          var d = pt.raw;
          return d.notes === 'Oil dose' ? 'Oil dose: ' + d.ts : 'First smoke: ' + d.ts;
        }, function(items) { return items && items[0] != null ? [items[0].raw.lbl] : []; })},
        scales: {
          x: { type: 'linear', min: -0.5, max: n - 0.5, ticks: { callback: (_, i, tk) => { const idx = Math.round(tk[i].value); return labels[idx] || ''; }, autoSkip: true, maxRotation: 40, font: { size: 10 }, color: tickCol }, grid: { display: false } },
          y: { min: 6, max: 24, ticks: { stepSize: 2, font: { size: 10 }, color: tickCol, callback: v => v >= 6 && v <= 23 ? v + ':00' : v === 24 ? '0:00' : '' }, grid: { color: dark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.05)' } }
        }
      },
      plugins: [sunPlugin, tooltipPinPlugin],
    });
  }

  // Wellbeing chart — only show entries that have mood or sleep data
  // v6.0.3: Bypass state.range filter — mood/sleep is longitudinal data,
  // users want to see their full history (e.g. Apple Health imports going
  // back months) regardless of the daily-consumption range selector.
  // v6.0.4: Raw daily mood/sleep ratings are jagged; dense datasets show a
  // faint daily line + a bold 7-day rolling average as the primary trend.
  const wbEl = document.getElementById('wb-canvas');
  if (wbEl) {
    const wbData = state.entries
      .filter(e => e.mood != null || e.sleep != null)
      .map(e => ({ lbl: fmtDate(e.date), date: e.date, mood: e.mood ?? null, sleep: e.sleep ?? null }));
    const wbLabels = wbData.map(d => d.lbl);
    const wbDense = wbData.length > 21;
    const wellCols = dark ? { mood: '#30b07a', sleep: '#4d9de0' } : { mood: '#1a9068', sleep: '#3478c8' };
    const tickCol = dark ? 'rgba(235,235,245,.35)' : '#aaa';
    sizeCanvas(wbEl);
    const wbCtx = wbEl.getContext('2d');
    const wbDatasets = [];
    const moodRaw = wbData.map(d => d.mood);
    const sleepRaw = wbData.map(d => d.sleep);
    const moodSmooth = wbDense ? rollingAvg7(moodRaw) : moodRaw;
    const sleepSmooth = wbDense ? rollingAvg7(sleepRaw) : sleepRaw;
    const moodGrad = wbCtx.createLinearGradient(0, 0, 0, wbEl.height || 200);
    moodGrad.addColorStop(0, dark ? 'rgba(48,176,122,.22)' : 'rgba(26,144,104,.18)');
    moodGrad.addColorStop(1, dark ? 'rgba(48,176,122,.0)' : 'rgba(26,144,104,.0)');
    // Faint raw daily line (only when dense)
    if (wbDense) {
      wbDatasets.push({ label: 'Mood (daily)', data: moodRaw, borderColor: hexA(wellCols.mood, 0.22), backgroundColor: 'transparent', fill: false, pointRadius: 0, tension: 0.25, spanGaps: true, borderWidth: 1 });
    }
    // Primary mood line: 7-day smoothed (or raw for sparse data)
    wbDatasets.push({ label: 'Mood', data: moodSmooth, borderColor: wellCols.mood, backgroundColor: moodGrad, fill: 'origin', pointRadius: wbDense ? 0 : 3, pointHoverRadius: 8, tension: 0.4, spanGaps: true, borderWidth: 2.5 });
    const sleepGrad = wbCtx.createLinearGradient(0, 0, 0, wbEl.height || 200);
    sleepGrad.addColorStop(0, dark ? 'rgba(77,157,224,.22)' : 'rgba(52,120,200,.18)');
    sleepGrad.addColorStop(1, dark ? 'rgba(77,157,224,.0)' : 'rgba(52,120,200,.0)');
    if (wbDense) {
      wbDatasets.push({ label: 'Sleep (daily)', data: sleepRaw, borderColor: hexA(wellCols.sleep, 0.22), backgroundColor: 'transparent', fill: false, pointRadius: 0, tension: 0.25, spanGaps: true, borderWidth: 1, borderDash: [2, 2] });
    }
    wbDatasets.push({ label: 'Sleep', data: sleepSmooth, borderColor: wellCols.sleep, backgroundColor: sleepGrad, fill: 'origin', pointRadius: wbDense ? 0 : 3, pointHoverRadius: 8, tension: 0.4, spanGaps: true, borderWidth: 2.5, borderDash: [4,2] });
    const qualityBands = {
      id: 'qualityBands',
      beforeDatasetsDraw(chart) {
        const { ctx, chartArea: { top, bottom, left, right }, scales: { y } } = chart;
        const dk = isDark();
        function hBand(yMin, yMax, color) { const py1 = y.getPixelForValue(yMax), py2 = y.getPixelForValue(yMin); ctx.save(); ctx.fillStyle = color; ctx.fillRect(left, Math.min(py1, py2), right - left, Math.abs(py2 - py1)); ctx.restore(); }
        hBand(0.5, 2, dk ? 'rgba(200,78,40,.04)' : 'rgba(200,78,40,.05)');
        hBand(4, 5.5, dk ? 'rgba(30,176,122,.04)' : 'rgba(30,176,122,.05)');
      }
    };
    if (wbChart) { wbChart.destroy(); wbChart = null; }
    wbChart = new Chart(wbEl, {
      type: 'line', data: { labels: wbLabels, datasets: wbDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { autoSkip: true, maxRotation: 40, font: { size: 10 }, color: tickCol }, grid: { display: false } },
          y: { min: 0.5, max: 5.5, ticks: { stepSize: 1, callback: v => [1,2,3,4,5].includes(v) ? String(v) : '', font: { size: 11 }, color: tickCol }, grid: { color: dark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.04)' } },
        }
      },
      plugins: [qualityBands],
    });
    // v6.0.4: Filter out (daily) helper datasets from the legend — they're
    // there for visual context only.
    document.getElementById('wb-leg').innerHTML = wbDatasets
      .filter(d => !/\(daily\)/.test(d.label))
      .map(d => {
        const dash = d.borderDash;
        return `<span class="leg-item"><span class="leg-line" style="${dash ? 'background:repeating-linear-gradient(90deg,' + d.borderColor + ' 0 4px,transparent 4px 7px)' : 'background:' + d.borderColor}"></span>${d.label}${wbDense ? ' <span style="color:var(--t3);font-size:10px;font-weight:400">· 7-day avg</span>' : ''}</span>`;
      }).join('');
  }
}

// Helper for onboarding goal type cards (outside template literal to avoid nesting issues)
function obIntentCard(type, icon, title, desc) {
  const sel = state._obIntent === type;
  const border = sel ? 'var(--accent)' : 'var(--glass-border)';
  const bg = sel ? 'linear-gradient(135deg, rgba(45,106,79,.1), rgba(45,106,79,.04))' : 'var(--glass)';
  const descCol = sel ? 'var(--accent)' : 'var(--t3)';
  const shadow = sel ? 'box-shadow:0 4px 16px rgba(45,106,79,.18), inset 0 1px 0 rgba(255,255,255,.2);' : 'box-shadow:0 1px 3px rgba(0,0,0,.04);';
  const iconBg = sel ? 'background:linear-gradient(135deg, var(--accent-glow), rgba(45,106,79,.1));' : 'background:var(--glass2);';

function obGoalInputs(effectiveKs, hasFlower, goalUnit, suggestions, selPreset, autoTarget) {
  const intent = state._obIntent;
  if (!intent || intent === 'quit' || intent === 'track') return '';
  let h = '<div style="animation:fadeSlideIn .25s ease;margin-top:12px">';

  if (intent === 'reduce') {
    // v5: Reduce sub-mode chooser (target / maintain / flow)
    var rMode = state._obReduceMode || 'target';
    var rmOpts = [
      { key: 'target', icon: '\ud83c\udfaf', label: 'Set a target', desc: 'Pick a number and work toward it' },
      { key: 'maintain', icon: '\u2696\ufe0f', label: 'Find my level', desc: 'Settle into an amount that works' },
      { key: 'flow', icon: '\ud83c\udf0a', label: 'Go with the flow', desc: 'Just trend down, no pressure' }
    ];
    h += '<div style="font-size:12px;font-weight:600;color:var(--t1);margin-bottom:8px">How do you want to reduce?</div>';
    h += '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">';
    rmOpts.forEach(function(opt) {
      var isSel = rMode === opt.key;
      var bdr = isSel ? 'var(--accent)' : 'var(--glass-border)';
      var bg = isSel ? 'linear-gradient(135deg, rgba(45,106,79,.12), rgba(45,106,79,.04))' : 'var(--glass)';
      var shadow = isSel ? 'box-shadow:0 2px 10px rgba(45,106,79,.15);' : '';
      h += '<button data-ob-reduce-mode="' + opt.key + '" style="display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:12px;border:1.5px solid ' + bdr + ';background:' + bg + ';cursor:pointer;font-family:inherit;text-align:left;-webkit-tap-highlight-color:transparent;transition:all .2s cubic-bezier(.34,1.56,.64,1);' + shadow + 'transform:' + (isSel ? 'scale(1.02)' : 'scale(1)') + '">'
        + '<span style="font-size:18px;width:28px;text-align:center">' + opt.icon + '</span>'
        + '<div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--t1)">' + opt.label + '</div>'
        + '<div style="font-size:11px;color:' + (isSel ? 'var(--accent)' : 'var(--t3)') + ';margin-top:1px">' + opt.desc + '</div></div>'
        + (isSel ? '<span style="width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">\u2713</span>' : '')
        + '</button>';
    });
    h += '</div>';

    // Show target-specific inputs for "target" and "maintain" modes only
    if (rMode === 'target' || rMode === 'maintain') {
      // Unit toggle (grams vs mg)
      if (effectiveKs && hasFlower) {
        var gAct = goalUnit !== 'mg' ? 'var(--accent)' : 'transparent';
        var gCol = goalUnit !== 'mg' ? '#fff' : 'var(--t2)';
        var mAct = goalUnit === 'mg' ? 'var(--accent)' : 'transparent';
        var mCol = goalUnit === 'mg' ? '#fff' : 'var(--t2)';
        h += '<div style="display:flex;gap:0;background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;padding:2px;margin-bottom:12px"><button data-ob-goal-unit="grams" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:' + gAct + ';color:' + gCol + '">Grams/day</button><button data-ob-goal-unit="mg" style="flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:' + mAct + ';color:' + mCol + '">THC mg/day</button></div>';
      }
      if (rMode === 'target') {
        // Weekly pace suggestion chips (target mode only)
        if (suggestions && suggestions.length) {
          h += '<div style="font-size:12px;color:var(--t3);margin-bottom:8px">How fast do you want to reduce?</div><div id="ob-chips-container" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">';
          suggestions.forEach(function(s) {
            var key = s.label.toLowerCase();
            var sel2 = selPreset === key;
            var bdr2 = sel2 ? 'var(--accent)' : 'var(--glass-border)';
            var bg2 = sel2 ? 'var(--accent)' : 'var(--glass)';
            var col2 = sel2 ? '#fff' : 'var(--t2)';
            h += '<button data-ob-preset="' + key + '" style="flex:1;min-width:calc(33% - 4px);padding:10px 6px;border-radius:10px;text-align:center;cursor:pointer;font-family:inherit;border:1px solid ' + bdr2 + ';background:' + bg2 + ';color:' + col2 + ';transition:all .15s;font-size:12px;font-weight:600">' + s.label + '<br><span style="font-weight:400;font-size:10px;opacity:.7">' + s.desc + '</span><br><span style="font-weight:400;font-size:10px;opacity:.6">Wk 1: ' + s.targetAfter1w + s.unit + '/day</span></button>';
          });
          h += '</div>';
        }
        // Target input
        var tLabel = effectiveKs && goalUnit === 'mg' ? 'Target daily THC (mg)' : 'Target daily grams';
        var tPh = effectiveKs && goalUnit === 'mg' ? 'e.g. 50' : 'e.g. 0.3';
        h += '<div class="ob-input-group"><label class="ob-input-label">' + tLabel + '</label><input class="ob-input" type="text" id="ob-target" placeholder="' + tPh + '" inputmode="decimal" value="' + (autoTarget || '') + '"></div>';
        h += '<div class="ob-input-group"><label class="ob-input-label">Target date (optional)</label><input class="ob-input" type="date" id="ob-date"></div>';
      } else {
        // Maintain mode — "comfort level" input
        var mLabel = effectiveKs && goalUnit === 'mg' ? 'My comfortable level (mg/day)' : 'My comfortable level (g/day)';
        var mPh = effectiveKs && goalUnit === 'mg' ? 'e.g. 50' : 'e.g. 0.5';
        h += '<div class="ob-input-group"><label class="ob-input-label">' + mLabel + '</label><input class="ob-input" type="text" id="ob-target" placeholder="' + mPh + '" inputmode="decimal" value="' + (autoTarget || '') + '"></div>';
        h += '<div style="font-size:11px;color:var(--t3);margin-top:4px">We\'ll help you hold steady around this level.</div>';
      }
    } else {
      // Flow mode — no target input, just encouragement
      h += '<div style="padding:14px;border-radius:12px;background:linear-gradient(135deg, rgba(43,108,176,.06), transparent);border:1px solid var(--glass-border);text-align:center">';
      h += '<div style="font-size:24px;margin-bottom:6px">\ud83c\udf0a</div>';
      h += '<div style="font-size:13px;color:var(--t2);line-height:1.5">No numbers needed. Just log and let the trends speak for themselves.</div>';
      h += '</div>';
    }
  }

  if (intent === 'budget') {
    const cur = state.settings.currency || '\u00a3';
    h += '<div class="ob-input-group"><label class="ob-input-label">Weekly budget (' + cur + ')</label><input class="ob-input" type="text" id="ob-budget" placeholder="e.g. 30" inputmode="decimal" value="' + (state._obBudget || '') + '"></div>';
    h += '<div style="font-size:11px;color:var(--t3);margin-top:4px">We\'ll track spending against your limit.</div>';
  }

  if (intent === 'break') {
    h += '<div class="ob-input-group"><label class="ob-input-label">When does your break end?</label><input class="ob-input" type="date" id="ob-break-end" value="' + (state._obBreakEnd || '') + '"></div>';
  }

  h += '</div>';
  return h;
}

    +   '</div>'
    +   '<div class="splash-screen" data-splash="1">'
    +     '<div class="splash-usp-title">Leef shapes itself around you</div>'
    +     '<div class="splash-usp-list">'
    +       '<div class="splash-usp-item"><div class="splash-usp-icon">\u{1F3AF}</div><div class="splash-usp-text"><strong>Pick your path</strong>Reduce, budget, quit, or just track</div></div>'
    +       '<div class="splash-usp-item"><div class="splash-usp-icon">\u{1F504}</div><div class="splash-usp-text"><strong>Change your mind anytime</strong>The app adapts with you</div></div>'
    +       '<div class="splash-usp-item"><div class="splash-usp-icon">\u{1F512}</div><div class="splash-usp-text"><strong>Your data stays on your device</strong>Always. No accounts, no cloud.</div></div>'
    +       '<div class="splash-usp-item"><div class="splash-usp-icon">\u{1F4CA}</div><div class="splash-usp-text"><strong>Smarter over time</strong>The longer you log, the better your insights get</div></div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="splash-screen" data-splash="2">'
    +     '<div class="splash-ready">Ready?</div>'
    +     '<div class="splash-ready-sub">Let\u2019s set up your Leef in under a minute</div>'
    +     '<button class="splash-cta" id="splash-go">Get started</button>'
    +   '</div>'
    + '</div>'
    + '<div class="splash-nav" id="splash-nav">'
    +   '<button class="splash-dot active" data-dot="0"></button>'
    +   '<button class="splash-dot" data-dot="1"></button>'
    +   '<button class="splash-dot" data-dot="2"></button>'
    + '</div>';

  _splashStep = 0;
  if (_splashAutoTimer) { clearTimeout(_splashAutoTimer); _splashAutoTimer = null; }
  _splashAutoTimer = setTimeout(function() { splashGoTo(1); }, 3000);

  el.querySelector('#splash-skip').addEventListener('click', dismissSplash);
  el.querySelector('#splash-go').addEventListener('click', dismissSplash);

  el.querySelectorAll('[data-dot]').forEach(function(dot) {
    dot.addEventListener('click', function() {
      splashGoTo(parseInt(dot.dataset.dot));
    });
  });

  var screens = el.querySelector('#splash-screens');
  screens.addEventListener('touchstart', function(e) {
    _splashTouchStartX = e.touches[0].clientX;
  }, { passive: true });
  screens.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - _splashTouchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0 && _splashStep < 2) splashGoTo(_splashStep + 1);
      else if (dx > 0 && _splashStep > 0) splashGoTo(_splashStep - 1);
    }
  }, { passive: true });

  // v5.2.1: Tap-to-advance on screens 0 and 1 (screen 2 has its own Get started CTA).
  // Ignores clicks on the nav dots, skip button, and the Get started button itself.
  el.addEventListener('click', function(e) {
    if (_splashStep < 2 && !e.target.closest('.splash-nav, .splash-skip, #splash-go')) {
      splashGoTo(_splashStep + 1);
    }
  });
}

function splashGoTo(step) {
  if (step === _splashStep) return;
  if (_splashAutoTimer) { clearTimeout(_splashAutoTimer); _splashAutoTimer = null; }
  _splashStep = step;
  var el = document.getElementById('splash');
  if (!el) return;
  el.querySelectorAll('.splash-screen').forEach(function(s, i) {
    s.classList.toggle('active', i === step);
  });
  el.querySelectorAll('.splash-dot').forEach(function(d, i) {
    d.classList.toggle('active', i === step);
  });
  var skipBtn = el.querySelector('#splash-skip');
  if (skipBtn) skipBtn.style.display = step === 2 ? 'none' : '';
  haptic(6);
}

function dismissSplash() {
  if (_splashAutoTimer) { clearTimeout(_splashAutoTimer); _splashAutoTimer = null; }
  var el = document.getElementById('splash');
  if (!el) return;
  el.classList.add('closing');
  setTimeout(function() {
    el.classList.add('hidden');
    el.classList.remove('closing');
    state.settings.splashSeen = true;
    saveData();
    render();
  }, 450);
  haptic(10);
}

// v3.3.1: First log celebration — shown full-screen after the very first entry is saved
// v3.3.1: Entry detail modal — tap a history row to see full breakdown
function showEntryDetail(entryId) {
  const entry = state.entries.find(e => e.id === entryId);
  if (!entry) return;
  const mg = calcMg(entry);
  const isZero = isZeroDay(entry);
  const cur = state.settings.currency || '\u00a3';

  // Build rich detail lines
  const lines = [];
  if (!isZero) {
    if (entry.grams != null) {
      let line = `<strong>${entry.grams}g</strong>`;
      if (state.settings.knowsStrength && entry.strength != null) line += ` @ ${entry.strength}%`;
      // v5.2: Show time range when both first + last are logged
      if (entry.time && entry.lastSessionTime && entry.lastSessionTime !== entry.time) {
        line += ` <span style="color:var(--t3)">\u00b7 ${fmtTime(entry.time)}\u2013${fmtTime(entry.lastSessionTime)}</span>`;
      } else if (entry.time) {
        line += ` <span style="color:var(--t3)">\u00b7 ${fmtTime(entry.time)}</span>`;
      }
      lines.push({ icon: '\ud83c\udf3f', label: 'Flower', val: line });
    }
    if (entry.grams2 > 0) {
      let line = `<strong>${entry.grams2}g</strong>`;
      if (entry.strength2) line += ` @ ${entry.strength2}%`;
      lines.push({ icon: '\ud83c\udf3f', label: 'Second flower', val: line });
    }
    if (entry.oilMl > 0) {
      let line = `<strong>${entry.oilMl}ml</strong> @ ${entry.oilStrength ?? state.settings.oilDefaultStrength}mg/ml`;
      if (entry.oilTime) line += ` <span style="color:var(--t3)">\u00b7 ${fmtTime(entry.oilTime)}</span>`;
      lines.push({ icon: '\ud83d\udca7', label: 'Oil', val: line });
    }
    if (entry.cartPuffs > 0) {
      lines.push({ icon: '\ud83d\udca8', label: 'Cart puffs', val: `<strong>${entry.cartPuffs}</strong> puffs <span style="color:var(--t3)">\u00b7 ${entry.cartPuffs * (state.settings.cartPuffMg || 3)}mg</span>` });
    }
    if (entry.cbd) {
      lines.push({ icon: '\ud83c\udf31', label: 'CBD', val: `<strong>${entry.cbd}mg</strong>` });
    }
  }
  if (entry.purchase > 0) {
    lines.push({ icon: '\ud83d\udcb0', label: 'Picked up', val: `<strong>${cur}${entry.purchase}</strong>` });
  }
  if (entry.mood) {
    const moodLabels = ['', 'Bad', 'Low', 'OK', 'Good', 'Great'];
    lines.push({ icon: '\ud83d\ude0a', label: 'Mood', val: `<strong>${entry.mood}/5</strong> <span style="color:var(--t3)">\u00b7 ${moodLabels[entry.mood]}</span>` });
  }
  if (entry.sleep) {
    const sleepLabels = ['', 'Bad', 'Poor', 'OK', 'Good', 'Great'];
    lines.push({ icon: '\ud83d\udecc', label: 'Sleep', val: `<strong>${entry.sleep}/5</strong> <span style="color:var(--t3)">\u00b7 ${sleepLabels[entry.sleep]}</span>` });
  }
  // v5.2: Bedtime line (only if logged)
  if (entry.bedtime) {
    lines.push({ icon: '\ud83c\udf19', label: 'Bedtime', val: `<strong>${fmtTime(entry.bedtime)}</strong>` });
  }

  const symChipsHtml = entry.symptoms && entry.symptoms.length ? entry.symptoms.map(sym => {
    const k = typeof sym === 'object' ? sym.key : sym;
    const intensity = typeof sym === 'object' ? (sym.intensity || 1) : 2;
    const s = SYMPTOM_LIST.find(x => x.key === k);
    if (!s) return '';
    const dots = ['', '\u00b7', '\u00b7\u00b7', '\u00b7\u00b7\u00b7'][intensity];
    return `<span style="font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(200,78,40,.12);color:var(--coral);border:1px solid rgba(200,78,40,.25)">${s.icon} ${s.label} <span style="opacity:.6">${dots}</span></span>`;
  }).join('') : '';

  const trigChipsHtml = entry.triggers && entry.triggers.length ? entry.triggers.map(k => {
    const tg = TRIGGER_TAGS.find(x => x.key === k);
    return tg ? `<span style="font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(48,176,122,.12);color:var(--accent);border:1px solid rgba(48,176,122,.25)">${tg.icon} ${tg.label}</span>` : '';
  }).join('') : '';

  // Find position in timeline (day N of tracking)
  const sorted = [...state.entries].sort((a, b) => a.date.localeCompare(b.date));
  const entryIdx = sorted.findIndex(x => x.id === entry.id);
  const dayNum = entryIdx + 1;
  const totalDays = sorted.length;

  // Compare to avg
  const allMg = sorted.map(x => calcMg(x)).filter(m => m > 0);
  const avgMg = allMg.length ? allMg.reduce((a, b) => a + b, 0) / allMg.length : 0;
  let compareText = '';
  if (mg > 0 && avgMg > 0) {
    const diff = ((mg - avgMg) / avgMg) * 100;
    if (Math.abs(diff) < 10) compareText = 'About average for you';
    else if (diff < 0) compareText = `${Math.round(Math.abs(diff))}% below your average`;
    else compareText = `${Math.round(diff)}% above your average`;
  }

  const overlay = document.createElement('div');
  overlay.className = 'detail-modal-overlay';
  overlay.innerHTML = `
    <div class="detail-modal">
      <button class="detail-close" id="detail-close" aria-label="Close">\u2715</button>
      <div class="detail-header">
        <div class="detail-date-eyebrow">${dayNum === totalDays ? 'LATEST ENTRY' : 'DAY ' + dayNum + ' OF ' + totalDays}</div>
        <div class="detail-date">${fmtDate(entry.date)}</div>
        ${isZero
          ? `<div class="detail-mg" style="color:var(--teal)">\u25cb Rest day</div>`
          : mg > 0 ? (() => {
              // Compare to overall avg to pick badge color
              const col = avgMg > 0 && mg <= avgMg * 0.85 ? 'var(--teal)' : avgMg > 0 && mg <= avgMg * 1.1 ? 'var(--amber)' : 'var(--coral)';
              return `<div class="detail-mg" style="color:${col}">${mg}<span style="font-size:16px;font-weight:500">mg THC</span></div>
             ${compareText ? `<div style="font-size:12px;color:var(--t3);margin-top:4px">${compareText}</div>` : ''}`;
            })() : ''}
      </div>
      ${lines.length ? `<div class="detail-lines">
        ${lines.map(l => `<div class="detail-line"><span class="detail-line-icon">${l.icon}</span><div class="detail-line-label">${l.label}</div><div class="detail-line-val">${l.val}</div></div>`).join('')}
      </div>` : ''}
      ${trigChipsHtml ? `<div class="detail-section"><div class="detail-section-lbl">Context</div><div class="detail-chips">${trigChipsHtml}</div></div>` : ''}
      ${symChipsHtml ? `<div class="detail-section"><div class="detail-section-lbl">Symptoms</div><div class="detail-chips">${symChipsHtml}</div></div>` : ''}
      ${entry.notes && entry.notes !== 'Zero day' ? `<div class="detail-section"><div class="detail-section-lbl">Note</div><div class="detail-note">${entry.notes}</div></div>` : ''}
      <div class="detail-actions">
        <button class="btn-outline" id="detail-edit">Edit entry</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  haptic(8);

  const close = () => {
    overlay.classList.add('closing');
    setTimeout(() => overlay.remove(), 250);
  };
  overlay.querySelector('#detail-close').addEventListener('click', close);
  overlay.addEventListener('click', (ev) => { if (ev.target === overlay) close(); });
  overlay.querySelector('#detail-edit').addEventListener('click', () => {
    close();
    // Simulate clicking the edit button
    setTimeout(() => {
      const editBtn = document.querySelector(`[data-edit="${entry.id}"]`);
      if (editBtn) editBtn.click();
    }, 260);
  });
}

// v3.3.1: Streak freeze explainer — fires once the first time a grace day is used
// Uses the info-modal class (clean centered card with solid dark backdrop)
function showStreakFreezeExplainer() {
  if (state.settings.streakFreezeExplained) return;
  // Don't stack on top of other overlays
  if (document.querySelector('.celebrate-overlay, .info-modal-overlay, .detail-modal-overlay')) return;
  const overlay = document.createElement('div');
  overlay.className = 'info-modal-overlay';
  overlay.innerHTML = `
    <div class="info-modal-card">
      <div class="info-modal-icon" style="color:var(--blue)">\u2744</div>
      <div class="info-modal-title">Streak saved with a grace day</div>
      <div class="info-modal-body">You missed logging yesterday, but your streak stays alive. You get <strong style="color:var(--blue)">1 grace day per rolling week</strong> \u2014 life happens, and one slip shouldn\u2019t break your momentum.<br><br>The \u2744 icon next to your streak shows when a grace day is in use.</div>
      <button class="info-modal-cta" id="freeze-cta">Got it</button>
    </div>
  `;
  document.body.appendChild(overlay);
  haptic(12);
  const dismiss = () => {
    overlay.classList.add('closing');
    setTimeout(() => overlay.remove(), 260);
    state.settings.streakFreezeExplained = true;
