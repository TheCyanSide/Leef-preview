  --coral: #d05032;
  --label: #5a6578;
  --r: 16px;
  --rs: 12px;
  --glass: rgba(255,255,255,.82);
  --glass2: rgba(255,255,255,.55);
  --glass-border: rgba(60,50,40,.1);
  --glass-glow: rgba(255,255,255,.45);
  --glass-blur: 20px;
  --glass-sh: 0 1px 3px rgba(0,0,0,.05), 0 4px 14px rgba(0,0,0,.07), 0 12px 28px rgba(0,0,0,.04);
  --nav-bg: rgba(244,241,236,.92);
  --grid: rgba(0,0,0,.05);
  --tick: #999;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0c0c12;
    --card: #1a1a22;
    --card2: #24242e;
    --accent: #3db87a;
    --accent-glow: rgba(61,184,122,.2);
    --accent-soft: rgba(61,184,122,.06);
    --t1: #f0f0f5;
    --t2: rgba(235,235,245,.65);
    --t3: rgba(235,235,245,.55);
    --sep: rgba(255,255,255,.08);
    --danger: #ff453a;
    --blue: #5ba8e6;
    --teal: #38c88a;
    --amber: #e8a830;
    --purple: #9b8ef0;
    --coral: #e87050;
    --label: #8890a4;
    --glass: rgba(255,255,255,.08);
    --glass2: rgba(255,255,255,.04);
    --glass-border: rgba(255,255,255,.12);
    --glass-glow: rgba(255,255,255,.05);
    --glass-sh: 0 1px 4px rgba(0,0,0,.25), 0 4px 16px rgba(0,0,0,.3), 0 12px 28px rgba(0,0,0,.2);
    --nav-bg: rgba(26,26,34,.92);
    --grid: rgba(255,255,255,.06);
    --tick: rgba(235,235,245,.3);
  }
}

[data-theme="light"] {
  --bg: #f4f1ec; --card: #fff; --card2: #f0ede7;
  --accent: #2d6a4f; --accent-glow: rgba(45,106,79,.25); --accent-soft: rgba(45,106,79,.06);
  --t1: #1a1a1e; --t2: rgba(50,45,40,.7); --t3: rgba(50,45,40,.55);
  --sep: rgba(50,45,40,.08); --danger: #e5383b; --label: #5a6578;
  --blue: #2b6cb0; --teal: #1a936f; --amber: #c17f24; --purple: #7c5cbf; --coral: #d05032;
  --glass: rgba(255,255,255,.82); --glass2: rgba(255,255,255,.55);
  --glass-border: rgba(60,50,40,.1); --glass-glow: rgba(255,255,255,.45);
  --glass-sh: 0 1px 3px rgba(0,0,0,.05), 0 4px 14px rgba(0,0,0,.07), 0 12px 28px rgba(0,0,0,.04);
  --nav-bg: rgba(244,241,236,.92); --grid: rgba(0,0,0,.05); --tick: #999;
}

[data-theme="dark"] {
  --bg: #0c0c12; --card: #1a1a22; --card2: #24242e;
  --accent: #3db87a; --accent-glow: rgba(61,184,122,.2); --accent-soft: rgba(61,184,122,.06);
  --t1: #f0f0f5; --t2: rgba(235,235,245,.65); --t3: rgba(235,235,245,.55);
  --sep: rgba(255,255,255,.08); --danger: #ff453a; --label: #8890a4;
  /* v3.3.1: slightly muted dark-mode accents for better cohesion */
  --blue: #5ba8e6; --teal: #38c88a; --amber: #d99820; --purple: #9b8ef0; --coral: #e06345;
  --glass: rgba(255,255,255,.08); --glass2: rgba(255,255,255,.04);
  --glass-border: rgba(255,255,255,.12); --glass-glow: rgba(255,255,255,.05);
  --glass-sh: 0 1px 4px rgba(0,0,0,.25), 0 4px 16px rgba(0,0,0,.3), 0 12px 28px rgba(0,0,0,.2);
  --nav-bg: rgba(28,28,30,.9); --grid: rgba(255,255,255,.07); --tick: rgba(235,235,245,.35);
}

/* ═══════════════════════════════════════════════════════════
   BASE RESET & BODY
   ═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: var(--t1);
  -webkit-font-smoothing: antialiased;
}

body {
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(58,125,92,.14) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(52,120,200,.10) 0%, transparent 50%);
  background-attachment: fixed;
}

@media (prefers-color-scheme: dark) {
  body {
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(58,125,92,.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(52,120,200,.05) 0%, transparent 50%);
  }
}
[data-theme="dark"] body {
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(58,125,92,.07) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(52,120,200,.05) 0%, transparent 50%);
}
[data-theme="light"] body {
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(58,125,92,.14) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(52,120,200,.10) 0%, transparent 50%);
}

/* ═══════════════════════════════════════════════════════════
   LAYOUT SHELL
   ═══════════════════════════════════════════════════════════ */
#app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding-bottom: calc(52px + env(safe-area-inset-bottom));
}

header {
  padding: calc(max(env(safe-area-inset-top, 0px), 20px) + 20px) 16px 10px;
  background: transparent;
}

.hdr-title {
  font-size: 34px; font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--t1) 30%, var(--accent) 80%, var(--teal));
  background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: hdrGradientShift 8s ease-in-out infinite;
}
@keyframes hdrGradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.hdr-sub { font-size: 13px; color: var(--t3); margin-top: 1px; }
/* v3.3.1: subtle leaf icon float next to the wordmark */
.hdr-title + svg { animation: leafFloat 4s ease-in-out infinite; transform-origin: bottom center; }
@keyframes leafFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-2px) rotate(-3deg); }
  75% { transform: translateY(-1px) rotate(2deg); }
}

.hdr-spark-row {
  display: flex; align-items: center; gap: 8px; margin-top: 8px;
  background: var(--glass2); border: 1px solid var(--glass-border);
  border-radius: var(--rs); padding: 10px; overflow: hidden;
}
.hdr-spark-row canvas { min-width: 0; }
.hdr-spark-tog {
  font-size: 10px; font-weight: 600; padding: 8px 12px; border-radius: 7px;
  border: none; background: var(--glass); color: var(--t3); cursor: pointer;
  -webkit-tap-highlight-color: transparent; transition: all .15s;
  min-height: 36px; min-width: 52px;
}
.hdr-spark-tog.active { color: #fff; background: var(--accent); }

main { flex: 1; padding: 8px 16px calc(70px + env(safe-area-inset-bottom)); animation: tabFade .35s cubic-bezier(.22,1,.36,1); position: relative; overflow-x: hidden; }
/* v3.3.1: Pull to refresh indicator */
#ptr-indicator {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%) translateY(-100%);
  z-index: 90; padding: 8px 16px; background: var(--card);
  border: 1px solid var(--glass-border); border-top: none;
  border-radius: 0 0 16px 16px; font-size: 12px; font-weight: 600; color: var(--accent);
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
  transition: transform .25s cubic-bezier(.22,1,.36,1);
  pointer-events: none;
}
#ptr-indicator.show { transform: translateX(-50%) translateY(0); }
#ptr-indicator .ptr-icon { display: inline-block; transition: transform .25s; }
#ptr-indicator.refreshing .ptr-icon { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes tabFade {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
/* v3.3.1: directional tab slide variants */
main[data-tab-dir="left"] { animation: tabSlideLeft .35s cubic-bezier(.22,1,.36,1); }
main[data-tab-dir="right"] { animation: tabSlideRight .35s cubic-bezier(.22,1,.36,1); }
@keyframes tabSlideLeft {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes tabSlideRight {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--card);
  border-top: 1px solid var(--glass-border);
  box-shadow: 0 -4px 20px rgba(0,0,0,.06), inset 0 1px 0 var(--glass-glow);
  display: flex; padding-bottom: max(8px, env(safe-area-inset-bottom)); z-index: 100;
}

.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 9px 0 5px; background: none; border: none; cursor: pointer; min-height: 48px;
  font-size: 11px; font-weight: 500; color: var(--t3); gap: 3px;
  -webkit-tap-highlight-color: transparent; transition: color .15s; position: relative;
}
.tab.active { color: var(--accent); font-weight: 600; }
.tab.active::before {
  content: ''; position: absolute; inset: 6px 8px; border-radius: 10px;
  background: var(--glass2); border: 1px solid var(--glass-border); z-index: -1;
}
.tab.active::after {
  content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--accent);
}
.tab svg { width: 24px; height: 24px; stroke-width: 1.8; stroke: currentColor; fill: none; transition: all .15s; }
.tab.active svg { fill: currentColor; stroke-width: 1.5; animation: tabBounce .35s cubic-bezier(.34,1.56,.64,1); }

.tab-fab { gap: 4px; padding-top: 5px; }
.tab-fab .fab-circle {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(145deg, var(--accent) 0%, var(--accent-strong, #2d6a4f) 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 16px rgba(45,106,79,.35), 0 2px 6px rgba(45,106,79,.25), inset 0 1px 0 rgba(255,255,255,.25);
  margin-top: -16px; transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
  border: 2px solid var(--bg, #fbfaf6);
}
.tab-fab .fab-circle svg { width: 22px; height: 22px; stroke: #fff; stroke-width: 2.4; fill: none; }
.tab-fab.active { color: var(--accent); }
.tab-fab.active .fab-circle { transform: translateY(-2px) scale(1.05); box-shadow: 0 10px 24px rgba(45,106,79,.45), 0 3px 8px rgba(45,106,79,.3), inset 0 1px 0 rgba(255,255,255,.3); }
.tab-fab.active::before { display: none; }
.tab-fab.active::after { display: none; }
.tab-fab:active .fab-circle { transform: scale(.92); }

/* ═══════════════════════════════════════════════════════════
   COMPONENTS
   ═══════════════════════════════════════════════════════════ */
.card {
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--glass-border); border-radius: var(--r);
  margin-bottom: 16px; overflow: hidden;
  box-shadow: var(--glass-sh), inset 0 1px 0 var(--glass-glow);
}

.hero-card {
  text-align: center;
  padding: 36px 24px 32px;
  background: linear-gradient(160deg, rgba(255,255,255,.75) 0%, rgba(255,255,255,.6) 40%, rgba(255,255,255,.5) 100%), linear-gradient(160deg, rgba(45,106,79,.14) 0%, rgba(74,158,114,.08) 35%, rgba(43,108,176,.06) 100%);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid rgba(45,106,79,.18);
  border-radius: 20px;
  margin-bottom: 16px;
  box-shadow: 0 0 0 1px rgba(45,106,79,.08), 0 4px 18px rgba(45,106,79,.12), 0 16px 40px rgba(0,0,0,.06), inset 0 1px 1px rgba(255,255,255,.35);
}
@media (prefers-color-scheme: dark) { .hero-card { background: linear-gradient(160deg, rgba(45,106,79,.14) 0%, rgba(74,158,114,.08) 35%, rgba(43,108,176,.06) 100%); box-shadow: 0 0 0 1px rgba(74,158,114,.1), 0 4px 20px rgba(0,0,0,.3), 0 0 40px rgba(74,158,114,.06), inset 0 1px 0 rgba(255,255,255,.06); } }
[data-theme="dark"] .hero-card { background: linear-gradient(160deg, rgba(45,106,79,.14) 0%, rgba(74,158,114,.08) 35%, rgba(43,108,176,.06) 100%); box-shadow: 0 0 0 1px rgba(74,158,114,.1), 0 4px 20px rgba(0,0,0,.3), 0 0 40px rgba(74,158,114,.06), inset 0 1px 0 rgba(255,255,255,.06); }

.cp { padding: 16px; }
.card-title {
  font-size: 11px; font-weight: 700; color: var(--label, var(--t3));
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 11px;
}

.metrics { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
.metric {
  background: linear-gradient(135deg, var(--glass2), rgba(255,255,255,.08));
  border: .5px solid var(--glass-border);
  border-radius: var(--rs); padding: 10px 12px 9px; min-width: 0; overflow: hidden;
  transition: transform .15s, box-shadow .15s;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.metric.good { background: rgba(30,176,122,.12); border-color: rgba(30,176,122,.2); }
.metric.warn { background: rgba(184,112,15,.12); border-color: rgba(184,112,15,.2); }
.metric.bad  { background: rgba(200,78,40,.12); border-color: rgba(200,78,40,.2); }
.m-lbl { font-size: 13px; color: var(--t2); margin-bottom: 2px; font-weight: 500; display: flex; align-items: center; gap: 2px; line-height: 1.3; min-width: 0; overflow: hidden; }
.m-val { font-size: 24px; font-weight: 700; letter-spacing: -.5px; line-height: 1.1; }
.m-sub { font-size: 11px; color: var(--t2); margin-top: 2px; line-height: 1.3; }
.metric .info-btn { min-width: 44px; min-height: 44px; width: 44px; height: 44px; font-size: 11px; margin: -10px -10px -10px 0; }

.btn-primary {
  display: block; width: 100%; padding: 15px;
  background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 50%), var(--accent);
  color: #fff; border: none; border-radius: var(--r); font-size: 16px; font-weight: 600;
  cursor: pointer; margin-bottom: 8px; -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 8px rgba(58,125,92,.25), 0 8px 24px rgba(58,125,92,.15), inset 0 1px 0 rgba(255,255,255,.15);
  transition: transform .15s cubic-bezier(.22,1,.36,1), box-shadow .15s, filter .1s;
}
.btn-primary:active { transform: scale(.97) translateY(1px); filter: brightness(.92); box-shadow: 0 1px 4px rgba(58,125,92,.2); }

.btn-outline {
  display: block; width: 100%; padding: 15px;
  background: var(--glass); color: var(--accent);
  border: 1px solid var(--glass-border); border-radius: var(--r);
  font-size: 16px; font-weight: 500; cursor: pointer; margin-bottom: 8px;
  box-shadow: var(--glass-sh); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: transform .1s, filter .1s;
}
.btn-outline:active { transform: scale(.97); }

.btn-danger-txt { color: var(--danger) !important; }

.toggles {
  display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 14px;
  background: var(--glass2); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 12px; padding: 3px;
}
.tog {
  font-size: 11px; font-weight: 600; padding: 8px 12px; border-radius: 10px;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all .2s;
  border: 1px solid var(--glass-border); background: var(--glass);
  text-align: center; color: var(--t2);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  min-height: 36px;
}
.tog.off { color: var(--t3); }
/* v3.3.2: ensure toggles wrap cleanly at 375px */
.toggles .tog {
  flex: 1 1 auto; min-width: 48px; border: none; padding: 8px 6px; font-size: 11px;
  backdrop-filter: none; -webkit-backdrop-filter: none;
  min-height: 36px;
}
.toggles .tog.off { background: transparent; }

.range-segment {
  display: inline-flex; gap: 0; padding: 3px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 11px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 2px 6px rgba(0,0,0,.04);
}
.range-btn {
  font-size: 11px; font-weight: 600; padding: 8px 14px; min-height: 36px;
  border-radius: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  border: none; background: transparent; color: var(--t3);
  transition: background .25s cubic-bezier(.34,1.56,.64,1), color .2s, transform .2s;
  letter-spacing: .3px;
}
.range-btn:hover:not(.active) { color: var(--t2); }
.range-btn.active {
  background: linear-gradient(135deg, var(--accent), #4a9e72);
  color: #fff;
  box-shadow: 0 3px 10px rgba(45,106,79,.28), inset 0 1px 0 rgba(255,255,255,.2);
  transform: scale(1.02);
}

.section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  padding: 10px 2px; min-height: 44px; margin-top: 12px; margin-bottom: 0;
}
.section-lbl {
  font-size: 11px; font-weight: 700; color: var(--t3);
  text-transform: uppercase; letter-spacing: 1px; margin-top: 16px; margin-bottom: 8px; padding: 0 2px;
}
.section-hdr .chevron {
  font-size: 10px; color: var(--t3); transition: transform .25s;
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: var(--glass2); border: 1px solid var(--glass-border);
}
.section-hdr .chevron.up { transform: rotate(180deg); }
.section-hdr:active { opacity: .7; }

.info-btn {
  background: none; border: none; color: var(--t3); font-size: 12px; cursor: pointer;
  padding: 0 2px; font-family: inherit; -webkit-tap-highlight-color: transparent;
  min-width: 44px; min-height: 44px; width: 44px; height: 44px;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.info-tip {
  font-size: 11px; color: var(--t2); line-height: 1.5; padding: 0 10px;
  background: var(--glass); backdrop-filter: blur(16px) saturate(150%);
  -webkit-backdrop-filter: blur(16px) saturate(150%);
  border-radius: 10px; margin-top: 0; border: 1px solid var(--glass-border);
  opacity: 0; max-height: 0; overflow: hidden; transition: opacity .15s, max-height .2s, padding .15s, margin .15s;
}
.info-tip.show { margin-top: 6px; opacity: 1; max-height: 120px; padding: 8px 10px; }

.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(12px);
  background: var(--glass); color: var(--t1); padding: 10px 18px; border-radius: 22px;
  font-size: 13px; font-weight: 500; z-index: 999; white-space: nowrap;
  backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border); box-shadow: var(--glass-sh), inset 0 1px 0 var(--glass-glow);
  opacity: 0; transition: opacity .25s ease, transform .25s cubic-bezier(.22,1,.36,1); pointer-events: none;
  display: flex; align-items: center; gap: 8px; max-width: 90vw;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast .toast-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.toast .toast-msg { display: inline-block; }
.toast.toast-success { background: linear-gradient(135deg, var(--accent), #4a9e72); color: #fff; border-color: transparent; font-weight: 600; }
.toast.toast-success .toast-icon { background: rgba(255,255,255,.25); color: #fff; }
.toast.toast-warning { background: linear-gradient(135deg, #b8700f, #e0a030); color: #fff; border-color: transparent; font-weight: 600; }
.toast.toast-warning .toast-icon { background: rgba(255,255,255,.25); color: #fff; font-size: 13px; }
.toast.toast-info { background: linear-gradient(135deg, #3478c8, #4d9de0); color: #fff; border-color: transparent; font-weight: 600; }
.toast.toast-info .toast-icon { background: rgba(255,255,255,.25); color: #fff; font-size: 13px; }
.toast.toast-error { background: linear-gradient(135deg, #c84e28, #e06840); color: #fff; border-color: transparent; font-weight: 600; }
.toast.toast-error .toast-icon { background: rgba(255,255,255,.25); color: #fff; }
/* Legacy: .toast.success → maps to toast-success */
.toast.success { background: linear-gradient(135deg, var(--accent), #4a9e72); color: #fff; border-color: transparent; font-weight: 600; }

.note { font-size: 12px; color: var(--t2); line-height: 1.55; padding: 0 2px; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--t2); transition: opacity .2s; }
.leg-item.leg-hidden { opacity: .45; text-decoration: line-through; text-decoration-color: var(--t3); }
.leg-item.leg-btn { cursor: pointer; -webkit-tap-highlight-color: transparent; padding: 4px 8px; border-radius: 6px; border: none; background: none; font-family: inherit; }
.leg-item.leg-btn:active { background: var(--glass2); }
.leg-line { width: 18px; height: 3px; border-radius: 2px; }
.leg-bar { width: 10px; height: 10px; border-radius: 3px; }

/* Custom chart tooltip */
.leef-tooltip {
  position: absolute; pointer-events: none; z-index: 50;
  background: rgba(20,20,30,.88); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,.12); border-radius: 10px;
  padding: 8px 12px; font-family: inherit; min-width: 120px;
  box-shadow: 0 4px 20px rgba(0,0,0,.35); transition: opacity .15s, transform .15s;
  opacity: 0; transform: translateY(4px);
}
.leef-tooltip.visible { opacity: 1; transform: translateY(0); }
.leef-tooltip.pinned { pointer-events: auto; box-shadow: 0 4px 20px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.18); }
.leef-tooltip .tt-date { font-size: 10px; color: rgba(235,235,245,.5); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.leef-tooltip .tt-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(235,235,245,.85); line-height: 1.5; }
.leef-tooltip .tt-swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.leef-tooltip .tt-trend { font-size: 10px; margin-left: auto; padding-left: 8px; opacity: .7; }

.icon-btn {
  width: 44px; height: 44px; border: none; background: none; cursor: pointer;
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; font-size: 15px; transition: background .15s;
}
.icon-btn:active { background: var(--glass2); }

/* ═══════════════════════════════════════════════════════════
   GOAL RING
   ═══════════════════════════════════════════════════════════ */
.goal-card {
  display: flex; align-items: center; gap: 16px; padding: 16px;
}
.goal-ring { width: 100px; height: 100px; flex-shrink: 0; }
.ring-bg { fill: none; stroke: var(--glass-border); stroke-width: 6; }
.ring-progress {
  fill: none; stroke: var(--blue); stroke-width: 6; stroke-linecap: round;
  transition: stroke-dashoffset 0.6s ease;
}
.ring-value { font-size: 18px; font-weight: 700; fill: var(--t1); }
.ring-label { font-size: 10px; fill: var(--t2); }
.goal-meta { flex: 1; }
.goal-target { font-size: 14px; font-weight: 600; display: block; margin-bottom: 4px; }
.goal-date { font-size: 12px; color: var(--t2); display: block; margin-bottom: 4px; }
.goal-percent { font-size: 20px; font-weight: 700; color: var(--teal); display: block; margin-bottom: 2px; }
.no-goal-card {
  text-align: center; padding: 20px 16px;
}

/* ═══════════════════════════════════════════════════════════
   WEEKLY DIGEST
   ═══════════════════════════════════════════════════════════ */
.digest-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.digest-item { text-align: center; padding: 8px; background: var(--glass2); border-radius: var(--rs); border: .5px solid var(--glass-border); }
.digest-label { font-size: 11px; color: var(--t3); display: block; margin-bottom: 2px; }
.digest-value { font-size: 20px; font-weight: 700; display: block; }
.digest-change { font-size: 11px; font-weight: 600; display: block; margin-top: 2px; }
.digest-change.good { color: var(--teal); }
.digest-change.bad { color: var(--coral); }
.digest-change.neutral { color: var(--t3); }

/* ═══════════════════════════════════════════════════════════
   LOG FORM
   ═══════════════════════════════════════════════════════════ */
.form-group {
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
  border: 1px solid var(--glass-border); border-radius: var(--r);
  overflow: hidden; margin-bottom: 12px;
  box-shadow: var(--glass-sh), inset 0 1px 0 var(--glass-glow);
}
.form-row {
  display: flex; align-items: center; padding: 13px 16px;
  border-bottom: .5px solid var(--sep); min-height: 50px;
}
.form-row:last-child { border-bottom: none; }
.form-lbl { font-size: 15px; flex: 1; }
.form-in {
  font-size: 15px; color: var(--accent); text-align: right; background: none;
  border: none; outline: none; width: 140px; font-family: inherit;
  -webkit-appearance: none; color-scheme: dark light;
}
.form-in::placeholder { color: var(--t3); }
.form-ta {
  width: 100%; background: none; border: none; outline: none;
  font-family: inherit; font-size: 15px; color: var(--t1);
  resize: none; padding: 13px 16px; min-height: 80px;
}

.rating-row { padding: 14px 16px; border-bottom: .5px solid var(--sep); }
.rating-row:last-child { border-bottom: none; }
.rating-lbl { font-size: 12px; color: var(--t2); margin-bottom: 10px; font-weight: 600; letter-spacing: .2px; }
.rating-btns { display: flex; gap: 8px; }
.rdot {
  flex: 1; min-width: 0; aspect-ratio: 1; max-width: 56px; border-radius: 14px;
  border: 1.5px solid var(--glass-border); background: var(--glass);
  cursor: pointer; font-size: 12px; font-weight: 700; color: var(--t3);
  -webkit-tap-highlight-color: transparent; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px; line-height: 1;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
}
.rdot span:first-child { font-size: 22px; margin-bottom: 1px; }
.rdot span:last-child { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; color: var(--t3) !important; opacity: .8; }
.rdot:hover:not(.active) { border-color: var(--t2); background: var(--glass2); }
.rdot.active {
  border-color: transparent; color: #fff;
  transform: scale(1.08);
  box-shadow: 0 6px 16px rgba(45,106,79,.25), 0 2px 6px rgba(45,106,79,.15), inset 0 1px 0 rgba(255,255,255,.2);
  animation: pulseGlow .5s ease;
}
.rdot.active span:last-child { color: rgba(255,255,255,.85) !important; opacity: 1; }

/* ═══════════════════════════════════════════════════════════
   HISTORY
   ═══════════════════════════════════════════════════════════ */
.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border); border-radius: 12px;
  padding: 8px 12px; margin-bottom: 10px;
}
.search-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: inherit; font-size: 14px; color: var(--t1);
}
.search-input::placeholder { color: var(--t3); }
.search-clear {
  background: none; border: none; color: var(--t3); font-size: 16px;
  cursor: pointer; padding: 4px;
}

.hist-row {
  display: flex; align-items: flex-start; padding: 11px 16px;
  border-bottom: .5px solid var(--sep); gap: 10px;
}
.hist-row:last-child { border-bottom: none; }
.hist-date { font-size: 14px; font-weight: 600; min-width: 56px; padding-top: 1px; }
.hist-meta { flex: 1; min-width: 0; font-size: 12px; color: var(--t2); line-height: 1.6; overflow-wrap: break-word; }
.hist-mg { font-size: 13px; font-weight: 700; min-width: 42px; text-align: right; padding-top: 1px; }

/* v3.4: History filter panel */
.hist-filter-panel {
  overflow: hidden; transition: max-height .25s ease, opacity .2s ease;
  max-height: 0; opacity: 0;
}
.hist-filter-panel.open { max-height: 200px; opacity: 1; }
.hist-filter-row {
  display: flex; gap: 8px; margin-bottom: 8px;
}
.hist-filter-row input[type="date"] {
  flex: 1; background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 10px; padding: 8px 10px; font-size: 13px; color: var(--t1);
  font-family: inherit; outline: none;
}
.hist-filter-row input[type="date"]:focus { border-color: var(--accent); }
.hist-filter-row label {
  font-size: 11px; font-weight: 600; color: var(--t3); text-transform: uppercase;
  letter-spacing: .4px; margin-bottom: 2px; display: block;
}
.hist-method-pills {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
}
.hist-method-pill {
  padding: 5px 12px; border-radius: 14px; border: 1px solid var(--glass-border);
  background: var(--glass); color: var(--t3); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent;
  transition: all .2s;
}
.hist-method-pill.active {
  border-color: var(--accent); background: var(--accent-soft); color: var(--accent);
}
.hist-summary-bar {
  display: flex; gap: 10px; justify-content: center; align-items: center;
  padding: 8px 14px; margin-bottom: 10px; border-radius: 12px;
  background: var(--glass); border: 1px solid var(--glass-border);
  font-size: 12px; font-weight: 600; color: var(--t2);
}
.hist-summary-bar span { white-space: nowrap; }
.hist-summary-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--sep); flex-shrink: 0; }
.hist-week-header {
  padding: 10px 4px 6px; display: flex; align-items: center; gap: 10px;
}
.hist-week-label {
  font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase;
  letter-spacing: .5px; white-space: nowrap;
}
.hist-week-line {
  flex: 1; height: 1px; background: linear-gradient(90deg, var(--accent), transparent);
  opacity: .35;
}
.hist-week-avg {
  font-size: 10px; font-weight: 700; color: var(--accent); white-space: nowrap;
}
.hist-mg-badge {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 1px 7px; border-radius: 8px; font-size: 11px; font-weight: 700;
}
.hist-mood-dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0;
}

.load-more-btn {
  display: block; width: 100%; padding: 12px; text-align: center;
  background: none; border: none; color: var(--blue); font-size: 14px;
  font-weight: 500; cursor: pointer; font-family: inherit;
}

/* ═══════════════════════════════════════════════════════════
   ONBOARDING
   ═══════════════════════════════════════════════════════════ */
.onboarding {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 25% 15%, rgba(45,106,79,.18) 0%, transparent 60%),
    radial-gradient(ellipse 70% 60% at 75% 85%, rgba(52,120,200,.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(74,158,114,.08) 0%, transparent 70%);
  text-align: center;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  animation: obFadeIn .5s cubic-bezier(.22,1,.36,1);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: max(40px, env(safe-area-inset-top, 0px) + 24px) 28px calc(40px + env(safe-area-inset-bottom, 0px));
}
/* Push content down slightly; flex-shrink ensures it collapses when content is tall */
.onboarding::before { content: ''; flex: 0 1 24px; min-height: 0; }
.onboarding::after { content: ''; flex: 1; min-height: 24px; }
@keyframes obFadeIn { from { opacity: 0; } to { opacity: 1; } }
.onboarding.hidden { display: none; }
.ob-icon { font-size: 64px; margin-bottom: 16px; animation: obIconFloat .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes obIconFloat {
  0% { opacity: 0; transform: scale(.5) translateY(20px); }
  60% { opacity: 1; }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.ob-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -.5px; animation: obSlideUp .5s cubic-bezier(.22,1,.36,1) .08s both; }
.ob-desc { font-size: 15px; color: var(--t2); line-height: 1.5; margin-bottom: 32px; max-width: 300px; animation: obSlideUp .5s cubic-bezier(.22,1,.36,1) .15s both; }
@keyframes obSlideUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}
.ob-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
.ob-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sep); transition: background .3s, width .3s, transform .3s cubic-bezier(.34,1.56,.64,1); }
.ob-dot.active { background: var(--accent); width: 22px; border-radius: 4px; }
.ob-progress { width: 100%; max-width: 300px; height: 4px; background: var(--sep); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
.ob-progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #4a9e72); border-radius: 2px; transition: width .5s cubic-bezier(.22,1,.36,1); box-shadow: 0 0 8px rgba(45,106,79,.4); }
/* v3.4.1: Onboarding step transitions — directional slide */
.ob-step-content { animation: fadeSlideIn .35s cubic-bezier(.22,1,.36,1); }
.ob-slide-in-right { animation: obSlideRight .3s cubic-bezier(.22,1,.36,1); }
.ob-slide-in-left { animation: obSlideLeft .3s cubic-bezier(.22,1,.36,1); }
@keyframes obSlideRight {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes obSlideLeft {
  from { opacity: 0; transform: translateX(-40px); }
  to   { opacity: 1; transform: translateX(0); }
}
/* v3.4.1: Motivation tag pills — staggered bounce-in */
@keyframes obBounceIn {
  0%   { opacity: 0; transform: scale(.7) translateY(8px); }
  60%  { opacity: 1; transform: scale(1.05) translateY(-2px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.ob-tag-bounce { animation: obBounceIn .3s cubic-bezier(.34,1.56,.64,1) both; }
/* v3.4.1: Progress dots — animated active dot + connecting line fill */
.ob-dot-wrap { display: flex; align-items: center; gap: 0; margin: 24px auto 20px; width: 180px; justify-content: center; }
.ob-dot-node {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--glass-border);
  transition: all .35s cubic-bezier(.34,1.56,.64,1);
  flex-shrink: 0;
}
.ob-dot-node.visited { background: var(--accent); }
.ob-dot-node.active {
  width: 12px; height: 12px;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow), 0 0 4px var(--accent-glow);
}
.ob-dot-line {
  flex: 1; height: 2px;
  background: var(--glass-border);
  margin: 0 3px;
  position: relative; overflow: hidden; border-radius: 1px;
}
.ob-dot-line::after {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--teal));
  border-radius: 1px;
  transition: width .4s cubic-bezier(.22,1,.36,1);
}
.ob-dot-line.filled::after { width: 100%; }
/* v3.4.1: Method pill selection — pulse glow */
@keyframes obMethodGlow {
  0%   { box-shadow: 0 0 0 0 rgba(45,106,79,.4); }
  50%  { box-shadow: 0 0 0 6px rgba(45,106,79,0); }
  100% { box-shadow: 0 0 0 0 rgba(45,106,79,0); }
}
.ob-method-glow { animation: obMethodGlow .4s cubic-bezier(.22,1,.36,1); }
/* v3.4.1: Ready step confetti — reuses confettiFall keyframes */
.ob-confetti-piece {
  position: absolute; width: 8px; height: 12px; border-radius: 2px;
  animation: confettiFall 2.5s ease-out forwards;
  pointer-events: none;
}
.ob-input-group { margin-bottom: 24px; text-align: left; width: 100%; max-width: 300px; animation: obSlideUp .5s cubic-bezier(.22,1,.36,1) .2s both; }
.ob-input-label { font-size: 13px; font-weight: 500; color: var(--t2); margin-bottom: 6px; display: block; }
.ob-input {
  width: 100%; padding: 12px 16px; border: 1px solid var(--glass-border);
  border-radius: 12px; background: var(--glass); font-size: 16px; color: var(--t1);
  font-family: inherit; outline: none; box-sizing: border-box;
  -webkit-appearance: none; -moz-appearance: none; appearance: none;
  transition: border-color .2s, box-shadow .2s, transform .2s;
}
.ob-input[type="date"] { color-scheme: dark light; min-height: 48px; }
.ob-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); transform: translateY(-1px); }
.ob-skip { background: none; border: none; color: var(--t3); font-size: 14px; cursor: pointer; margin-top: 8px; padding: 8px 16px; font-family: inherit; -webkit-tap-highlight-color: transparent; }
.ob-card-btn:active { transform: scale(.97) !important; }
.ob-card-btn:hover { border-color: var(--accent) !important; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════
   MILESTONES
   ═══════════════════════════════════════════════════════════ */
.milestone-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 998;
  opacity: 0; transition: opacity .2s;
}
.milestone-backdrop.show { opacity: 1; }
.milestone-backdrop.hidden { display: none; }

.milestone-popup {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  margin: auto; width: fit-content; height: fit-content;
  background: var(--glass); backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border); border-radius: 24px;
  padding: 28px 24px; text-align: center; z-index: 999;
  box-shadow: 0 8px 40px rgba(0,0,0,.2); min-width: 260px;
  max-width: calc(100vw - 40px); max-height: calc(100dvh - 40px);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  animation: popIn .5s cubic-bezier(.34,1.56,.64,1);
}
.milestone-popup.hidden { display: none; }
.ms-icon { font-size: 56px; margin-bottom: 12px; }
.ms-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.ms-desc { font-size: 14px; color: var(--t2); margin-bottom: 20px; line-height: 1.4; }

/* ═══════════════════════════════════════════════════════════
   BUY ME A COFFEE
   ═══════════════════════════════════════════════════════════ */
.bmc-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; background: #FFDD00; color: #000;
  border-radius: 12px; font-size: 14px; font-weight: 600;
  text-decoration: none; transition: transform .15s, background .15s; border: none; cursor: pointer;
  font-family: inherit;
}
.bmc-btn:active { transform: scale(.97); }
@media (prefers-color-scheme: dark) {
  .bmc-btn { background: rgba(255,214,10,.88); }
}
[data-theme="dark"] .bmc-btn { background: rgba(255,214,10,.88); }
[data-theme="light"] .bmc-btn { background: #FFDD00; }

/* ═══════════════════════════════════════════════════════════
   ACHIEVEMENTS
   ═══════════════════════════════════════════════════════════ */
.ach-row { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:.5px solid var(--sep); }
.ach-row:last-child { border-bottom:none; }
.ach-icon { font-size:32px; width:48px; height:48px; text-align:center; flex-shrink:0; line-height:48px; background:var(--accent-soft); border-radius:50%; }
.ach-info { flex:1; min-width:0; }
.ach-name { font-size:14px; font-weight:600; color:var(--t1); }
.ach-desc { font-size:12px; color:var(--t2); margin-top:2px; line-height:1.4; }
.ach-date { font-size:11px; color:var(--t3); white-space:nowrap; flex-shrink:0; }
.ach-locked { opacity:0.45; }
.ach-earned { border-left:3px solid; border-image:linear-gradient(180deg, var(--accent), var(--teal)) 1; padding-left:13px; }
.ach-earned .ach-icon { background:linear-gradient(135deg, var(--accent-soft), rgba(30,176,122,.12)); }
.ach-benefit { font-size:11px; color:var(--teal); font-weight:500; margin-top:3px; }
.ach-progress { height:6px; border-radius:3px; background:var(--sep); margin-top:8px; }
.ach-progress-bar { height:100%; border-radius:3px; background:linear-gradient(90deg, var(--accent), var(--teal)); transition:width .3s ease; }
.sym-trend { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:.5px solid var(--sep); font-size:13px; }
.sym-trend:last-child { border-bottom:none; }
.sym-trend-icon { font-size:16px; width:24px; text-align:center; flex-shrink:0; }
.sym-trend-name { flex:1; color:var(--t1); }
.sym-trend-count { font-size:12px; color:var(--t2); min-width:40px; text-align:center; }
.sym-trend-change { font-size:11px; font-weight:600; min-width:60px; text-align:right; }
.sym-trend-change.improving { color:var(--teal); }
.sym-trend-change.worsening { color:var(--coral); }
.sym-trend-change.stable { color:var(--t3); }

/* ═══════════════════════════════════════════════════════════
   CHARTS & MISC
   ═══════════════════════════════════════════════════════════ */
.chart-wrap { position: relative; width: 100%; overflow: hidden; }
.chart-inner { position: relative; height: 100%; }
.chart-inner canvas { display: block; width: 100%; height: 100% !important; opacity: 0; animation: chartFadeIn .5s cubic-bezier(.22,1,.36,1) forwards; animation-delay: .08s; }
@keyframes chartFadeIn { to { opacity: 1; } }
.chart-wrap::before {
  content: ''; position: absolute; inset: 8px; border-radius: 8px; pointer-events: none;
  background: linear-gradient(90deg, transparent 0%, var(--sep) 50%, transparent 100%);
  background-size: 200% 100%; animation: chartShimmer 1.2s ease-in-out infinite, chartShimmerOut 0s .6s forwards;
  opacity: .35;
}
@keyframes chartShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes chartShimmerOut { to { opacity: 0; visibility: hidden; } }

/* v3.3.1: stronger focus-visible states for keyboard navigation */
:focus-visible { outline: 2.5px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
button:focus-visible, a:focus-visible, [tabindex]:focus-visible {
  outline: 2.5px solid var(--accent); outline-offset: 2px;
  box-shadow: 0 0 0 4px var(--accent-glow);
}
.tab:focus-visible, .btn-primary:focus-visible, .btn-outline:focus-visible {
  outline: 2.5px solid var(--accent); outline-offset: 3px;
}
.form-in:focus, .form-ta:focus, .ob-input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow), 0 2px 8px rgba(0,0,0,.06);
  transform: translateY(-1px);
  transition: box-shadow .2s ease, border-color .2s, transform .2s cubic-bezier(.22,1,.36,1);
}
/* Skip-to-content link for keyboard users */
.skip-link {
  position: absolute; top: -40px; left: 0;
  background: var(--accent); color: #fff; padding: 8px 16px;
  text-decoration: none; z-index: 10000; border-radius: 0 0 8px 0;
  font-size: 14px; font-weight: 600;
}
.skip-link:focus { top: 0; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
  }
}

/* ═══════════════════════════════════════════════════════════
   INTERACTION POLISH
   ═══════════════════════════════════════════════════════════ */
.form-row { transition: background .1s; }
.form-row:active { background: var(--glass2); }

.hist-row { transition: background .1s; cursor: default; }
.hist-row:active { background: var(--glass2); }

.metric { cursor: default; }
.metric:active { transform: scale(.98); }

.btn-primary { transition: transform .1s, filter .1s, background .15s; }
.btn-outline { transition: transform .1s, filter .1s, opacity .1s; }
.btn-outline:active { opacity: .75; }

.rdot { transition: all .15s cubic-bezier(.22,1,.36,1); }
.rdot:active { transform: scale(.9); }

.digest-item { transition: transform .15s, background .15s; }
.digest-item:active { transform: scale(.97); }

.ach-row { transition: background .1s; }
.ach-row:active { background: var(--glass2); }

/* Zero-day mode toggle smooth swap */
#mode-used-btn, #mode-zero-btn { transition: all .18s cubic-bezier(.22,1,.36,1); }

/* ═══════════════════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════════════════ */
.section-body {
  display: grid; grid-template-rows: 1fr;
  transition: grid-template-rows .35s ease, opacity .25s ease;
  opacity: 1;
}
.section-body.collapsed {
  grid-template-rows: 0fr; opacity: 0;
}
.section-body > div { overflow: hidden; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes popIn {
  0%  { opacity: 0; transform: scale(.85); }
  60% { opacity: 1; transform: scale(1.03); }
  100%{ opacity: 1; transform: scale(1); }
}
@keyframes celebratePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
  50% { box-shadow: 0 0 0 8px transparent; }
}
@keyframes confetti {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(-60px) rotate(360deg); opacity: 0; }
}
@keyframes tabBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
@keyframes sparkleGlow {
  0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
  50% { opacity: .85; transform: scale(1.12) rotate(8deg); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes checkmarkPop {
  0% { opacity: 0; transform: scale(.5); }
  60% { opacity: 1; transform: scale(1.15); }
  100% { opacity: 1; transform: scale(1); }
}

/* v3.3.1: Goal reached gold glow pulse */
@keyframes goalGlowPulse {
  0%, 100% { box-shadow: 0 0 0 1px rgba(48,176,122,.2), 0 8px 32px rgba(48,176,122,.18), 0 2px 8px rgba(224,160,48,.1), inset 0 1px 0 rgba(255,255,255,.3); }
  50% { box-shadow: 0 0 0 1px rgba(48,176,122,.3), 0 10px 40px rgba(48,176,122,.28), 0 4px 14px rgba(224,160,48,.18), inset 0 1px 0 rgba(255,255,255,.4); }
}

/* v3.3.1: First log celebration overlay */
.celebrate-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: radial-gradient(ellipse at center, rgba(45,106,79,.15) 0%, var(--bg) 60%);

}
.celebrate-overlay.closing { animation: celebrateFadeOut .3s cubic-bezier(.22,1,.36,1) forwards; }
@keyframes celebrateFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes celebrateFadeOut { from { opacity: 1; } to { opacity: 0; } }
.celebrate-overlay .celebrate-icon {

  animation: celebrateIconBounce .8s cubic-bezier(.34,1.56,.64,1);
}

/* v3.3.1: Entry detail modal */

}
.detail-modal-overlay.closing { animation: detailFadeOut .25s cubic-bezier(.22,1,.36,1) forwards; }
@keyframes detailFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes detailFadeOut { from { opacity: 1; } to { opacity: 0; } }
.detail-modal {

/* ================================================================
   SPLASH / WELCOME SCREEN (v5.0)
   ================================================================ */
.splash-overlay {

  background: #0a0a14;
  background-image:
    radial-gradient(ellipse 80% 60% at 30% 20%, rgba(45,106,79,.22) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 70% 75%, rgba(61,184,122,.12) 0%, transparent 50%),

// v6.0.6: Use LOCAL date components, not UTC. `new Date().toISOString()` converts
// to UTC, which shifted daily widgets a day early in evening local time (Pacific et al).
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
// v6.0.6: Same, but for any Date object (used by range-cutoffs + yesterday helpers)
function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function haptic(ms = 10) { if (navigator.vibrate) navigator.vibrate(ms); }
function isoWeek(d) {
  const tmp = new Date(d.getTime());
  tmp.setHours(0,0,0,0);
  tmp.setDate(tmp.getDate() + 3 - (tmp.getDay() + 6) % 7);
  const week1 = new Date(tmp.getFullYear(), 0, 4);
  return tmp.getFullYear() + '-W' + String(1 + Math.round(((tmp.getTime() - week1.getTime()) / MS_PER_DAY - 3 + (week1.getDay() + 6) % 7) / 7)).padStart(2, '0');
}
function fmtDate(d) { return new Date(d + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }); }
function fmtTime(t) {
  if (!t) return '—';
  const [h, m] = t.split(':').map(Number);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function timeDec(t) { if (!t) return null; const [h, m] = t.split(':').map(Number); return +(h + m / 60).toFixed(3); }
function nowTime() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
function isDark() {
  const dt = document.documentElement.getAttribute('data-theme');
  if (dt === 'dark') return true;
  if (dt === 'light') return false;
  return window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches;
}
function seriesColor(s) { return isDark() ? s.dark : s.light; }
function hexA(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

  if (wantsDown) {
    return t < 0 ? 'var(--teal)' : t <= 10 ? 'var(--amber)' : 'var(--coral)';
  }
  // Track-only / maintain: don't judge either direction strongly; show direction but with muted colors
  return t < 0 ? 'var(--blue)' : t <= 10 ? 'var(--t2)' : 'var(--amber)';
}

    // Scale by puff duration (default 3s). Per-entry override via puffSeconds.
    const secs = Number(e.puffSeconds) || (state && state.settings ? state.settings.cartPuffSeconds : 3) || 3;
    const durationMult = secs / 3;
    const puffMg = (state && state.settings ? state.settings.cartPuffMg : 3) || 3;
    mg += puffs * puffMg * durationMult;
  }
  const result = Math.round(mg);
  return isFinite(result) ? result : 0;
}

function calcSuggestions(currentGrams, strengthPct, goalUnit, extraMg) {
  // Weekly step-down paces — more realistic than instant cuts
  const paces = [
    { label: 'Gentle', desc: '~5% per week', weeklyPct: 0.05 },
    { label: 'Moderate', desc: '~10% per week', weeklyPct: 0.10 },
    { label: 'Ambitious', desc: '~15% per week', weeklyPct: 0.15 },
  ];
  let baseline;
  const unit = goalUnit === 'mg' ? 'mg' : 'g';
  if (goalUnit === 'mg') {
    const flowerMg = (currentGrams && strengthPct > 0) ? currentGrams * strengthPct * 10 : 0;
    baseline = Math.round(flowerMg + (extraMg || 0));
    if (baseline <= 0) return [];
  } else {
    if (!currentGrams || currentGrams <= 0) return [];
    baseline = currentGrams;
  }
  return paces.map(p => {
    const t1w = baseline * (1 - p.weeklyPct);
    const weeksToHalf = Math.ceil(Math.log(0.5) / Math.log(1 - p.weeklyPct));
    const rounded = unit === 'mg' ? Math.round(t1w) : (t1w < 1 ? Math.round(t1w * 100) / 100 : Math.round(t1w * 10) / 10);
    return { ...p, baseline, targetAfter1w: rounded, weeksToHalf, unit };
  });
}

function genId() { return 'e' + Date.now() + '_' + Math.random().toString(36).slice(2, 6); }

function isZeroDay(e) {
  // v3.3.1: Must be an EXPLICIT no-use day, not just a day with incomplete data.
  // grams=null means "not logged" (unknown), NOT "zero" — only grams===0 counts as explicit zero.
  // Also respects entries that were logged via the "Didn't use" button which may carry
  // an isZeroDay flag or explicit 0 values.
  const flowerExplicitZero = e.grams === 0 && (e.grams2 == null || e.grams2 === 0);
  const oilExplicitZero = e.oilMl === 0 || e.oilMl == null;
  const cartExplicitZero = e.cartPuffs === 0 || e.cartPuffs == null;
  return flowerExplicitZero && oilExplicitZero && cartExplicitZero;
}

// v3.3: Leef Insights — data-driven path/goal nudges
// Returns the highest-priority active insight, or null
function pickInsight(s) {
  const dismissed = state.settings.dismissedNudges || [];
  const goal = state.settings.goal;
  const goalType = goal?.type || null;
  const e = state.entries;
  const days = e.length;

  function isDismissed(id) {
    const d = dismissed.find(x => typeof x === 'string' ? x === id : x.id === id);
    if (!d) return false;
    if (typeof d === 'string') return true;
    // Check 14-day expiry
    const dismissedAt = new Date(d.at);
    const ageDays = (Date.now() - dismissedAt.getTime()) / MS_PER_DAY;
    return ageDays < 14;
  }

  // 1. Track user with declining usage (7+ days, downward trend)
  // v3.4.1: use calcMg for total consumption (was only checking primary grams, missing grams2+oil)
  if (!goal && days >= 7 && !isDismissed('track_to_reduce')) {
    const recent7 = e.slice(-7).filter(x => calcMg(x) > 0);
    const prev7 = e.slice(-14, -7).filter(x => calcMg(x) > 0);
    if (recent7.length >= 4 && prev7.length >= 4) {
      const recentAvg = recent7.reduce((a, x) => a + calcMg(x), 0) / recent7.length;
      const prevAvg = prev7.reduce((a, x) => a + calcMg(x), 0) / prev7.length;
      if (recentAvg < prevAvg * 0.95) {
        const dropPct = Math.round((1 - recentAvg / prevAvg) * 100);
        return { id: 'track_to_reduce', icon: '\u2728', title: "You\u2019re naturally reducing", body: `Your average has dropped ${dropPct}% this week. That\u2019s happening on its own.`, action: 'dismiss', actionLabel: 'Nice' };
      }
    }
  }

  // 2. Reduce user with 7+ zero days
  if (goalType === 'reduce' && days >= 7 && !isDismissed('reduce_to_quit')) {
    const last7 = e.slice(-7);
    const allZero = last7.length === 7 && last7.every(isZeroDay);
    if (allZero) {
      return { id: 'reduce_to_quit', icon: '\u2728', title: "You've been at zero for a full week", body: 'That\'s huge. Want to shift to a quit goal?', action: 'change-plan', actionLabel: 'Switch to quit' };
    }
  }

  // 3. Reduce user crushing target for 14+ days
  if (goalType === 'reduce' && days >= 14 && goal.targetGrams && !isDismissed('reduce_lower_target')) {
    const last14 = e.slice(-14).filter(x => x.grams != null);
    if (last14.length >= 10) {
      const avg = last14.reduce((a, x) => a + (x.grams || 0), 0) / last14.length;
      if (avg < goal.targetGrams * 0.6) {
        return { id: 'reduce_lower_target', icon: '\u2728', title: "You're crushing your target", body: `2 weeks under your goal. Maybe time to set a tighter one?`, action: 'change-plan', actionLabel: 'Update goal' };
      }
    }
  }

  // 3b. Maintain mode — within range for 2+ weeks (v6: cross-product via calcMg)
  if (goalType === 'reduce' && goal.reduceMode === 'maintain' && goal.maintainAt > 0 && days >= 14 && !isDismissed('maintain_consistent')) {
    const last14 = e.slice(-14).filter(x => calcMg(x) > 0);
    if (last14.length >= 10) {
      // maintainAt is stored in grams; convert calcMg (mg) to grams for fair comparison
      const avgG = last14.reduce((a, x) => a + calcMg(x), 0) / last14.length / 10;
      const diff = Math.abs(avgG - goal.maintainAt) / goal.maintainAt;
      if (diff <= 0.15) {
        const weeks = Math.floor(days / 7);
        return { id: 'maintain_consistent', icon: '\u2728', title: weeks + ' weeks at your level', body: 'This is sustainable. You\'ve found your balance.', action: 'dismiss', actionLabel: 'Nice' };
      }
    }
  }

  // 3c. Maintain mode — drifting above maintain level (v6: cross-product via calcMg)
  if (goalType === 'reduce' && goal.reduceMode === 'maintain' && goal.maintainAt > 0 && days >= 7 && !isDismissed('maintain_drift')) {
    const last7 = e.slice(-7).filter(x => calcMg(x) > 0);
    if (last7.length >= 5) {
      const avgG = last7.reduce((a, x) => a + calcMg(x), 0) / last7.length / 10;
      if (avgG > goal.maintainAt * 1.2) {
        return { id: 'maintain_drift', icon: '\u2728', title: 'Drifting above your maintain level', body: 'Your 7-day average is ' + avgG.toFixed(1) + 'g vs your ' + goal.maintainAt + 'g level. Gentle nudge.', action: 'dismiss', actionLabel: 'Noted' };
      }
    }
  }

  // 3d. Flow mode — naturally tapering (uses calcMg for cross-product support)
  if (goalType === 'reduce' && goal.reduceMode === 'flow' && days >= 14 && !isDismissed('flow_tapering')) {
    const recent7 = e.slice(-7).filter(x => calcMg(x) > 0);
    const prev7 = e.slice(-14, -7).filter(x => calcMg(x) > 0);
    if (recent7.length >= 4 && prev7.length >= 4) {
      const recentAvg = recent7.reduce((a, x) => a + calcMg(x), 0) / recent7.length;
      const prevAvg = prev7.reduce((a, x) => a + calcMg(x), 0) / prev7.length;
      if (recentAvg < prevAvg * 0.9) {
        const dropPct = Math.round((1 - recentAvg / prevAvg) * 100);
        return { id: 'flow_tapering', icon: '\u2728', title: 'Down ' + dropPct + '% this week', body: 'No target needed \u2014 you\'re finding your own pace.', action: 'dismiss', actionLabel: 'Nice' };
      }
    }
  }

  // 4. Budget user consistently UNDER budget for 4+ weeks → praise + suggest add reduce
  if (goalType === 'budget' && days >= 28 && goal.weeklyBudget && !isDismissed('budget_add_reduce')) {
    // Calculate avg weekly spend over last 4 weeks
    const last28 = e.slice(-28);
    const totalSpent = last28.reduce((a, x) => a + (x.purchase || 0), 0);
    const avgWeekly = totalSpent / 4;
    if (avgWeekly < goal.weeklyBudget * 0.85) {
      return { id: 'budget_add_reduce', icon: '\u2728', title: 'A month of staying under budget', body: 'Nice work. If you want, you could add a reduction goal too \u2014 totally optional.', action: 'dismiss', actionLabel: 'Thanks' };
    }
  }

  // 5. Quit user logged a non-zero day recently — support-first message
  if (goalType === 'break' && goal.breakEnd === null && !isDismissed('quit_slip')) {
    const last3 = e.slice(-3);
    const hasUse = last3.some(x => (x.grams && x.grams > 0) || (x.cartPuffs && x.cartPuffs > 0) || (x.oilMl && x.oilMl > 0));
    if (hasUse) {
      return { id: 'quit_slip', icon: '\u2728', title: 'You\u2019re still in this', body: 'You didn\u2019t break anything \u2014 one moment doesn\u2019t undo your progress. Take a breath, log it honestly, and pick up tomorrow. You\u2019re okay.', action: 'dismiss', actionLabel: 'Thanks' };
    }
  }

  // v6: Timed break user logged a non-zero day recently — gentle reassurance, no "switch mode" push
  if (goalType === 'break' && goal.breakEnd && !isDismissed('break_slip')) {
    const last3 = e.slice(-3);
    const hasUse = last3.some(x => (x.grams && x.grams > 0) || (x.cartPuffs && x.cartPuffs > 0) || (x.oilMl && x.oilMl > 0));
    if (hasUse) {
      return { id: 'break_slip', icon: '\u2728', title: 'A blip, not a break', body: 'That\u2019s not a failure \u2014 you\u2019re still learning. One moment doesn\u2019t erase what you\u2019ve built. Tomorrow\u2019s a fresh start.', action: 'dismiss', actionLabel: 'Thanks' };
    }
  }

  // 6. Break user halfway through (v6: lowered threshold from >7 to >3 for short breaks)
  if (goalType === 'break' && goal.breakEnd && !isDismissed('break_halfway')) {
    const start = new Date(goal.breakStart || goal.setAt);
    const end = new Date(goal.breakEnd);
    const total = Math.round((end - start) / MS_PER_DAY);
    const elapsed = Math.round((Date.now() - start.getTime()) / MS_PER_DAY);
    if (total > 3 && elapsed >= total / 2 && elapsed < total / 2 + 3) {
      return { id: 'break_halfway', icon: '\u2728', title: 'Halfway through your break', body: 'How are you feeling? Tap a mood today to track it.', action: 'log', actionLabel: 'Log today' };
    }
  }

  // 7. v3.3.2: Mood ↔ consumption correlation (any goal, 14+ days with mood data)
  // Only fires when there's a CLEAR positive finding. No "steady" or "no change" insights — silence is better than noise.
  if (days >= 14 && !isDismissed('mood_correlation')) {
    const withMood = e.filter(x => x.mood != null && calcMg(x) > 0);
    if (withMood.length >= 14) {
      const sortedByMg = [...withMood].sort((a, b) => calcMg(a) - calcMg(b));
      const half = Math.ceil(sortedByMg.length / 2);
      const lowDays = sortedByMg.slice(0, half);
      const highDays = sortedByMg.slice(half);
      const lowMood = lowDays.reduce((a, x) => a + x.mood, 0) / lowDays.length;
      const highMood = highDays.reduce((a, x) => a + x.mood, 0) / highDays.length;
      if (lowMood > highMood + 0.5) {
        return { id: 'mood_correlation', icon: '\u2728', title: 'Mood tends to be higher on lighter days', body: `${lowMood.toFixed(1)}/5 on lighter days vs ${highMood.toFixed(1)}/5 on heavier days.`, action: 'view-stats', actionLabel: 'See stats' };
      }
      // Don't show anything if no clear pattern — silence > misleading insight
    }
  }

  // 8. v3.3.2: Sleep ↔ consumption correlation
  if (days >= 14 && !isDismissed('sleep_correlation')) {
    const withSleep = e.filter(x => x.sleep != null && calcMg(x) > 0);
    if (withSleep.length >= 14) {
      const sortedByMg = [...withSleep].sort((a, b) => calcMg(a) - calcMg(b));
      const half = Math.ceil(sortedByMg.length / 2);
      const lowDays = sortedByMg.slice(0, half);
      const highDays = sortedByMg.slice(half);
      const lowSleep = lowDays.reduce((a, x) => a + x.sleep, 0) / lowDays.length;
      const highSleep = highDays.reduce((a, x) => a + x.sleep, 0) / highDays.length;
      if (lowSleep > highSleep + 0.5) {
        return { id: 'sleep_correlation', icon: '\u2728', title: 'Sleep tends to be better on lighter days', body: `${lowSleep.toFixed(1)}/5 vs ${highSleep.toFixed(1)}/5.`, action: 'view-stats', actionLabel: 'See stats' };
      }
    }
  }

  // 9. v3.3.1: First week celebration (any goal, exactly 7 days in)
  if (days === 7 && !isDismissed('first_week')) {
    return { id: 'first_week', icon: '\ud83c\udf89', title: 'Your first full week', body: 'Seven days of data. You\'re building a real picture of your habits. Keep going.', action: 'dismiss', actionLabel: 'Thanks' };
  }

  // 10. v3.3.1: Logging streak landmark (5, 10, 25, 50 day streaks)
  if (s && s.streak && [5, 10, 25, 50].includes(s.streak) && !isDismissed('streak_' + s.streak)) {
    const streakMessages = {
      5: { title: '5 days in a row', body: "You're building the habit. The hardest part is showing up daily \u2014 you're doing it." },
      10: { title: 'Double-digit streak!', body: '10 days of consistent logging. Your data is starting to tell a real story.' },
      25: { title: '25 day streak \ud83d\udd25', body: 'Three and a half weeks. Most people quit apps by now. You\'re different.' },
      50: { title: '50 days strong', body: "Half a hundred. Whatever your goal is, you're more than halfway to making this part of who you are." }
    };
    const m = streakMessages[s.streak];
    return { id: 'streak_' + s.streak, icon: '\ud83d\udd25', title: m.title, body: m.body, action: 'dismiss', actionLabel: 'Thanks' };
  }

  // 11. v3.3.1: Best week landmark (reduce/track users hitting a new low)
  if ((goalType === 'reduce' || !goal) && days >= 14 && !isDismissed('new_low_landmark')) {
    // Compare last 7 days avg to all previous 7-day windows
    const last7 = e.slice(-7).filter(x => x.grams != null);
    if (last7.length >= 5) {
      const last7Avg = last7.reduce((a, x) => a + (x.grams || 0), 0) / last7.length;
      // Check if this is the lowest 7-day window in the data
      let isLowest = true;
      for (let i = 0; i <= e.length - 14; i++) {
        const window = e.slice(i, i + 7).filter(x => x.grams != null);
        if (window.length >= 5) {
          const winAvg = window.reduce((a, x) => a + (x.grams || 0), 0) / window.length;
          if (winAvg < last7Avg * 0.99) { isLowest = false; break; }
        }
      }
      if (isLowest && last7Avg > 0) {
        return { id: 'new_low_landmark', icon: '\u2728', title: 'New best week', body: `Your last 7 days averaged ${last7Avg.toFixed(1)}g \u2014 the lowest in your data. Worth a moment.`, action: 'dismiss', actionLabel: 'Nice' };
      }
    }
  }

  // 12. v3.3.1: Day-of-week pattern insight — fires after 21+ days with mg data
  if (days >= 21 && !isDismissed('dow_pattern')) {
    const byDow = [[], [], [], [], [], [], []]; // Sun=0 ... Sat=6
    e.forEach(x => {
      const mg = calcMg(x);
      if (mg > 0) {
        const d = new Date(x.date + 'T12:00:00');
        byDow[d.getDay()].push(mg);
      }
    });
    // Need at least 3 data points per dow for valid averages
    const dowAvgs = byDow.map(arr => arr.length >= 3 ? arr.reduce((a, b) => a + b, 0) / arr.length : null);
    const validDows = dowAvgs.map((v, i) => ({ v, i })).filter(x => x.v != null);
    if (validDows.length >= 5) {
      const overallAvg = validDows.reduce((a, x) => a + x.v, 0) / validDows.length;
      // Find the day with the highest avg
      const sorted = [...validDows].sort((a, b) => b.v - a.v);
      const highest = sorted[0];
      // Only fire if the highest day is >25% above the overall avg
      if (highest.v > overallAvg * 1.25) {
        const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const pct = Math.round(((highest.v / overallAvg) - 1) * 100);
        return { id: 'dow_pattern', icon: '\u2728', title: dayNames[highest.i] + ' is your heaviest day', body: `${pct}% more than your typical day on average. Worth planning around.`, action: 'dismiss', actionLabel: 'Good to know' };
      }
    }
  }

  // 13. v3.3.1: Target-reach forecast (reduce users only)
  if (goalType === 'reduce' && days >= 14 && goal.targetGrams && !isDismissed('target_eta')) {
    const last14 = e.slice(-14).filter(x => x.grams != null);
    const prev14 = e.slice(-28, -14).filter(x => x.grams != null);
    if (last14.length >= 10 && prev14.length >= 10) {
      const recentAvg = last14.reduce((a, x) => a + (x.grams || 0), 0) / last14.length;
      const prevAvg = prev14.reduce((a, x) => a + (x.grams || 0), 0) / prev14.length;
      if (recentAvg > goal.targetGrams && prevAvg > recentAvg) {
        // User is reducing. Project ETA to target based on 2-week reduction rate
        const drop2Weeks = prevAvg - recentAvg;
        if (drop2Weeks > 0) {
          const toGo = recentAvg - goal.targetGrams;
          const weeksToGo = Math.ceil((toGo / drop2Weeks) * 2);
          if (weeksToGo > 0 && weeksToGo <= 26) {
            const etaDate = new Date(); etaDate.setDate(etaDate.getDate() + (weeksToGo * 7));
            const etaStr = etaDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
            return { id: 'target_eta', icon: '\u2728', title: 'At this pace, you\'ll hit your target in ~' + weeksToGo + ' weeks', body: `Projected around ${etaStr}. That's if you keep up the current rate.`, action: 'dismiss', actionLabel: 'Nice' };
          }
        }
      }
    }
  }

  // 14. v3.3.1: Trigger pattern insight — which context drives the heaviest days
  if (days >= 14 && !isDismissed('trigger_pattern')) {
    const withTrigs = e.filter(x => Array.isArray(x.triggers) && x.triggers.length > 0 && calcMg(x) > 0);
    if (withTrigs.length >= 7) {
      // Calculate average mg per trigger
      const trigSums = {}; const trigCounts = {};
      withTrigs.forEach(x => {
        const mg = calcMg(x);
        x.triggers.forEach(k => {
          trigSums[k] = (trigSums[k] || 0) + mg;
          trigCounts[k] = (trigCounts[k] || 0) + 1;
        });
      });
      // Overall average mg for comparison
      const allMg = e.map(x => calcMg(x)).filter(mg => mg > 0);
      const overallAvg = allMg.reduce((a, b) => a + b, 0) / allMg.length;
      // Find trigger with highest avg and at least 3 occurrences
      const trigAvgs = Object.keys(trigSums)
        .filter(k => trigCounts[k] >= 3)
        .map(k => ({ key: k, avg: trigSums[k] / trigCounts[k], n: trigCounts[k] }))
        .sort((a, b) => b.avg - a.avg);
      if (trigAvgs.length > 0 && trigAvgs[0].avg > overallAvg * 1.2) {
        const top = trigAvgs[0];
        const tg = TRIGGER_TAGS.find(x => x.key === top.key);
        if (tg) {
          const pct = Math.round(((top.avg / overallAvg) - 1) * 100);
          return { id: 'trigger_pattern', icon: '\u2728', title: tg.icon + ' ' + tg.label + ' days are heavier', body: `${pct}% more on ${tg.label.toLowerCase()} days than your average. Knowing the trigger is half the battle.`, action: 'dismiss', actionLabel: 'Noted' };
        }
      }
    }
  }

  return null;
}

  if (!insight) return '';
  return `<div class="card cp" id="insight-card-wrap" style="background:var(--card);border:1px solid rgba(143,136,232,.22);box-shadow:0 4px 16px rgba(143,136,232,.1);position:relative;animation:fadeUp .5s cubic-bezier(.22,1,.36,1)">
    <button id="insight-dismiss" data-insight-id="${insight.id}" aria-label="Dismiss" style="position:absolute;top:4px;right:4px;background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;line-height:1">\u2715</button>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <span style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:#8f88e8;text-transform:uppercase">\u2728 Leef Insights</span>
    </div>

// v3.4: Trigger analysis engine — frequency, correlation, day-of-week heatmap
function triggerFrequency(entries) {
  const counts = {};
  entries.forEach(e => {
    if (!Array.isArray(e.triggers)) return;
    e.triggers.forEach(k => { counts[k] = (counts[k] || 0) + 1; });
  });
  return Object.keys(counts)
    .map(k => ({ key: k, count: counts[k] }))
    .filter(x => x.count >= 2)
    .sort((a, b) => b.count - a.count);
}

function triggerCorrelation(entries) {
  const withMg = entries.filter(e => calcMg(e) > 0);
  if (withMg.length === 0) return [];
  const overallAvg = withMg.reduce((s, e) => s + calcMg(e), 0) / withMg.length;
  const sums = {}, counts = {};
  withMg.forEach(e => {
    if (!Array.isArray(e.triggers)) return;
    const mg = calcMg(e);
    e.triggers.forEach(k => {
      sums[k] = (sums[k] || 0) + mg;
      counts[k] = (counts[k] || 0) + 1;
    });
  });
  return Object.keys(sums)
    .filter(k => counts[k] >= 2)
    .map(k => {
      const avg = sums[k] / counts[k];
      const pctDiff = Math.round(((avg / overallAvg) - 1) * 100);
      return { key: k, avg: Math.round(avg), overallAvg: Math.round(overallAvg), pctDiff, count: counts[k] };
    })
    .sort((a, b) => b.count - a.count)
    .slice(0, 3);
}

function triggerDayHeatmap(entries) {
  const withTrigs = entries.filter(e => Array.isArray(e.triggers) && e.triggers.length > 0);
  if (withTrigs.length < 14) return null;
  const grid = {};
  withTrigs.forEach(e => {
    const d = new Date(e.date + 'T12:00:00');
    const dow = d.getDay();
    const dayIdx = dow === 0 ? 6 : dow - 1;
    e.triggers.forEach(k => {
      if (!grid[k]) grid[k] = [0,0,0,0,0,0,0];
      grid[k][dayIdx]++;
    });
  });
  const results = [];
  Object.keys(grid).forEach(k => {
    const counts = grid[k];
    const total = counts.reduce((a,b) => a+b, 0);
    if (total < 3) return;
    const max = Math.max(...counts);
    if (max < 2) return;
    const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const peakDays = counts.map((c,i) => c === max ? dayNames[i] : null).filter(Boolean);
    results.push({ key: k, counts, peakDays, total });
  });
  return results.length > 0 ? results.sort((a,b) => b.total - a.total) : null;
}

// v3.3.1: Dynamic note prompts — intent + streak + day-of-week aware.
// Returns a rotating placeholder that feels considered, not scripted.
function notePromptFor(f) {
  const gt = state.settings.goal?.type;
  const isQuit = gt === 'break' && !state.settings.goal?.breakEnd;
  const isBreak = gt === 'break' && !!state.settings.goal?.breakEnd;
  const dow = new Date().getDay(); // 0 Sun - 6 Sat
  const isWeekend = dow === 0 || dow === 6;
  const isMonday = dow === 1;
  const isFriday = dow === 5;
  const streak = (state.entries || []).length;
  // Pick a deterministic but varied prompt based on the date + context
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0)) / MS_PER_DAY);
  const pick = (arr) => arr[dayOfYear % arr.length];

  if (f.isZeroDay) {
    if (isQuit) {
      return pick([
        'What helped you stay on track today?',
        'How does day ' + (streak + 1) + ' feel? One word is enough.',
        'Cravings today? What did you do instead?',
        'What made today easier than yesterday?',
        'Anything you learned about yourself today?'
      ]);
    }
    return pick([
      'What helped today? Any cravings?',
      'Nice one. How did it feel?',
      'What did you do instead today?',
      'Was today harder or easier than you expected?'
    ]);
  }

  if (isQuit) {
    return pick([
      'What happened today?',
      'What led up to it?',
      'How are you feeling now?',
      'No judgment. Just capture the moment.',
      'Was there a trigger? Write it down while it\u2019s fresh.'
    ]);
  }

  if (isBreak) {
    return pick([
      'How\u2019s the break going?',
      'What\u2019s shifted since you started?',
      'Notice anything in your sleep or mood?',
      'Anything to remember for next time?'
    ]);
  }

  if (gt === 'reduce') {
    if (isMonday) return 'Fresh week \u2014 how do you want this one to go?';
    if (isFriday) return 'End of the week. How did it compare to last?';
    return pick([
      'How are you feeling about your progress?',
      'Why today? Anything worth remembering?',
      'What\u2019s working for you this week?',
      'One thing you\u2019d change about today?',
      'How did it compare to yesterday?'
    ]);
  }

  if (gt === 'budget') {
    if (isFriday) return 'End of the week. Spend more or less than you wanted?';
    return pick([
      'How the day went\u2026',
      'Was this a planned pickup or impulse?',
      'Worth the money? Be honest.',
      'Anything to budget differently next week?'

  }

  // Track (no goal)
  if (isWeekend) return pick([
    'Weekend check-in \u2014 what\u2019s different today?',
    'Anything worth remembering from today?',
    'How was it?'
  ]);
  return pick([
    'Anything to note?',
    'What made today today?',
    'How was the session?',
    'Notice anything about your mood?',
    'A line for future-you to find.'
  ]);
}

   DATA MIGRATION & PERSISTENCE
   ═══════════════════════════════════════════════════════════ */
function saveData() {
  // v5.1: Any data mutation invalidates the stats cache.
  _statsCache = null;
  _cachedAvg7mg = null;
  const data = {
    v: VERSION,
    settings: state.settings,
    entries: state.entries,
    milestones: state.milestones,
    lastBackup: state.lastBackup,
  };
  try {
    localStorage.setItem(APP_KEY, JSON.stringify(data));
  } catch (e) {
    console.error('Leef: localStorage save failed', e);
    // v3.3.1: use the new error toast style
    try { toast('Save failed \u2014 storage full. Export a backup.', null, 'error'); } catch (_) {}
  }
}

function loadData() {
  // 1. Try loading current format (any version with entries object)
  try {
    const stored = localStorage.getItem(APP_KEY);
    if (stored) {
      let data;
      try {
        data = JSON.parse(stored);
      } catch (parseErr) {
        console.error('Leef: corrupt localStorage JSON, starting fresh', parseErr);
        try { toast('Saved data was corrupted. Starting fresh \u2014 export a backup next time!', null, 'error'); } catch (_) {}
        localStorage.removeItem(APP_KEY);
        state.settings.onboardingDone = false;
        return;
      }
      if (data.v && data.entries) {
        state.entries = (Array.isArray(data.entries) ? data.entries : []).filter(e => {
          // Drop entries missing a valid date
          if (!e || typeof e.date !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(e.date)) return false;
          // Ensure id exists
          if (!e.id) e.id = genId();
          // Coerce numeric fields to guard against string pollution
          if (e.grams != null) e.grams = parseFloat(e.grams) || 0;
          if (e.oilMl != null) e.oilMl = parseFloat(e.oilMl) || 0;
          if (e.cartPuffs != null) e.cartPuffs = parseInt(e.cartPuffs, 10) || 0;
          if (e.strength != null) e.strength = parseFloat(e.strength) || 0;
          return true;
        }).map(e => {
          // Migrate symptoms from string[] to { key, intensity }[]
          if (e.symptoms && Array.isArray(e.symptoms) && e.symptoms.length && typeof e.symptoms[0] === 'string') {
            e.symptoms = e.symptoms.map(s => ({ key: s, intensity: 2 }));
          }
          return e;
        });
        state.settings = { ...defaultSettings(), ...data.settings };
        // v5.0: existing users who already onboarded should skip splash
        if (state.settings.onboardingDone && state.settings.splashSeen == null) {
          state.settings.splashSeen = true;
        }
        state.milestones = Array.isArray(data.milestones) ? data.milestones : [];
        state.lastBackup = data.lastBackup;
        // v1 to v2 migration: add goal type
        if (state.settings.goal && !state.settings.goal.type) {
          state.settings.goal.type = 'reduce';
          state.settings.goal.setAt = state.settings.goal.setAt || todayStr();
        }
        // Re-save with current version
        if (data.v !== VERSION) saveData();
        return;
      }
    }
  } catch (e) {
    console.error('Leef: loadData error', e);
  }

  // Load from seed data file (for the main file with taper-data.js)
  if (SEED.length) {
    state.entries = SEED.map((s, i) => ({ id: 'h' + i, ...s, mood: s.mood ?? null, sleep: s.sleep ?? null }));
    state.settings.onboardingDone = true;
    state.settings.splashSeen = true; // v5.0: skip splash for seed-data users
    saveData();
    return;
  }

  // 4. Fresh install — show onboarding
  state.settings.onboardingDone = false;
}

   TOAST
