function showFirstLogCelebration() {
  const overlay = document.createElement('div');
  overlay.className = 'celebrate-overlay';
  // Intent-aware copy
  const goalT = state.settings.goal?.type || null;
  const intent = goalT === 'break' ? (state.settings.goal.breakEnd ? 'break' : 'quit')
    : goalT === 'reduce' ? 'reduce'
    : goalT === 'budget' ? 'budget'
    : 'track';
  const copy = {
    reduce: { icon: '\ud83c\udf31', title: "You're on your way", body: "First log in the books. Keep going \u2014 small steps add up to real change." },
    budget: { icon: '\ud83d\udcb0', title: "First log, first insight", body: "You'll start seeing your spending patterns after a few more days. Every log sharpens the picture." },
    break: { icon: '\u23f8', title: 'Day 1 begins', body: "The first day is the hardest. You've already done it. We'll be here the whole way." },
    quit: { icon: '\ud83c\udf89', title: 'Day 1 begins', body: "The first day is the hardest, and you've already done it. We'll be here the whole way." },
    track: { icon: '\u2728', title: 'Your first log', body: "Nice. Charts and insights unlock at 3 logs. Patterns show up around day 7. Keep it casual \u2014 just log when you feel like it." }
  }[intent];
  // Build confetti pieces
  const confettiColors = ['#3db87a', '#3478c8', '#e0a030', '#8f88e8', '#1eb07a'];
  const pieces = [];
  for (let i = 0; i < 24; i++) {
    const col = confettiColors[i % confettiColors.length];
    const left = Math.random() * 100;
    const delay = Math.random() * .8;
    const rot = Math.floor(Math.random() * 360);
    pieces.push(`<div class="confetti-piece" style="left:${left}%;top:-20px;background:${col};transform:rotate(${rot}deg);animation-delay:${delay}s"></div>`);
  }
  overlay.innerHTML = `
    ${pieces.join('')}
    <div class="celebrate-icon">${copy.icon}</div>
    <div class="celebrate-title">${copy.title}</div>
    <div class="celebrate-body">${copy.body}</div>
    <button class="celebrate-cta" id="celebrate-cta">Let's go</button>
  `;
  document.body.appendChild(overlay);
  haptic(20);
  // Dismiss on tap
  const dismiss = () => {
    overlay.classList.add('closing');
    setTimeout(() => overlay.remove(), 320);
  };
  overlay.querySelector('#celebrate-cta').addEventListener('click', dismiss, { once: true });
  // Auto-dismiss after 6 seconds
  setTimeout(dismiss, 6000);
}

// Cache current PM input values before re-rendering (called before intent switch)
function _pmCacheInputs() {
  const pm = window._pm;
  if (!pm) return;
  const gramsEl = document.getElementById('pm-grams');
  const mgEl = document.getElementById('pm-mg');
  const dateEl = document.getElementById('pm-date');
  const budgetEl = document.getElementById('pm-budget');
  const breakEndEl = document.getElementById('pm-break-end');
  const breakOpenEl = document.getElementById('pm-break-open');
  if (gramsEl) pm.cache.reduce.grams = gramsEl.value;
  if (mgEl) pm.cache.reduce.mg = mgEl.value;
  if (dateEl) pm.cache.reduce.date = dateEl.value;
  const maintainEl = document.getElementById('pm-maintain');
  if (maintainEl) pm.cache.reduce.maintainAt = maintainEl.value;
  if (budgetEl) pm.cache.budget.amount = budgetEl.value;
  if (breakEndEl) pm.cache.break.endDate = breakEndEl.value;
  if (breakOpenEl) pm.cache.break.openEnded = breakOpenEl.checked;
}

function buildToggles() {
  const el = document.getElementById('toggles');
  if (!el) return;
  // Show toggles for methods that are either selected OR have data in the current range
  const entries = filteredEntries();
  const hasOilData = entries.some(e => e.oilMl > 0);
  const hasFlowerData = entries.some(e => e.grams > 0 || e.grams2 > 0);
  const methods = state.settings.primaryMethods || ['flower'];
  const relevant = SERIES.filter(s => {
    if (!DAILY_SERIES.includes(s.key)) return false;
    if (s.key === 'oil' && !methods.includes('oil') && !hasOilData) return false;
    if (s.key === 'grams' && !methods.includes('flower') && !methods.includes('cart') && !hasFlowerData) return false;
    return true;
  });
  el.innerHTML = relevant.map(s => {
    const col = seriesColor(s);
    return `<button class="tog${state.vis[s.key] ? '' : ' off'}" data-vis="${s.key}"
      style="${state.vis[s.key] ? `background:${hexA(col,.22)};color:${col};border-color:${hexA(col,.3)}` : ''}">
      ${s.label}</button>`;
  }).join('');
}

function buildCharts() {
  // v5.1: Silently skip chart building if Chart.js CDN failed
  if (typeof Chart === 'undefined') return;
  const data = cd();
  const labels = data.map(d => d.lbl);
  const n = labels.length;
  const vis = state.vis;
  const dark = isDark();
  const col = dark
    ? { blue: '#4d9de0', amber: '#e0a030', purple: '#8f88e8', coral: '#e06840' }
    : { blue: '#3478c8', amber: '#b8700f', purple: '#6c65cc', coral: '#c84e28' };
  const hasMain = vis.grams || vis.oil || vis.mg;
  const dense = data.length > 21;
  // Check if all consumption data is zero (e.g., quit user with no use)
  const allZeroConsumption = data.every(d => (!d.grams || d.grams === 0) && (!d.oil || d.oil === 0) && (!d.mg || d.mg === 0));

  const mcWrap = document.getElementById('mc-wrap');
  const mcEmpty = document.getElementById('mc-empty');
  if (mcWrap) mcWrap.style.display = (hasMain && !allZeroConsumption) ? 'block' : 'none';
  if (mcEmpty) {
    if (allZeroConsumption && data.length > 0) {
      mcEmpty.style.display = 'block';
      mcEmpty.textContent = 'Staying clean — nothing to chart here';
    } else if (!hasMain) {
      mcEmpty.style.display = 'block';
      mcEmpty.textContent = 'Select a series above';
    } else {
      mcEmpty.style.display = 'none';
    }
  }

  // Main daily chart
  if (hasMain) {
    const datasets = [];
    const mgMax = (() => { const v = data.reduce((m, d) => Math.max(m, d.mg ?? 0), 0); return Math.max(200, Math.ceil(v / 50) * 50); })();
    if (vis.mg) datasets.push({ _key: 'mg', type: 'line', label: 'THC (mg)', data: data.map(d => d.mg), borderColor: col.coral, backgroundColor: col.coral, fill: false, pointRadius: dense ? 0 : 3, pointHoverRadius: 8, tension: 0.3, spanGaps: true, yAxisID: 'R', order: 1, borderWidth: dense ? 2 : 2.5 });
    if (vis.mgTrend) {
      const mgVals = data.map(d => d.mg);
      const trend = mgVals.map((_, i) => { const w = mgVals.slice(Math.max(0, i - 6), i + 1).filter(v => v != null); return w.length ? Math.round(w.reduce((a, b) => a + b, 0) / w.length) : null; });
      datasets.push({ _key: 'mgTrend', type: 'line', label: 'THC trend (7d avg)', data: trend, borderColor: dark ? '#e0a030' : '#b8700f', backgroundColor: 'transparent', pointRadius: 0, tension: 0.4, spanGaps: true, borderWidth: 2, borderDash: [5,3], yAxisID: 'R', order: 0 });
    }
    const sparseBar = data.length < 10;
    if (vis.grams) datasets.push({ _key: 'grams', type: 'bar', label: 'Flower (g)', data: data.map(d => d.grams), backgroundColor: dark ? 'rgba(77,157,224,.4)' : 'rgba(52,120,200,.4)', borderRadius: 2, maxBarThickness: sparseBar ? 24 : 12, yAxisID: 'L', order: 3 });
    if (vis.oil) datasets.push({ _key: 'oil', type: 'bar', label: 'THC oil (ml)', data: data.map(d => d.oil), backgroundColor: dark ? 'rgba(129,140,248,.55)' : 'rgba(99,102,241,.55)', borderRadius: 2, maxBarThickness: sparseBar ? 16 : 8, yAxisID: 'L', order: 4 });

    const lMax = Math.max(2.5, Math.ceil(Math.max(...data.map(d => (d.grams || 0) + (d.oil || 0))) * 1.15 * 2) / 2);
    const leftUnit = vis.grams && vis.oil ? 'g/ml' : vis.grams ? 'g' : 'ml';
    const tickCol = dark ? 'rgba(235,235,245,.35)' : '#aaa';
    const gridCol = dark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.05)';
    const scales = {
      x: { ticks: { autoSkip: true, maxRotation: 40, font: { size: 10 }, color: tickCol }, grid: { display: false } },
      L: { position: 'left', min: 0, max: lMax, display: !!(vis.grams || vis.oil), ticks: { font: { size: 9 }, color: tickCol }, grid: { color: gridCol } },
      R: { position: 'right', min: 0, max: mgMax, display: !!vis.mg, ticks: { font: { size: 9 }, color: col.coral }, grid: { display: false } },
    };

    const mcEl = document.getElementById('main-canvas');
    sizeCanvas(mcEl);
    mainChart = new Chart(mcEl, {
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, tooltip: _chartTooltipOpts(true, function(pt, ds) {
              var d = data[pt.dataIndex];
              if (ds.label === 'Flower (g)') return d.str ? 'Flower: ' + d.grams + 'g @ ' + d.str + '%' : 'Flower: ' + d.grams + 'g';
              if (ds.label === 'THC oil (ml)') return 'Oil: ' + d.oil + 'ml';
              if (ds.label === 'THC (mg)') return 'THC: ' + d.mg + 'mg';
              if (ds.label === 'THC trend (7d avg)') return 'THC trend: ' + pt.raw + 'mg';
              return ds.label + ': ' + pt.raw;
            }, function(items) { return items && items[0] != null ? [data[items[0].dataIndex].lbl] : []; })
        },
        layout: { padding: { top: 14 } },
        scales,
      },
      plugins: [tooltipPinPlugin, axisUnitPlugin],
    });
    if (mainChart.scales.L) mainChart.scales.L._leefUnit = leftUnit;
    if (mainChart.scales.R) mainChart.scales.R._leefUnit = 'mg';
    mainChart.update();

    document.getElementById('main-leg').innerHTML = datasets.map(d => {
      let swatch;
      if (d.type === 'bar') swatch = '<span class="leg-bar" style="background:' + d.backgroundColor + '"></span>';
      else { const bc = d.borderColor; const dash = d.borderDash; swatch = '<span class="leg-line" style="' + (dash ? 'background:repeating-linear-gradient(90deg,' + bc + ' 0 4px,transparent 4px 7px)' : 'background:' + bc) + '"></span>'; }
      return '<button class="leg-item leg-btn">' + swatch + d.label + '</button>';
    }).join('');
    _bindLegendToggle('main-leg', mainChart);
  }

  // Weekly chart
  {
    const wd = weeklyData();
    const wLabels = wd.map(d => d.lbl);
    const tickCol = dark ? 'rgba(235,235,245,.35)' : '#aaa';
    // Gradient for weekly THC bars
    const wcEl = document.getElementById('weekly-canvas');
    if (!wcEl) return;
    sizeCanvas(wcEl);
    const wcCtx = wcEl.getContext('2d');
    const barGrad = wcCtx.createLinearGradient(0, 0, 0, wcEl.height || 220);
    barGrad.addColorStop(0, dark ? 'rgba(224,104,64,.75)' : 'rgba(200,78,40,.7)');
    barGrad.addColorStop(1, dark ? 'rgba(224,104,64,.2)' : 'rgba(200,78,40,.15)');
    // Gradient fill under flower line
    const flowerFill = wcCtx.createLinearGradient(0, 0, 0, wcEl.height || 220);
    flowerFill.addColorStop(0, dark ? 'rgba(77,157,224,.2)' : 'rgba(52,120,200,.15)');
    flowerFill.addColorStop(1, dark ? 'rgba(77,157,224,.0)' : 'rgba(52,120,200,.0)');
    const wDatasets = [
      { type: 'bar', label: 'Avg THC mg', data: wd.map(d => d.mg), backgroundColor: barGrad, borderRadius: 3, maxBarThickness: 28, yAxisID: 'R', order: 2 },
      { type: 'line', label: 'Avg flower (g)', data: wd.map(d => d.grams), borderColor: dark ? '#4d9de0' : '#3478c8', backgroundColor: flowerFill, fill: 'origin', pointRadius: 3, tension: 0.3, yAxisID: 'L', order: 1, borderWidth: 2 },
    ];
    // v3.4: mood/sleep removed from weekly chart — they have their own dedicated wellbeing card now
    const wlMax = Math.max(2.5, Math.ceil(Math.max(...wd.map(d => d.grams || 0)) * 1.15 * 2) / 2);
    const wScales = {
      x: { ticks: { font: { size: 10 }, color: tickCol, maxRotation: 40 }, grid: { display: false } },
      L: { position: 'left', min: 0, max: wlMax, display: false, grid: { color: dark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.05)' } },
      R: { position: 'left', min: 0, max: Math.max(200, Math.ceil(Math.max(...wd.map(d => d.mg || 0)) * 1.15 / 50) * 50), ticks: { font: { size: 9 }, color: tickCol }, grid: { display: false } },
    };
    weeklyChart = new Chart(wcEl, {
      data: { labels: wLabels, datasets: wDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { bottom: 18 } },
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, tooltip: _chartTooltipOpts(true, null, function(items) { return items && items[0] != null ? [wLabels[items[0].dataIndex] + ' week'] : []; }) },
        layout: { padding: { top: 14 } },
        scales: wScales,
      },
      plugins: [tooltipPinPlugin, axisUnitPlugin],
    });
    if (weeklyChart.scales.R) weeklyChart.scales.R._leefUnit = 'mg';
    if (weeklyChart.scales.L) weeklyChart.scales.L._leefUnit = 'g';
    weeklyChart.update();
    document.getElementById('weekly-leg').innerHTML = wDatasets.map(d => {
      const bc = d.borderColor, isBar = d.type === 'bar';
      const swatch = isBar ? '<span class="leg-bar" style="background:' + d.backgroundColor + '"></span>' : '<span class="leg-line" style="' + (d.borderDash ? 'background:repeating-linear-gradient(90deg,' + bc + ' 0 4px,transparent 4px 7px)' : 'background:' + bc) + '"></span>';
      return '<button class="leg-item leg-btn">' + swatch + d.label + '</button>';
    }).join('');
    _bindLegendToggle('weekly-leg', weeklyChart);
  }

  // Time chart (only if canvas exists — hidden when <3 time entries)
  if (vis.time && document.getElementById('time-canvas')) {
    const pts = data.map((d, i) => d.t != null ? { x: i, y: d.t, lbl: d.lbl, ts: d.ts, notes: d.notes, date: d.date } : null).filter(Boolean);
    function seasonalLight(month) {
      const table = [
        { rise: 8.1, set: 16.0 }, { rise: 7.3, set: 17.0 }, { rise: 6.3, set: 18.2 }, { rise: 5.8, set: 19.5 },
        { rise: 5.1, set: 20.6 }, { rise: 4.7, set: 21.4 }, { rise: 5.0, set: 21.3 }, { rise: 5.6, set: 20.4 },
        { rise: 6.5, set: 19.1 }, { rise: 7.3, set: 17.7 }, { rise: 7.4, set: 16.1 }, { rise: 8.1, set: 15.6 },
      ];
      return table[month];
    }
    const sunPlugin = {
      id: 'sunBands',
      beforeDatasetsDraw(chart) {
        const { ctx, chartArea: { top, bottom, left, right }, scales: { x, y } } = chart;
        const dark2 = isDark();
        const dayA = dark2 ? 0.06 : 0.12, duskA = dark2 ? 0.09 : 0.14, nightA = dark2 ? 0.16 : 0.10;
        const nPts = data.length;
        const colW = (right - left) / Math.max(nPts - 1, 1);
        for (let i = 0; i < nPts; i++) {
          const d = data[i]; if (!d.date) continue;
          const month = new Date(d.date + 'T12:00:00').getMonth();
          const sl = seasonalLight(month);
          const cx = left + i * colW;
          const w = Math.max(colW + 1, 2);
          function band(yMin, yMax, color) {
            const clampMin = Math.max(yMin, 6), clampMax = Math.min(yMax, 24);
            if (clampMin >= clampMax) return;
            const py1 = y.getPixelForValue(clampMax), py2 = y.getPixelForValue(clampMin);
            ctx.save(); ctx.fillStyle = color;
            ctx.fillRect(cx - w / 2, Math.min(py1, py2), w, Math.abs(py2 - py1));
            ctx.restore();
          }
          band(sl.rise, sl.set, `rgba(255,210,60,${dayA})`);
          band(sl.set, sl.set + 1.5, `rgba(240,130,50,${duskA})`);
          band(sl.set + 1.5, 24, `rgba(60,80,160,${nightA})`);
          band(6, sl.rise, `rgba(60,80,160,${nightA})`);
        }
      }
    };
    const oilPts = data.map((d, i) => d.ot != null ? { x: i, y: d.ot, lbl: d.lbl, ts: d.ots, notes: 'Oil dose' } : null).filter(Boolean);
    const avg7time = data.map((_, i) => {
      const win = data.slice(Math.max(0, i - 6), i + 1);
      const valid = win.filter(d => d.t != null);
      if (!valid.length) return null;
      return { x: i, y: +(valid.reduce((s, d) => s + d.t, 0) / valid.length).toFixed(3) };
    }).filter(Boolean);
    const tickCol = dark ? 'rgba(235,235,245,.35)' : '#aaa';
    const tcEl = document.getElementById('time-canvas');
    sizeCanvas(tcEl);
    timeChart = new Chart(tcEl, {
      type: 'scatter',
      data: { datasets: [
        { data: pts, backgroundColor: dark ? 'rgba(143,136,232,.85)' : 'rgba(108,101,204,.85)', pointRadius: dense ? 3 : 5, pointHoverRadius: 8, label: 'First smoke' },
        { data: oilPts, backgroundColor: dark ? 'rgba(129,140,248,.8)' : 'rgba(99,102,241,.8)', pointRadius: dense ? 2.5 : 4, pointHoverRadius: 8, pointStyle: 'triangle', label: 'Oil dose' },
        { type: 'line', data: avg7time, borderColor: dark ? 'rgba(143,136,232,.6)' : 'rgba(108,101,204,.6)', backgroundColor: 'transparent', pointRadius: 0, tension: 0.4, borderWidth: 2, borderDash: [6,3], label: '7-day avg' },
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: _chartTooltipOpts(true, function(pt, ds) {
          if (!pt || !pt.raw) return '';
          var d = pt.raw;
          return d.notes === 'Oil dose' ? 'Oil dose: ' + d.ts : 'First smoke: ' + d.ts;
        }, function(items) { return items && items[0] != null ? [items[0].raw.lbl] : []; })},
        scales: {
          x: { type: 'linear', min: -0.5, max: n - 0.5, ticks: { callback: (_, i, tk) => { const idx = Math.round(tk[i].value); return labels[idx] || ''; }, autoSkip: true, maxRotation: 40, font: { size: 10 }, color: tickCol }, grid: { display: false } },
          y: { min: 6, max: 24, ticks: { stepSize: 2, font: { size: 10 }, color: tickCol, callback: v => v >= 6 && v <= 23 ? v + ':00' : v === 24 ? '0:00' : '' }, grid: { color: dark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.05)' } }
        }
      },
      plugins: [sunPlugin, tooltipPinPlugin],
    });
  }

  // v5.2: Sober Window chart — daily first/last session band + bedtime
  {
    const swEl = document.getElementById('sober-canvas');
    if (swEl) {
      const swd = soberWindowData();
      const swLabels = swd.map(d => d.lbl);
      const nSw = swLabels.length;
      const denseSw = nSw > 21;
      const firstArr = swd.map(d => d.first);
      const lastArr = swd.map(d => d.last);
      const firstAvg = rollingAvg7(firstArr);
      const lastAvg = rollingAvg7(lastArr);
      const lastCol = dark ? '#e0a030' : '#b8700f';
      const firstCol = dark ? '#4d9de0' : '#3478c8';
      const bandFill = hexA(dark ? '#8f88e8' : '#6c65cc', 0.18);
      const bedtimeCol = dark ? 'rgba(143,136,232,.85)' : 'rgba(108,101,204,.85)';
      // Compute y-max dynamically to accommodate midnight-wrap values, capped at 30 (6am next day)
      const allY = [...firstArr, ...lastArr, ...swd.map(d => d.bedtime)].filter(v => v != null);
      const yMax = allY.length ? Math.min(30, Math.max(24, Math.ceil(Math.max(...allY) + 1))) : 24;
      const yMin = 6;
      const swDatasets = [
        { _key: 'last', label: 'Last session', data: lastArr, borderColor: lastCol, backgroundColor: bandFill,
          fill: '+1', pointRadius: denseSw ? 2 : 4, pointHoverRadius: 8, tension: 0.25, spanGaps: false, borderWidth: 2 },
        { _key: 'first', label: 'First session', data: firstArr, borderColor: firstCol, backgroundColor: 'transparent',
          pointRadius: denseSw ? 2 : 4, pointHoverRadius: 8, tension: 0.25, spanGaps: false, borderWidth: 2 },
        { _key: 'lastAvg', label: 'Last · 7d avg', data: lastAvg, borderColor: hexA(lastCol, 0.55), backgroundColor: 'transparent',
          pointRadius: 0, tension: 0.4, borderWidth: 1.5, borderDash: [5, 3], spanGaps: true },
        { _key: 'firstAvg', label: 'First · 7d avg', data: firstAvg, borderColor: hexA(firstCol, 0.55), backgroundColor: 'transparent',
          pointRadius: 0, tension: 0.4, borderWidth: 1.5, borderDash: [5, 3], spanGaps: true },
      ];
      // Only add bedtime scatter if some day has it set
      if (swd.some(d => d.bedtime != null)) {
        const bedPts = swd.map((d, i) => d.bedtime != null ? { x: i, y: d.bedtime } : null).filter(Boolean);
        swDatasets.push({
          _key: 'bedtime', type: 'scatter', label: 'Bedtime', data: bedPts,
          backgroundColor: bedtimeCol, pointStyle: 'crossRot',
          pointRadius: denseSw ? 4 : 6, pointHoverRadius: 9, showLine: false,
        });
      }
      const tickColSw = dark ? 'rgba(235,235,245,.35)' : '#aaa';
      sizeCanvas(swEl);
      soberWindowChart = new Chart(swEl, {
        type: 'line',
        data: { labels: swLabels, datasets: swDatasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: _chartTooltipOpts(false, function(pt, ds) {
              if (pt && pt.raw && typeof pt.raw === 'object' && ds && ds.label === 'Bedtime') {
                const y = pt.raw.y;
                const hh = Math.floor(y % 24), mm = Math.round((y % 1) * 60);
                const suffix = y >= 24 ? ' (+1)' : '';
                return 'Bedtime: ' + String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0') + suffix;
              }
              const v = pt && pt.parsed ? pt.parsed.y : null;
              if (v == null) return '';
              const hh = Math.floor(v % 24), mm = Math.round((v % 1) * 60);
              const suffix = v >= 24 ? ' (+1)' : '';
              const timeStr = String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0') + suffix;
              if (ds._key === 'last') return 'Last: ' + timeStr;
              if (ds._key === 'first') return 'First: ' + timeStr;
              if (ds._key === 'lastAvg') return 'Last 7d avg: ' + timeStr;
              if (ds._key === 'firstAvg') return 'First 7d avg: ' + timeStr;
              return timeStr;
            }, function(items) { return items && items[0] != null ? [swLabels[items[0].dataIndex] || ''] : []; }),
          },
          scales: {
            x: { type: 'category', ticks: { autoSkip: true, maxRotation: 40, font: { size: 10 }, color: tickColSw }, grid: { display: false } },
            y: {
              min: yMin, max: yMax,
              ticks: {
                stepSize: 2, font: { size: 10 }, color: tickColSw,
                callback: v => {
                  if (v < 0) return '';
                  const h = Math.floor(v % 24);
                  return v >= 24
                    ? String(h).padStart(2, '0') + ':00 (+1)'
                    : String(h).padStart(2, '0') + ':00';
                }
              },
              grid: { color: dark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.05)' }
            }
          }
        },
        plugins: [tooltipPinPlugin],
      });
    }
  }

  // Spending chart (budget users or anyone with pricePerGram set)
  {
    const scEl = document.getElementById('spending-canvas');
    if (scEl) {
      const ppg = state.settings.pricePerGram;
      const cur = state.settings.currency || '\u00a3';
      // Aggregate entries by week — if week has any purchases, sum purchases; else grams×ppg
      const weeks = {};
      state.entries.forEach(e => {
        const d = new Date(e.date + 'T12:00:00');
        const day = d.getDay() || 7;
        const mon = new Date(d); mon.setDate(d.getDate() - (day - 1));
        const key = localDateStr(mon);
        if (!weeks[key]) weeks[key] = { lbl: fmtDate(key), purchaseSum: 0, gramsSum: 0, hasPurchase: false };
        if (e.purchase > 0) { weeks[key].hasPurchase = true; weeks[key].purchaseSum += e.purchase; }
        else weeks[key].gramsSum += (e.grams || 0) + (e.grams2 || 0);
      });
      const sd = Object.entries(weeks).sort(([a], [b]) => a.localeCompare(b)).map(([, v]) => ({
        lbl: v.lbl,
        spend: Math.round(v.hasPurchase ? v.purchaseSum : (ppg > 0 ? v.gramsSum * ppg : 0)),
      }));
      const sLabels = sd.map(d => d.lbl);
      const tickCol = dark ? 'rgba(235,235,245,.35)' : '#aaa';
      const goal = state.settings.goal;
      const budget = goal && goal.type === 'budget' && goal.weeklyBudget > 0 ? goal.weeklyBudget : null;
      const sMax = Math.max(budget || 0, ...sd.map(d => d.spend), 1) * 1.2;
      const datasets = [
        {
          type: 'bar',
          label: 'Weekly spend',
          data: sd.map(d => d.spend),
          backgroundColor: dark ? 'rgba(224,160,48,.55)' : 'rgba(184,112,15,.5)',
          borderRadius: 3,
          maxBarThickness: 28,
        },
      ];
      if (budget) {
        datasets.push({
          type: 'line',
          label: `Budget (${cur}${budget}/wk)`,
          data: sd.map(() => budget),
          borderColor: dark ? '#30b07a' : '#1a9068',
          backgroundColor: 'transparent',
          pointRadius: 0,
          borderWidth: 2,
          borderDash: [6, 3],
        });
      }
      sizeCanvas(scEl);
      spendingChart = new Chart(scEl, {
        data: { labels: sLabels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: _chartTooltipOpts(true, function(pt, ds) {
              return ds.label === 'Weekly spend' ? 'Spent: ' + cur + pt.raw : 'Budget: ' + cur + pt.raw;
            }, function(items) { return items && items[0] != null ? [sLabels[items[0].dataIndex] + ' week'] : []; }),
          },
          layout: { padding: { top: 14 } },
          scales: {
            x: { ticks: { font: { size: 10 }, color: tickCol, maxRotation: 40 }, grid: { display: false } },
            y: { min: 0, max: Math.ceil(sMax / 5) * 5 || 50, ticks: { font: { size: 9 }, color: tickCol }, grid: { color: dark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.05)' } },
          },
        },
        plugins: [tooltipPinPlugin, axisUnitPlugin],
      });
      if (spendingChart.scales.y) spendingChart.scales.y._leefUnit = cur;
      spendingChart.update();
      document.getElementById('spending-leg').innerHTML = datasets.map(d => {
        const isBar = d.type === 'bar';
        const bc = d.borderColor || d.backgroundColor;
        const swatch = isBar
          ? '<span class="leg-bar" style="background:' + d.backgroundColor + '"></span>'
          : '<span class="leg-line" style="background:repeating-linear-gradient(90deg,' + bc + ' 0 4px,transparent 4px 7px)"></span>';
        return '<button class="leg-item leg-btn">' + swatch + d.label + '</button>';
      }).join('');
      _bindLegendToggle('spending-leg', spendingChart);
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   BACKUP / EXPORT / IMPORT
   ═══════════════════════════════════════════════════════════ */
function exportPayload() {
  return { v: VERSION, entries: state.entries, settings: state.settings, milestones: state.milestones };
}
function exportData() {
  if (!state.entries.length) { toast('No entries to export', null, 'warning'); return; }
  const b = new Blob([JSON.stringify(exportPayload(), null, 2)], { type: 'application/json' });
  const u = URL.createObjectURL(b);
  const a = document.createElement('a'); a.href = u; a.download = `leef-backup-${todayStr()}.json`; a.click();
  URL.revokeObjectURL(u);

  // Update backup status text immediately without full re-render

  }

}

function shareData() {
  const json = JSON.stringify(exportPayload(), null, 2);
  const file = new File([json], `leef-backup-${todayStr()}.json`, { type: 'application/json' });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: 'Leef backup', text: `Leef backup ${todayStr()}` })
      .then(() => { state.lastBackup = todayStr(); saveData(); toast('Shared'); render(); })
      .catch(e => { if (e.name !== 'AbortError') toast('Share failed'); });
  } else { exportData(); }
}

function generateProgressSummary() {
  const e = state.entries;
  if (!e.length) return null;
  const s = getStats();
  const days = s.days;
  const lines = [];
  lines.push(`I've been tracking with Leef for ${days} day${days === 1 ? '' : 's'}.`);
  // Reduction line — prefer mg-based if available, else grams
  if (s.reductionMg != null && s.reductionMg > 0) {
    lines.push(`Down ${s.reductionMg}% from when I started.`);
  } else if (s.reductionG != null && s.reductionG > 0) {
    lines.push(`Down ${s.reductionG}% from when I started.`);
  } else if (s.reductionG != null && s.reductionG < 0) {
    lines.push(`Up ${Math.abs(s.reductionG)}% from when I started.`);
  }
  // Best week
  if (s.bestWeek != null) {
    lines.push(`Best week: ${s.bestWeek}g average.`);
  } else if (s.bestWeekMg != null) {
    lines.push(`Best week: ${s.bestWeekMg}mg average.`);
  }
  // Streak
  if (s.streak >= 7) {
    lines.push(`Current streak: ${s.streak} days.`);
  }
  // Zero days (quit/break context)
  if (s.zeroDays > 0 && s.zeroDays >= Math.round(days * 0.1)) {
    lines.push(`${s.zeroDays} zero-use day${s.zeroDays === 1 ? '' : 's'} logged.`);
  }
  return lines.join(' ');
}

function shareProgress() {
  const summary = generateProgressSummary();
  if (!summary) { toast('No entries to share', null, 'warning'); return; }
  if (navigator.share) {
    navigator.share({ text: summary })
      .catch(e => { if (e.name !== 'AbortError') copyToClipboard(summary); });
  } else {
    copyToClipboard(summary);
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); toast('Copied to clipboard'); }
  catch (_) { toast('Could not copy', null, 'error'); }
  document.body.removeChild(ta);
}

function validateEntry(e) {
  if (!e || typeof e.date !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(e.date)) return false;
  if (!e.id) e.id = genId();
  // Coerce numeric fields
  if (e.grams != null) e.grams = parseFloat(e.grams) || 0;
  if (e.strength != null) e.strength = parseFloat(e.strength) || 0;
  if (e.oilMl != null) e.oilMl = parseFloat(e.oilMl) || 0;
  if (e.cartPuffs != null) e.cartPuffs = parseInt(e.cartPuffs, 10) || 0;
  // Preserve triggers and symptoms arrays (migrate string symptoms to object format)
  if (e.symptoms && Array.isArray(e.symptoms) && e.symptoms.length && typeof e.symptoms[0] === 'string') {
    e.symptoms = e.symptoms.map(s => ({ key: s, intensity: 2 }));
  }
  if (e.triggers && !Array.isArray(e.triggers)) e.triggers = undefined;
  // v5.2: sober window fields — soft-validate HH:MM, strip malformed
  const hhmm = /^([01]\d|2[0-3]):[0-5]\d$/;
  if (e.lastSessionTime != null && e.lastSessionTime !== '' && !hhmm.test(e.lastSessionTime)) e.lastSessionTime = null;
  if (e.bedtime != null && e.bedtime !== '' && !hhmm.test(e.bedtime)) e.bedtime = null;
  return true;
}

function importSummary(valid) {
  if (!valid.length) return null;
  var sorted = valid.slice().sort(function(a, b) { return a.date.localeCompare(b.date); });
  var moodCount = sorted.filter(function(e) { return e.mood != null; }).length;
  var triggerCount = sorted.filter(function(e) { return e.triggers && e.triggers.length > 0; }).length;
  var symptomCount = sorted.filter(function(e) { return e.symptoms && e.symptoms.length > 0; }).length;
  var noteCount = sorted.filter(function(e) { return e.notes && e.notes.trim(); }).length;
  var details = [];
  if (moodCount > 0) details.push(moodCount + ' with mood');
  if (triggerCount > 0) details.push(triggerCount + ' with triggers');
  if (symptomCount > 0) details.push(symptomCount + ' with symptoms');
  if (noteCount > 0) details.push(noteCount + ' with notes');
  return { count: sorted.length, dateRange: fmtDate(sorted[0].date) + ' \u2192 ' + fmtDate(sorted[sorted.length - 1].date), details: details };
}

function showImportConfirm(valid, parsed, isLegacy) {
  var info = importSummary(valid);
  if (!info) { toast('No valid entries in file', null, 'warning'); return; }
  var popup = document.getElementById('ms-popup');
  var backdrop = document.getElementById('ms-backdrop');
  var totalRaw = isLegacy ? parsed.length : parsed.entries.length;
  var skippedCount = totalRaw - valid.length;
  popup.innerHTML = '<div style="font-size:32px;margin-bottom:8px">\uD83D\uDCC2</div>'
    + '<div class="ms-title">Restore backup?</div>'
    + '<div class="ms-desc" style="text-align:left;line-height:1.7">'
    + '<div style="font-size:14px;font-weight:700;color:var(--t1);margin-bottom:4px">Found ' + info.count + ' entries</div>'
    + '<div style="font-size:12px;color:var(--t2)">' + info.dateRange + '</div>'
    + (info.details.length ? '<div style="font-size:11px;color:var(--t3);margin-top:4px">' + info.details.join(' \u00B7 ') + '</div>' : '')
    + (skippedCount > 0 ? '<div style="font-size:11px;color:var(--amber);margin-top:4px">' + skippedCount + ' invalid entr' + (skippedCount === 1 ? 'y' : 'ies') + ' will be skipped</div>' : '')
    + '<div style="font-size:11px;color:var(--coral);margin-top:8px;padding-top:6px;border-top:1px solid var(--sep)">This will replace your current ' + state.entries.length + ' entries.</div>'
    + '</div>'
    + '<button class="btn-primary" id="confirm-restore" style="margin:0 0 8px">Restore ' + info.count + ' entries</button>'
    + '<button class="btn-outline" id="cancel-restore" style="margin:0">Cancel</button>';
  popup.classList.remove('hidden');
  backdrop.classList.remove('hidden');
  backdrop.classList.add('show');
  window._pendingRestore = { valid: valid, parsed: parsed, isLegacy: isLegacy };
}

function commitRestore() {
  var pending = window._pendingRestore;
  if (!pending) return;
  pending.valid.sort(function(a, b) { return a.date.localeCompare(b.date); });
  state.entries = pending.valid;
  if (!pending.isLegacy && pending.parsed.settings && typeof pending.parsed.settings === 'object') {
    state.settings = { ...defaultSettings(), ...pending.parsed.settings };
  }
  if (!pending.isLegacy && Array.isArray(pending.parsed.milestones)) {
    state.milestones = pending.parsed.milestones;
  }
  _cachedAvg7mg = null; _statsCache = null;
  saveData(); render();
  toast('Restored ' + pending.valid.length + ' entries', null, 'success');
  window._pendingRestore = null;
}

function importData(file) {
  const r = new FileReader();
  r.onerror = () => toast('Could not read file', null, 'error');
  r.onload = ev => {
    try {
      let p;
      try {
        p = JSON.parse(ev.target.result);
      } catch (parseErr) {
        toast('File is not valid JSON', null, 'error');
        return;
      }
      // Handle full export (object with entries, settings, milestones)
      if (p && p.entries && Array.isArray(p.entries)) {
        const valid = p.entries.filter(validateEntry);
        if (!valid.length) { toast('No valid entries found in ' + p.entries.length + ' records', null, 'warning'); return; }
        showImportConfirm(valid, p, false);
      // Handle legacy export (plain array)
      } else if (Array.isArray(p) && p.length) {
        const valid = p.filter(validateEntry);
        if (!valid.length) { toast('No valid entries found in ' + p.length + ' records', null, 'warning'); return; }
        showImportConfirm(valid, p, true);
      } else { toast('No entries found in file', null, 'warning'); }
    } catch (e) {
      console.error('Import failed:', e);
      toast('Import failed \u2014 file may be corrupt', null, 'error');
    }
  };
  try { r.readAsText(file); }
  catch (e) { toast('Could not open file', null, 'error'); }
}

function csvEscape(val) {
  const s = String(val == null ? '' : val);
  // Wrap in quotes if value contains comma, quote, or newline
  if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0 || s.indexOf('\n') >= 0) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}
function exportCsv() {
  if (!state.entries.length) { toast('No entries to export', null, 'warning'); return; }
  const commentLine = '# Leef v' + VERSION + ' export \u2014 ' + new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) + ' \u2014 ' + state.entries.length + ' entries';
  const headers = ['date','grams','strength','cbd','grams2','strength2','time','oilMl','oilStrength','oilTime','cartPuffs','estMg','purchase','mood','sleep','symptoms','triggers','notes','lastSessionTime','bedtime'];
  const rows = state.entries.map(e => {
    const symStr = (e.symptoms || []).map(s => typeof s === 'object' ? (s.key + ':' + (s.intensity || 1)) : s).join('; ');
    const trigStr = (e.triggers || []).join('; ');
    return [
      e.date, e.grams ?? '', e.strength ?? '', e.cbd ?? '', e.grams2 ?? '', e.strength2 ?? '',
      e.time ?? '', e.oilMl || 0, e.oilStrength ?? state.settings.oilDefaultStrength, e.oilTime ?? '',
      e.cartPuffs || 0, calcMg(e), e.purchase ?? '',
      e.mood ?? '', e.sleep ?? '', csvEscape(symStr), csvEscape(trigStr),
      csvEscape(e.notes || ''),
      e.lastSessionTime ?? '', e.bedtime ?? ''
    ].join(',');
  });
  const csv = [commentLine, headers.join(','), ...rows].join('\n');
  const b = new Blob([csv], { type: 'text/csv' });
  const u = URL.createObjectURL(b);
  const a = document.createElement('a'); a.href = u; a.download = 'leef-' + todayStr() + '.csv'; a.click();
  URL.revokeObjectURL(u);
  toast('CSV exported \u2014 ' + state.entries.length + ' entries');
}

/* ═══════════════════════════════════════════════════════════
   SAVE ENTRY
   ═══════════════════════════════════════════════════════════ */
function saveEntry() {
  const f = state.form;
  if (!f.date) { toast('Please set a date', null, 'warning'); return; }
  // Validate date format and reject future dates
  if (!/^\d{4}-\d{2}-\d{2}$/.test(f.date) || isNaN(new Date(f.date + 'T12:00:00').getTime())) {
    toast('Invalid date', null, 'warning'); return;
  }
  if (f.date > todayStr()) { toast('Future dates not allowed', null, 'warning'); return; }
  // Guard against negative values
  if (f.grams !== '' && parseFloat(f.grams) < 0) { toast('Grams can\u2019t be negative', null, 'warning'); return; }
  if (f.oilMl !== '' && parseFloat(f.oilMl) < 0) { toast('Oil amount can\u2019t be negative', null, 'warning'); return; }
  if (f.cartPuffs !== '' && parseInt(f.cartPuffs, 10) < 0) { toast('Puffs can\u2019t be negative', null, 'warning'); return; }
  // Warn on implausibly high strength
  if (f.strength !== '' && parseFloat(f.strength) > 100) {
    if (!confirm('Strength ' + f.strength + '% exceeds 100%. This is unusual. Continue?')) return;
  }
  // v3.3.1: Duplicate detection — handle existing entry for same date
  const dupe = state.entries.find(e => e.date === f.date && e.id !== state.editId);
  if (dupe) {
    if (f.isZeroDay) {
      // User wants to log a rest day but already has an entry for this date
      if (!confirm('You already have an entry for ' + fmtDate(f.date) + '. Replace it with a rest day?')) return;
      // Remove the existing entry and continue saving the rest day
      state.entries = state.entries.filter(e => e.id !== dupe.id);
    } else {
      // Jump into edit mode for the existing entry
      toast(fmtDate(f.date) + ' \u2014 switching to edit', null, 'info');
      state.editId = dupe.id;
      state.form = {
        date: dupe.date,
        time: dupe.time || '',
        grams: dupe.grams != null ? String(dupe.grams) : '',
        strength: dupe.strength != null ? String(dupe.strength) : '',
        grams2: dupe.grams2 != null ? String(dupe.grams2) : '',
        strength2: dupe.strength2 != null ? String(dupe.strength2) : '',
        oilMl: dupe.oilMl != null ? String(dupe.oilMl) : '',
        oilStrength: dupe.oilStrength != null ? String(dupe.oilStrength) : '',
        oilTime: dupe.oilTime || '',
        cartPuffs: dupe.cartPuffs != null ? String(dupe.cartPuffs) : '',
        notes: dupe.notes || '',
        mood: dupe.mood || null,
        sleep: dupe.sleep || null,
        symptoms: dupe.symptoms || [],
        triggers: dupe.triggers ? dupe.triggers.slice() : [],
        showSecond: !!(dupe.grams2 || dupe.strength2),
        purchase: dupe.purchase != null ? String(dupe.purchase) : '',
        cbd: dupe.cbd != null ? String(dupe.cbd) : '',
        lastSessionTime: dupe.lastSessionTime || '',
        bedtime: dupe.bedtime || '',
        isZeroDay: isZeroDay(dupe)
      };
      render();
      return;
    }
  }
  const g = parseFloat(f.grams) || 0, oil = parseFloat(f.oilMl) || 0, puffs = parseInt(f.cartPuffs, 10) || 0;
  const allBlank = f.grams === '' && f.oilMl === '' && f.cartPuffs === '';
  const allZero = !g && !oil && !puffs;
  if (allBlank && !f.isZeroDay) { toast("Enter something, or tap Rest day"); return; }
  // Allow explicit zero-day entries (isZeroDay flag or all fields explicitly at 0)
  const str = parseFloat(f.strength) || 0;
  if (g > 5) { if (!confirm('You entered ' + g + 'g — that\u2019s quite high. Continue?')) return; }
  if (str > 40) { if (!confirm('Strength ' + str + '% is unusually high. Continue?')) return; }

  const isZero = f.isZeroDay || (allZero && !allBlank);
  const entry = {
    id: state.editId || genId(),
    date: f.date,
    grams: isZero ? 0 : (f.grams !== '' ? parseFloat(f.grams) : null),
    strength: f.strength !== '' ? parseFloat(f.strength) : null,
    grams2: f.grams2 !== '' && f.grams2 != null ? parseFloat(f.grams2) : null,
    strength2: f.strength2 !== '' && f.strength2 != null ? parseFloat(f.strength2) : null,
    time: f.time || null,
    oilMl: isZero ? 0 : (f.oilMl !== '' ? parseFloat(f.oilMl) : 0),
    oilStrength: f.oilStrength !== '' && f.oilStrength != null ? parseFloat(f.oilStrength) : state.settings.oilDefaultStrength,
    oilTime: f.oilTime || null,
    cartPuffs: isZero ? 0 : (f.cartPuffs !== '' ? parseInt(f.cartPuffs, 10) : 0),
    notes: f.notes || (isZero ? 'Zero day' : ''), mood: f.mood, sleep: f.sleep,
    symptoms: f.symptoms && f.symptoms.length ? f.symptoms : undefined,
    triggers: f.triggers && f.triggers.length ? f.triggers.slice() : undefined,
    purchase: f.purchase !== '' && f.purchase != null ? parseFloat(f.purchase) : null,
    cbd: f.cbd !== '' && f.cbd != null ? parseFloat(f.cbd) : null,
    // v5.2: sober window tracking (null if not provided)
    lastSessionTime: f.lastSessionTime || null,
    bedtime: f.bedtime || null,
  };

  const isFirstLog = !state.editId && state.entries.length === 0;
  state.entries = state.editId
    ? state.entries.map(e => e.id === state.editId ? entry : e)
    : [...state.entries, entry];
  state.entries.sort((a, b) => a.date.localeCompare(b.date));
  saveData();

  const wasEdit = !!state.editId;
  _cachedAvg7mg = null; _statsCache = null;

  // v3.3.1: Show enhanced success feedback before switching — pulse + scale
  const saveBtn = document.getElementById('save-btn');
  if (saveBtn) {
    saveBtn.textContent = '\u2713 ' + (wasEdit ? 'Updated' : 'Saved');
    saveBtn.style.background = 'linear-gradient(135deg, #1eb07a, #4a9e72)';
    saveBtn.style.pointerEvents = 'none';
    saveBtn.style.transform = 'scale(1.02)';
    saveBtn.style.boxShadow = '0 6px 20px rgba(48,176,122,.35), 0 2px 8px rgba(48,176,122,.25)';
    saveBtn.style.transition = 'all .35s cubic-bezier(.34,1.56,.64,1)';
    haptic(15);
  }
  setTimeout(() => {
    // Build contextual toast message
    let toastMsg = wasEdit ? 'Entry updated' : 'Day logged ✓';
    if (!wasEdit && isZero) toastMsg = 'Rest day logged ✓';
    else if (!wasEdit && !isZero) {
      // Check if reduced from yesterday
      const sorted = [...state.entries].sort((a,b) => a.date.localeCompare(b.date));
      const idx = sorted.findIndex(e => e.id === entry.id);
      if (idx > 0) {
        const prev = sorted[idx - 1];
        const todayMg = calcMg(entry), prevMg = calcMg(prev);
        if (todayMg < prevMg * 0.9) toastMsg = 'Less than yesterday — nice';
      }
    }

    // Check if streak extended
    if (!wasEdit) {
      const sorted = [...state.entries].sort((a,b) => a.date.localeCompare(b.date));
      const td = new Date(todayStr());
      let newStreak = 0;
      for (let i = sorted.length - 1; i >= 0; i--) {
        if (Math.round((td - new Date(sorted[i].date + 'T12:00:00')) / MS_PER_DAY) === newStreak) newStreak++; else break;
      }
      if (newStreak >= 2) toastMsg += ' \ud83d\udd25 ' + newStreak + ' day streak!';
    }

    state.editId = null; state.form = blankForm(false); state.formMore = false; state.tab = 'dashboard';
    render();
    if (isFirstLog) {
      // v3.3.1: First log celebration — full-screen welcome moment
      showFirstLogCelebration();
    } else {
      toast(toastMsg, null, 'success');
    }
    haptic(10);
    // Check milestones after render
    setTimeout(() => checkMilestones(), 300);
  }, 400);
}

/* ═══════════════════════════════════════════════════════════
   EVENT HANDLERS
   ═══════════════════════════════════════════════════════════ */
// v6: Global Escape key closes any open popup/modal (a11y)
// v6.0.6: extended to info-modal-overlay (grace day, streak freeze) and
// detail-modal-overlay (entry detail) so every modal responds to Escape.
document.addEventListener('keydown', ev => {
  if (ev.key !== 'Escape') return;
  // Top-most info modal (grace day, streak explainer, etc.)
  const infoOverlay = document.querySelector('.info-modal-overlay');
  if (infoOverlay) {
    infoOverlay.remove();
    ev.preventDefault();
    return;
  }
  // Top-most detail modal (entry edit view)
  const detailOverlay = document.querySelector('.detail-modal-overlay');
  if (detailOverlay) {
    detailOverlay.remove();
    ev.preventDefault();
    return;
  }
  // Milestone / plan popup
  const popup = document.getElementById('ms-popup');
  const backdrop = document.getElementById('ms-backdrop');
  if (popup && !popup.classList.contains('hidden')) {
    window._pm = null;
    popup.classList.add('hidden');
    if (backdrop) { backdrop.classList.add('hidden'); backdrop.classList.remove('show'); }
    ev.preventDefault();
  }
});

document.addEventListener('click', ev => {
  const t = ev.target;
  const cl = s => t.closest(s);

  // Milestone dismiss
  if (t.id === 'ms-dismiss') {
    document.getElementById('ms-popup').classList.add('hidden');
    document.getElementById('ms-backdrop').classList.add('hidden');
    document.getElementById('ms-backdrop').classList.remove('show');
    return;
  }
  // Backdrop tap dismisses any popup
  if (t.id === 'ms-backdrop') {
    window._pm = null;
    document.getElementById('ms-popup').classList.add('hidden');
    document.getElementById('ms-backdrop').classList.add('hidden');
    document.getElementById('ms-backdrop').classList.remove('show');
    return;
  }

  // v3.4: Unified plan modal — intent pill selection
  const pmIntent = cl('[data-pm-intent]');
  if (pmIntent && window._pm) {
    _pmCacheInputs();
    window._pm.intent = pmIntent.dataset.pmIntent;
    haptic(8);
    showPlanModal(!!state.settings.goal);
    return;
  }
  // v5.0.1: Plan modal — reduce mode sub-choice
  const pmReduceMode = cl('[data-pm-reduce-mode]');
  if (pmReduceMode && window._pm) {
    _pmCacheInputs();
    window._pm.cache.reduce.reduceMode = pmReduceMode.dataset.pmReduceMode;
    haptic(8);
    showPlanModal(!!state.settings.goal);
    return;
  }
  // v3.4: Plan modal — unit toggle (reduce)
  const pmUnit = cl('[data-pm-unit]');
  if (pmUnit && window._pm) {
    _pmCacheInputs();
    window._pm.cache.reduce.unit = pmUnit.dataset.pmUnit;
    showPlanModal(!!state.settings.goal);
    return;
  }
  // v3.4: Plan modal — preset chip
  const pmPreset = cl('[data-pm-preset]');
  if (pmPreset && window._pm) {
    const val = parseFloat(pmPreset.dataset.pmPresetValue);
    const gramsRow = document.getElementById('pm-grams-row');
    const useMg = gramsRow && gramsRow.style.display === 'none';
    if (useMg) { const el = document.getElementById('pm-mg'); if (el) el.value = val; }
    else { const el = document.getElementById('pm-grams'); if (el) el.value = val; }
    document.querySelectorAll('[data-pm-preset]').forEach(btn => {
      const isSel = btn === pmPreset;
      btn.style.background = isSel ? 'var(--accent)' : 'var(--glass2)';
      btn.style.color = isSel ? '#fff' : 'var(--t2)';
      btn.style.borderColor = isSel ? 'var(--accent)' : 'var(--glass-border)';
    });
    return;

      state.settings.onboardingDone = true; state.obStep = 0;
      delete state._obKnowsStrength; delete state._obGoalUnit; delete state._obCurrentGrams; delete state._obStrengthPct;
      delete state._obSelectedPreset; delete state._obAutoTarget; delete state._obGoalType; delete state._obBudget; delete state._obReduceMode;
      delete state._obBreakEnd; delete state._obBreakOpen; delete state._obMethods; delete state._obCartPuffs;
      delete state._obOilMl; delete state._obOilStrength; delete state._obPrice; delete state._obIntent;
      delete state._obWhyNote; delete state._obWeeklyPct; delete state._obMotivations; delete state._obShowNotSure; delete state._obPrevStep; delete state._obPrevStep;
      document.getElementById('onboarding').classList.add('hidden');
      document.getElementById('app').style.display = '';
      // v3.3.2: intent-specific chart toggle defaults
      const pm = state.settings.primaryMethods || ['flower'];
      const ks = state.settings.knowsStrength;
      const gt = state.settings.goal?.type;
      if (gt === 'break') {
        state.vis = { grams: true, oil: false, mg: false, mgTrend: false };
      } else if (gt === 'budget') {
        state.vis = { grams: true, oil: false, mg: false, mgTrend: false };
      } else if (gt === 'reduce') {
        state.vis = { grams: true, oil: false, mg: ks, mgTrend: ks };
      } else {
        state.vis = { grams: true, oil: false, mg: ks, mgTrend: ks };
      }
      saveData(); render(); return;
    }
  }
  if (t.id === 'ob-skip') {
    // Step 1: skip motivation tags → go to usage (NEW in v3.3)
    if (state.obStep === 1) {
      state.settings.motivations = state._obMotivations ? [...state._obMotivations] : [];
      state.obStep = 2; renderOnboarding(); return;
    }
    // Step 2: skip usage → go to plan
    if (state.obStep === 2) {
      state.settings.primaryMethods = (state._obMethods && state._obMethods.length) ? [...state._obMethods] : ['flower'];
      const pm = state.settings.primaryMethods;
      state.settings.knowsStrength = pm.includes('flower') ? (state._obKnowsStrength === true) : (pm.includes('cart') || pm.includes('oil'));
      state.obStep = 3; renderOnboarding(); return;
    }
    // Step 3: skip goal → go to ready
    if (state.obStep === 3) {
      const whyEl = document.getElementById('ob-why-note');

  // History sub-view in Settings

  const colBtn = cl('[data-collapse]');

    const existing = state.form.symptoms.find(s => typeof s === 'object' ? s.key === key : s === key);

    } else if (existing.intensity < 3) {

  const eb = cl('[data-edit]');

    state.editId = entry.id;
    state.form = {

      grams2: entry.grams2 != null ? String(entry.grams2) : '', strength2: entry.strength2 != null ? String(entry.strength2) : '',
      showSecond: !!(entry.grams2 || entry.strength2),

      notes: entry.notes || '', mood: entry.mood, sleep: entry.sleep,

      lastSessionTime: entry.lastSessionTime || '',
      bedtime: entry.bedtime || '',

    };
    // Only expand "other methods" if the entry actually uses them

  }

  const db = cl('[data-del]');
  if (db) {
    const id = db.dataset.del;
    const deleted = state.entries.find(e => e.id === id);
    if (!deleted) return;
    state.entries = state.entries.filter(e => e.id !== id);
    _cachedAvg7mg = null; _statsCache = null;
    saveData(); render();
    toast('Entry deleted', () => {
      state.entries.push(deleted);
      state.entries.sort((a, b) => a.date.localeCompare(b.date));
      _cachedAvg7mg = null; _statsCache = null;
      saveData(); render();
    });
    return;
  }

  // v3.3.1: Entry detail modal — tap a row to preview
  const detailRow = cl('[data-detail]');
  if (detailRow) {
    showEntryDetail(detailRow.dataset.detail);
    return;
  }

  // v3.3.1: Locked milestone tooltip — tap a locked row to see requirements
  const lockedMs = cl('[data-locked-id]');
  if (lockedMs) {
    showMilestoneTooltip(lockedMs.dataset.lockedId, getStats());
    return;
  }

  if (t.id === 'export-btn') { exportData(); return; }
  if (t.id === 'share-btn') { shareData(); return; }
  if (t.id === 'share-progress-btn' || (t.closest && t.closest('#share-progress-btn'))) { shareProgress(); return; }
  // Settings — method pill toggle
  const settingsMethod = cl('[data-settings-method]');
  if (settingsMethod) {
    const method = settingsMethod.dataset.settingsMethod;
    if (!state.settings.primaryMethods) state.settings.primaryMethods = ['flower'];
    const idx = state.settings.primaryMethods.indexOf(method);
    if (idx >= 0) {
      if (state.settings.primaryMethods.length > 1) state.settings.primaryMethods.splice(idx, 1);
      else { toast('Keep at least one method selected'); return; }
    } else {
      state.settings.primaryMethods.push(method);
    }
    // Auto-derive knowsStrength when carts/oil are selected
    const pm = state.settings.primaryMethods;
    if (pm.includes('cart') || pm.includes('oil')) state.settings.knowsStrength = true;
    saveData(); renderSettings(getStats()); toast('Saved'); return;
  }
  if (t.id === 'toggle-knows-strength' || t.closest('#toggle-knows-strength')) {
    state.settings.knowsStrength = !state.settings.knowsStrength; saveData();
    renderSettings(getStats()); toast(state.settings.knowsStrength ? 'THC % tracking on' : 'Grams only'); return;
  }
  if (t.id === 'toggle-track-cbd' || t.closest('#toggle-track-cbd')) {
    state.settings.trackCbd = !state.settings.trackCbd; saveData();
    renderSettings(getStats()); toast(state.settings.trackCbd ? 'CBD tracking on' : 'CBD tracking off'); return;
  }
  if (t.id === 'toggle-recovery' || t.closest('#toggle-recovery')) {
    state.settings.hideRecovery = !state.settings.hideRecovery; saveData();
    renderSettings(getStats()); return;
  }
  if (t.id === 'import-btn') { document.getElementById('import-input').click(); return; }
  if (t.id === 'export-csv-btn') { exportCsv(); return; }

  const themeBtn = cl('[data-theme-val]');
  if (themeBtn) {
    const v = themeBtn.dataset.themeVal;
    state.settings.theme = v;
    if (v === 'auto') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', v);
    saveData(); haptic(8); render(); return;

  if (t.id === 'delete-all-btn') {
    const popup = document.getElementById('ms-popup');
    const backdrop = document.getElementById('ms-backdrop');
    popup.innerHTML = `
      <div class="ms-icon" style="font-size:36px">⚠️</div>
      <div class="ms-title">Delete all data?</div>
      <div class="ms-desc">This will permanently delete all ${state.entries.length} entries, milestones, and settings. This cannot be undone.</div>
      <button class="btn-primary" id="confirm-delete-all" style="margin:0 0 8px;background:var(--danger)">Delete Everything</button>
      <button class="btn-outline" id="cancel-delete-all" style="margin:0">Cancel</button>
    `;
    popup.classList.remove('hidden');
    backdrop.classList.remove('hidden');
    backdrop.classList.add('show');
    return;
  }
  if (t.id === 'confirm-delete-all') {
    state.entries = []; state.milestones = []; state.settings.goal = null; _cachedAvg7mg = null; _statsCache = null; saveData();
    document.getElementById('ms-popup').classList.add('hidden');
    document.getElementById('ms-backdrop').classList.add('hidden');
    document.getElementById('ms-backdrop').classList.remove('show');

  if (t.id === 'cancel-delete-all') {
    document.getElementById('ms-popup').classList.add('hidden');
    document.getElementById('ms-backdrop').classList.add('hidden');

  // Dev: tap logo or version 5x to reveal dev panel
  if (t.id === 'hdr-logo' || t.id === 'version-tap') {
    if (!window._devTaps) window._devTaps = { count: 0, last: 0 };
    const now = Date.now();
    window._devTaps.count = (now - window._devTaps.last < 600) ? window._devTaps.count + 1 : 1;
    window._devTaps.last = now;
    if (window._devTaps.count >= 5) {
      // If on dashboard, show dev panel inline
      const p = document.getElementById('dev-panel');
      if (p) { p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
      else {
        // Navigate to settings to show dev panel there
        state.tab = 'settings'; render();
        setTimeout(() => { const dp = document.getElementById('dev-panel'); if (dp) dp.style.display = 'block'; }, 100);

document.addEventListener('change', ev => {
  const t = ev.target;
  const m = { 'f-date': 'date', 'f-time': 'time', 'f-grams': 'grams', 'f-str': 'strength', 'f-grams2': 'grams2', 'f-str2': 'strength2', 'f-oil': 'oilMl', 'f-oilstr': 'oilStrength', 'f-oiltime': 'oilTime', 'f-cart': 'cartPuffs', 'f-purchase': 'purchase', 'f-cbd': 'cbd', 'f-lasttime': 'lastSessionTime', 'f-bedtime': 'bedtime' };
  if (m[t.id]) state.form[m[t.id]] = t.value;
  if (t.id === 'price-per-gram') { state.settings.pricePerGram = parseFloat(t.value) || null; saveData(); }
  if (t.id === 'currency-symbol') { state.settings.currency = t.value.trim() || '£'; saveData(); }
  if (t.id === 'cart-puff-mg') { state.settings.cartPuffMg = parseFloat(t.value) || 3; saveData(); }
  if (t.id === 'cart-puff-secs') { state.settings.cartPuffSeconds = parseFloat(t.value) || 3; saveData(); }
  if (t.id === 'oil-default-str') { state.settings.oilDefaultStrength = parseFloat(t.value) || 25; saveData(); }
  if (t.id === 'import-input' && t.files[0]) { importData(t.files[0]); t.value = ''; }
});

document.addEventListener('input', ev => {
  if (ev.target.id === 'f-notes') state.form.notes = ev.target.value;
  // Live update form values for THC estimate
  const formMap = { 'f-grams': 'grams', 'f-str': 'strength', 'f-grams2': 'grams2', 'f-str2': 'strength2', 'f-oil': 'oilMl', 'f-oilstr': 'oilStrength', 'f-cart': 'cartPuffs' };
  if (formMap[ev.target.id]) { state.form[formMap[ev.target.id]] = ev.target.value; updateLiveEstimate(); }
  // Onboarding current-usage inputs — update state + debounced re-render
  const obInputIds = ['ob-current-grams', 'ob-strength-pct', 'ob-cart-puffs', 'ob-oil-ml', 'ob-oil-strength', 'ob-price'];
  if (obInputIds.includes(ev.target.id)) {
    const v = parseFloat(ev.target.value);
    const valid = v > 0 ? v : null;
    switch (ev.target.id) {
      case 'ob-current-grams': state._obCurrentGrams = valid; break;
      case 'ob-strength-pct': state._obStrengthPct = valid; break;
      case 'ob-cart-puffs': state._obCartPuffs = valid ? Math.round(valid) : null; break;
      case 'ob-oil-ml': state._obOilMl = valid; break;
      case 'ob-oil-strength': state._obOilStrength = valid; break;
      case 'ob-price': state._obPrice = valid; break;
    }
    // Compute current state for targeted patches
    const methods = state._obMethods || [];
    const eMg = ((state._obCartPuffs || 0) * (state.settings.cartPuffMg || 3)) + ((state._obOilMl || 0) * (state._obOilStrength || 25));
    const fMg = (state._obCurrentGrams && state._obStrengthPct) ? state._obCurrentGrams * state._obStrengthPct * 10 : 0;
    const tMg = Math.round(fMg + eMg);
    const hasFlower = methods.includes('flower');
    const hasCartM = methods.includes('cart');
    const hasOilM = methods.includes('oil');
    const effectiveKs = hasFlower ? (state._obKnowsStrength === true) : (hasCartM || hasOilM);
    const hb = (hasFlower && state._obCurrentGrams > 0) || (hasCartM && state._obCartPuffs > 0) || (hasOilM && state._obOilMl > 0);
    const chipsExist = !!document.querySelector('[data-ob-preset]');

    // Recalculate preset target if one is active
    if (state._obSelectedPreset) {
      const sug = calcSuggestions(state._obCurrentGrams, state._obStrengthPct, state._obGoalUnit || 'grams', eMg);
      const m = sug.find(s => s.label.toLowerCase() === state._obSelectedPreset);
      if (m) { state._obAutoTarget = m.targetAfter1w; const ti = document.getElementById('ob-target'); if (ti) ti.value = m.targetAfter1w; }
    }

    // Targeted DOM patches (no full re-render = no flash)
    // 1. Update mg total text
    const mgEl = document.getElementById('ob-total-mg');
    if (mgEl) {
      if (effectiveKs && tMg > 0) {
        mgEl.textContent = "That's ~" + tMg + ' mg THC/day' + (methods.length > 1 ? ' total' : '');
        mgEl.style.display = '';
      } else {
        mgEl.style.display = 'none';
      }
    }
    // 2. Update suggestion chip values
    if (chipsExist && hb) {
      const sug = calcSuggestions(state._obCurrentGrams, state._obStrengthPct, state._obGoalUnit || 'grams', eMg);
      document.querySelectorAll('[data-ob-preset]').forEach(btn => {
        const key = btn.dataset.obPreset;
        const m = sug.find(s => s.label.toLowerCase() === key);
        if (m) {
          // Update the "Wk 1: Xg/day" text in the chip
          const spans = btn.querySelectorAll('span');
          if (spans.length >= 3) spans[2].textContent = 'Wk 1: ' + m.targetAfter1w + m.unit + '/day';
        }
      });
    }
    return;
  }
  // Onboarding — manual target input selects "Custom"
  // Why I started note (live save to temp state)
  if (ev.target.id === 'ob-why-note') { state._obWhyNote = ev.target.value; return; }
  if (ev.target.id === 'ob-target') {
    state._obSelectedPreset = 'custom';
    state._obAutoTarget = null;
    document.querySelectorAll('[data-ob-preset]').forEach(btn => {
      const isCust = btn.dataset.obPreset === 'custom';
      btn.style.background = isCust ? 'var(--accent)' : 'var(--glass)';
      btn.style.color = isCust ? '#fff' : 'var(--t2)';
      btn.style.borderColor = isCust ? 'var(--accent)' : 'var(--glass-border)';
    });
  }
  // v3.4: Date range filter inputs
  if (ev.target.id === 'hist-date-from') {
    state.histDateFrom = ev.target.value; state.histPage = 0;
    clearTimeout(state._histDateTimer);
    state._histDateTimer = setTimeout(() => renderHistory(), 150);
  }
  if (ev.target.id === 'hist-date-to') {
    state.histDateTo = ev.target.value; state.histPage = 0;
    clearTimeout(state._histDateTimer);
    state._histDateTimer = setTimeout(() => renderHistory(), 150);
  }
  if (ev.target.id === 'hist-search') {
    state.histSearch = ev.target.value; state.histPage = 0;
    clearTimeout(state._searchTimer);
    state._searchTimer = setTimeout(() => renderHistory(), 200);
  }
});

/* ═══════════════════════════════════════════════════════════
   INITIALIZATION
   ═══════════════════════════════════════════════════════════ */
// Apply theme before render to avoid flash
(function() {
  // Try new format first
  try {
    const stored = localStorage.getItem(APP_KEY);
    if (stored) {
      const data = JSON.parse(stored);
      const theme = data.settings?.theme;
      if (theme === 'light' || theme === 'dark') document.documentElement.setAttribute('data-theme', theme);
    }
  } catch (e) {}
  // Fallback to legacy
  const t = localStorage.getItem('taper_theme');
  if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
})();

// ═══════════════════════════════════════════════════════════
// DEV PANEL — floating ⚙ DEV button with user-switcher menu
// Visible when:
//   - Running on localhost / 127.0.0.1 / private network IPs (10.x, 172.16-31.x, 192.168.x)
//   - URL has ?dev=1 (sticky — saved to localStorage so it persists across reloads)
//   - Localstorage flag 'leef_dev_mode' is set to 'on' (use ?dev=0 to disable)
// ═══════════════════════════════════════════════════════════
(function() {
  // Sticky dev mode toggle via URL param
  const urlParams = new URLSearchParams(location.search);
  if (urlParams.has('dev')) {
    const v = urlParams.get('dev');
    if (v === '0' || v === 'off' || v === 'false') localStorage.removeItem('leef_dev_mode');
    else localStorage.setItem('leef_dev_mode', 'on');
  }
  const stickyDev = localStorage.getItem('leef_dev_mode') === 'on';
  // Common private network ranges
  const h = location.hostname;
  const isLocalNetwork = h === 'localhost' || h === '127.0.0.1'
    || h.startsWith('192.168.')
    || h.startsWith('10.')
    || /^172\.(1[6-9]|2[0-9]|3[0-1])\./.test(h);
  if (!isLocalNetwork && !stickyDev) return;
  const TEST_USERS = [
    { key: 'jordan', label: 'Jordan (live data)', icon: '\ud83e\uddd1', href: '/latest/v6/leef-v6.0.html' },
    { key: 'fresh', label: 'Fresh / new user', icon: '\u2728', href: '/latest/v6/leef-v6.0-new-user-test.html?user=fresh' },
    { key: 'quit', label: 'Quit', icon: '\ud83d\udeab', href: '/latest/v6/leef-v6.0-new-user-test.html?user=quit' },
    { key: 'reduce', label: 'Reduce', icon: '\ud83d\udcc9', href: '/latest/v6/leef-v6.0-new-user-test.html?user=reduce' },
    { key: 'budget', label: 'Budget', icon: '\ud83d\udcb0', href: '/latest/v6/leef-v6.0-new-user-test.html?user=budget' },
    { key: 'track', label: 'Just tracking', icon: '\ud83d\udcca', href: '/latest/v6/leef-v6.0-new-user-test.html?user=track' }
  ];
  function buildDevPanel() {
    const wrap = document.createElement('div');
    wrap.id = 'dev-floating-wrap';
    wrap.style.cssText = 'position:fixed;top:10px;left:10px;z-index:9999;font-family:inherit;-webkit-tap-highlight-color:transparent';
    const btn = document.createElement('button');
    btn.id = 'dev-reset-btn';
    btn.textContent = '\u2699 DEV';
    btn.style.cssText = 'padding:5px 11px;border-radius:7px;border:1px solid rgba(74,158,114,.4);background:rgba(0,0,0,.55);color:#4a9e72;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);letter-spacing:.5px;opacity:.45;transition:opacity .15s, transform .15s';
    btn.onmouseenter = () => { btn.style.opacity = '1'; btn.style.transform = 'scale(1.05)'; };
    btn.onmouseleave = () => { btn.style.opacity = '.45'; btn.style.transform = 'scale(1)'; };
    const menu = document.createElement('div');
    menu.id = 'dev-menu';
    menu.style.cssText = 'position:absolute;top:32px;left:0;display:none;background:rgba(15,15,20,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px;min-width:180px;box-shadow:0 12px 32px rgba(0,0,0,.5);font-size:12px';
    const header = document.createElement('div');
    header.style.cssText = 'padding:7px 10px 5px;font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.45);text-transform:uppercase';
    header.textContent = 'Switch test user';
    menu.appendChild(header);
    TEST_USERS.forEach(u => {
      const item = document.createElement('a');
      item.href = u.href;
      item.style.cssText = 'display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:#fff;text-decoration:none;cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent';
      item.innerHTML = '<span style="font-size:14px;width:18px;text-align:center">' + u.icon + '</span><span>' + u.label + '</span>';
      item.onmouseenter = () => item.style.background = 'rgba(74,158,114,.18)';
      item.onmouseleave = () => item.style.background = 'transparent';
      menu.appendChild(item);
    });
    const sep = document.createElement('div');
    sep.style.cssText = 'height:1px;background:rgba(255,255,255,.1);margin:5px 8px';
    menu.appendChild(sep);
    const landingItem = document.createElement('a');
    landingItem.href = '/latest/index.html';
    landingItem.style.cssText = 'display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:rgba(255,255,255,.6);text-decoration:none;cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent';
    landingItem.innerHTML = '<span style="font-size:14px;width:18px;text-align:center">\u2190</span><span>Dev landing</span>';
    landingItem.onmouseenter = () => landingItem.style.background = 'rgba(255,255,255,.06)';
    landingItem.onmouseleave = () => landingItem.style.background = 'transparent';
    menu.appendChild(landingItem);
    // v3.3: dev mode indicator + disable
    if (stickyDev) {
      const sep2 = document.createElement('div');
      sep2.style.cssText = 'height:1px;background:rgba(255,255,255,.1);margin:5px 8px';
      menu.appendChild(sep2);
      const indicator = document.createElement('div');
      indicator.style.cssText = 'padding:5px 10px 2px;font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px';
      indicator.textContent = 'Dev mode: sticky';
      menu.appendChild(indicator);
      const offItem = document.createElement('a');
      offItem.style.cssText = 'display:flex;align-items:center;gap:9px;padding:6px 10px 8px;border-radius:8px;color:rgba(255,255,255,.5);text-decoration:none;cursor:pointer;transition:background .12s;font-size:11px;-webkit-tap-highlight-color:transparent';
      offItem.innerHTML = '<span style="font-size:12px;width:18px;text-align:center">\u00d7</span><span>Disable dev mode</span>';
      offItem.onmouseenter = () => offItem.style.background = 'rgba(255,255,255,.06)';
      offItem.onmouseleave = () => offItem.style.background = 'transparent';
      offItem.onclick = (e) => {
        e.preventDefault();
        localStorage.removeItem('leef_dev_mode');
        wrap.remove();
      };
      menu.appendChild(offItem);
    }
    btn.onclick = (e) => {
      e.stopPropagation();
      menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    };
    document.addEventListener('click', (e) => {
      if (!wrap.contains(e.target)) menu.style.display = 'none';
    });
    wrap.appendChild(btn);
    wrap.appendChild(menu);
    return wrap;
  }
  document.addEventListener('DOMContentLoaded', () => document.body.appendChild(buildDevPanel()));
})();

loadData();
// v6.0.2: Augment loaded entries with sober window fields (idempotent)
augmentSoberWindowFields(state.entries);
// v3.3.2: intent-aware vis defaults on load
if (!state.settings.knowsStrength) {
  state.vis = { grams: true, oil: false, mg: false, mgTrend: false };
} else {
  const gt = state.settings.goal?.type;
  const ks = state.settings.knowsStrength;
  if (gt === 'break' || gt === 'budget') {
    state.vis = { grams: true, oil: false, mg: false, mgTrend: false };
  } else {
    state.vis = { grams: true, oil: false, mg: ks, mgTrend: ks };
  }
}
state.form = blankForm(false);
render();

// v3.3.1: Pull-to-refresh on touch devices
(function() {
  let startY = 0, currentY = 0, pulling = false, indicator = null;
  const THRESHOLD = 70;
  function getIndicator() {
    if (!indicator) {
      indicator = document.createElement('div');
      indicator.id = 'ptr-indicator';
      indicator.innerHTML = '<span class="ptr-icon">\u21bb</span> <span class="ptr-text">Pull to refresh</span>';
      document.body.appendChild(indicator);
    }
    return indicator;
  }
  document.addEventListener('touchstart', (e) => {
    if (window.scrollY > 0) return;
    if (state.tab === 'add' || state.tab === 'settings') return;
    startY = e.touches[0].clientY;
    pulling = true;
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (!pulling) return;
    currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    if (diff > 10 && window.scrollY === 0) {
      const ind = getIndicator();
      ind.classList.add('show');
      const t = ind.querySelector('.ptr-text');
      if (diff >= THRESHOLD) {
        t.textContent = 'Release to refresh';
      } else {
        t.textContent = 'Pull to refresh';
      }
    }
  }, { passive: true });
  document.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const diff = currentY - startY;
    if (diff >= THRESHOLD) {
      const ind = getIndicator();
      ind.classList.add('refreshing');
      ind.querySelector('.ptr-text').textContent = 'Refreshing...';
      haptic(15);
      setTimeout(() => {
        loadData();
        render();
        ind.querySelector('.ptr-text').textContent = 'Up to date \u2713';
        ind.classList.remove('refreshing');
        setTimeout(() => ind.classList.remove('show'), 600);
      }, 350);
    } else if (indicator) {
      indicator.classList.remove('show');
    }
    startY = 0; currentY = 0;
  }, { passive: true });
})();
</script>
