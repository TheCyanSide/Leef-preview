<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Leef — password required</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0b0b11;
    --fg: #f5f5f7;
    --t2: rgba(235,235,245,.62);
    --t3: rgba(235,235,245,.42);
    --sep: rgba(255,255,255,.08);
    --accent: #4a9e72;
    --accent-glow: rgba(74,158,114,.18);
    --danger: #e06345;
  }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 20px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(74,158,114,.10) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(77,157,224,.06) 0%, transparent 55%);
    background-attachment: fixed;
  }
  .card {
    width: 100%; max-width: 360px;
    padding: 40px 32px 32px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 18px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    text-align: center;
    box-shadow: 0 12px 48px rgba(0,0,0,.3);
  }
  .leaf {
    width: 64px; height: 64px; margin: 0 auto 20px;
    filter: drop-shadow(0 6px 20px rgba(61,184,122,.3));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  h1 {
    font-size: 26px; font-weight: 800; letter-spacing: -.8px;
    background: linear-gradient(180deg, #ffffff 0%, #c8c8d0 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  .sub {
    font-size: 14px; color: var(--t2); line-height: 1.55;
    margin-bottom: 26px;
  }
  form { display: flex; flex-direction: column; gap: 12px; }
  input[type="password"] {
    padding: 16px 18px;
    font-size: 16px; font-family: inherit;
    background: rgba(255,255,255,.06);
    border: 1.5px solid rgba(255,255,255,.1);
    border-radius: 12px;
    color: var(--fg);
    outline: none;
    transition: border-color .15s, background .15s;
    -webkit-appearance: none;
    text-align: center;
    letter-spacing: .3px;
  }
  input[type="password"]:focus {
    border-color: var(--accent);
    background: rgba(255,255,255,.08);
  }
  input[type="password"].wrong {
    border-color: var(--danger);
    animation: shake .4s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  button {
    padding: 16px;
    font-size: 15px; font-weight: 600; font-family: inherit;
    background: linear-gradient(155deg, var(--accent) 0%, #3db87a 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 16px rgba(74,158,114,.25);
    min-height: 50px;
  }
  button:active { transform: scale(.97); }
  button:disabled {
    opacity: .6; cursor: not-allowed;
    background: rgba(255,255,255,.1);
    box-shadow: none;
  }
  .error {
    margin-top: 10px; font-size: 13px;
    color: var(--danger); min-height: 18px;
    opacity: 0; transition: opacity .2s;
  }
  .error.show { opacity: 1; }
  .note {
    margin-top: 22px; padding-top: 20px;
    border-top: 1px solid var(--sep);
    font-size: 11px; color: var(--t3); line-height: 1.55;
  }
</style>
</head><body>

<div class="card">
  <svg class="leaf" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3db87a"/><stop offset="100%" stop-color="#38c88a"/></linearGradient></defs>
    <path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3 8 0 11-7.34 11-13-1-.01-4.58.34-6 .67 2 2 4 4 3.33 7.34" fill="url(#g)"/>
  </svg>
  <h1>Leef</h1>
  <p class="sub">Jordan sent this to you. Enter the password she gave you to unlock the app.</p>
  <form id="gate-form">
    <input type="password" id="pw" placeholder="Password" autofocus autocapitalize="off" autocorrect="off" spellcheck="false">
    <button type="submit" id="submit-btn">Unlock</button>
  </form>
  <div class="error" id="err"></div>
  <div class="note">Your session will stay unlocked for 7 days.</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// Web Crypto decrypt — matches the Python encrypt.py format:
// base64(salt[16] + iv[12] + ciphertext+tag)
// PBKDF2-SHA256, 100000 iters, AES-GCM 256-bit key
// ═══════════════════════════════════════════════════════════
async function deriveKey(password, salt) {
  const baseKey = await crypto.subtle.importKey(
    'raw',
    new TextEncoder().encode(password),
    'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function decrypt(password, b64) {
  const raw = Uint8Array.from(atob(b64.trim()), c => c.charCodeAt(0));
  const salt = raw.slice(0, 16);
  const iv = raw.slice(16, 28);
  const ct = raw.slice(28);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(plain);
}

// If already unlocked (within 7 days), go straight to the app
(function autoRedirect() {
  try {
    const raw = localStorage.getItem('leef_unlock');
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (obj && obj.expires && obj.expires > Date.now()) {
      location.replace('app.html');
    }
  } catch (e) {}
})();

const form = document.getElementById('gate-form');
const pwInput = document.getElementById('pw');
const btn = document.getElementById('submit-btn');
const err = document.getElementById('err');

function showError(msg) {
  btn.disabled = false;
  btn.textContent = 'Unlock';
  err.textContent = msg;
  err.classList.add('show');
  pwInput.classList.add('wrong');
  pwInput.select();
  setTimeout(() => pwInput.classList.remove('wrong'), 500);
}

form.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const pw = pwInput.value.trim();
  if (!pw) return;
  btn.disabled = true;
  btn.textContent = 'Unlocking…';
  err.classList.remove('show');
  pwInput.classList.remove('wrong');

  // v6.0.8: split error paths so genuinely-wrong-password is distinguishable from
  // network failure and private-browsing localStorage blocks

  // Step 1: fetch the verify token
  let encBlob;
  try {
    const resp = await fetch('v6/verify-token.enc');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    encBlob = await resp.text();
  } catch (netErr) {
    showError('Network error — check your connection and try again.');
    return;
  }

  // Step 2: decrypt + verify — a throw here genuinely means wrong password
  let plain;
  try {
    plain = await decrypt(pw, encBlob);
    if (plain !== 'leef_unlock_ok_v607') throw new Error('bad token');
  } catch (cryptoErr) {
    showError('Wrong password — try again');
    return;
  }

  // Step 3: store the session — if localStorage is blocked (private browsing), tell the user exactly that
  try {
    const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;
    localStorage.setItem('leef_unlock', JSON.stringify({ pw, expires: Date.now() + SEVEN_DAYS_MS }));
  } catch (storageErr) {
    showError("Your browser is blocking storage (private mode?). Open this link in a normal window.");
    return;
  }

  location.replace('app.html');
});
</script>

</body></html>
